      const [allLayoutSettings, setAllLayoutSettings] = useState(() => {
        const saved = localStorage.getItem('gridironLayoutSettings');
        return saved ? JSON.parse(saved) : {
          1: { ...defaultLayoutSettings },  // GTFI
          2: { ...defaultLayoutSettings }   // GMA
        };
      });
      
      // Get current strategy's layout settings
      const layoutSettings = allLayoutSettings[selectedStrategy] || defaultLayoutSettings;
      
      // Helper to update layout settings for current strategy
      const updateLayoutSettings = (newSettings) => {
        const updated = {
          ...allLayoutSettings,
          [selectedStrategy]: newSettings
        };
        setAllLayoutSettings(updated);
        localStorage.setItem('gridironLayoutSettings', JSON.stringify(updated));
      };
      
      // Save verification dates to localStorage when changed
      useEffect(() => {
        localStorage.setItem('gridironVerificationDates', JSON.stringify(verificationEndDate));
      }, [verificationEndDate]);

      // All available indexes for benchmark dropdowns
      const COMP_INDEX_OPTIONS = {
        1: { name: 'Bloomberg US Agg', shortName: 'US Agg' },
        2: { name: 'Corp High Yield', shortName: 'Corp HY' },
        3: { name: 'HFRI Fund Weighted', shortName: 'HFRI' },
        4: { name: 'Global Agg', shortName: 'Global Agg' },
        5: { name: 'MSCI ACWI', shortName: 'MSCI ACWI' },
        6: { name: '75 Global Agg/25 MSCI ACWI', shortName: '25/75 Blend' },
        7: { name: 'S&P 500', shortName: 'S&P 500' },
        8: { name: '60 S&P 500/40 US Agg', shortName: '60/40 Blend' }
      };

      // User-selectable benchmark IDs per strategy (3 benchmarks each)
      const [customBenchIds, setCustomBenchIds] = useState({
        1: [2, 4, 1],   // GTFI defaults: Corp HY, Global Agg, US Agg
        2: [8, 6, 3]    // GMA defaults: 60/40, 25/75, HFRI
      });

      const updateBenchId = (slot, newId) => {
        setCustomBenchIds(prev => {
          const updated = { ...prev };
          updated[selectedStrategy] = [...(prev[selectedStrategy] || [])];
          updated[selectedStrategy][slot] = Number(newId);
          return updated;
        });
      };

      // Build dynamic benchmarkConfig from user selections
      const benchmarkConfig = useMemo(() => {
        const buildConfig = (strategyId, ids) => ({
          benchmarks: ids.map(id => ({
            id,
            name: COMP_INDEX_OPTIONS[id]?.name || `Index ${id}`,
            shortName: COMP_INDEX_OPTIONS[id]?.shortName || `Index ${id}`
          })),
          primaryBenchId: ids[0]
        });
        return {
          1: buildConfig(1, customBenchIds[1] || [2, 4, 1]),
          2: buildConfig(2, customBenchIds[2] || [8, 6, 3])
        };
      }, [customBenchIds]);

      useEffect(() => {
        const loadIndexReturns = async () => {
          try {
            // Paginate to handle Supabase max_rows (default 1000)
            let allData = [];
            let offset = 0;
            const pageSize = 1000;
            while (true) {
              const response = await fetch(`${SUPABASE_URL}/rest/v1/index_returns?order=month_end_date&limit=${pageSize}&offset=${offset}`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } });
              const page = await response.json();
              allData = allData.concat(page);
              if (page.length < pageSize) break;
              offset += pageSize;
            }
            const data = allData;
            console.log('DEBUG raw fetch total rows:', data.length);
            const id4rows = data.filter(r => Number(r.index_id) === 4);
            console.log('DEBUG raw id4 rows:', id4rows.length, 'last 3:', id4rows.slice(-3).map(r => r.month_end_date + ' = ' + r.monthly_return));
            const organized = {};
            data.forEach(row => { 
              const id = Number(row.index_id); 
              if (!organized[id]) organized[id] = []; 
              organized[id].push({ date: (row.month_end_date || '').substring(0, 10), ret: parseFloat(row.monthly_return) || 0 }); 
            });
            // Auto-calculate 25/75 blend (index 6) from Global Agg (4) and MSCI ACWI (5)
            if (organized[4] && organized[5]) {
              const globalAggMap = {};
              organized[4].forEach(d => { globalAggMap[d.date] = d.ret; });
              const msciMap = {};
              organized[5].forEach(d => { msciMap[d.date] = d.ret; });
              const allBlendDates = [...new Set([...Object.keys(globalAggMap), ...Object.keys(msciMap)])].sort();
              organized[6] = allBlendDates
                .filter(date => globalAggMap[date] !== undefined && msciMap[date] !== undefined)
                .map(date => ({ date, ret: 0.75 * globalAggMap[date] + 0.25 * msciMap[date] }));
            }
            // Auto-calculate 60/40 blend (index 8) from S&P 500 (7) and US Agg (1)
            if (organized[7] && organized[1]) {
              const sp500Map = {};
              organized[7].forEach(d => { sp500Map[d.date] = d.ret; });
              const usAggMap = {};
              organized[1].forEach(d => { usAggMap[d.date] = d.ret; });
              const all6040Dates = [...new Set([...Object.keys(sp500Map), ...Object.keys(usAggMap)])].sort();
              organized[8] = all6040Dates
                .filter(date => sp500Map[date] !== undefined && usAggMap[date] !== undefined)
                .map(date => ({ date, ret: 0.60 * sp500Map[date] + 0.40 * usAggMap[date] }));
            }
            Object.keys(organized).forEach(id => { organized[id].sort((a, b) => a.date.localeCompare(b.date)); });
            console.log('DEBUG allIndexReturns keys:', Object.keys(organized), 'id4 count:', organized[4]?.length || 0, 'id6 count:', organized[6]?.length || 0, 'id4 LAST 3:', JSON.stringify((organized[4]||[]).slice(-3)), 'id2 LAST 3:', JSON.stringify((organized[2]||[]).slice(-3)));
            setAllIndexReturns(organized);
          } catch (err) { console.error('Error loading index returns:', err); }
        };
        loadIndexReturns();
      }, []);

      useEffect(() => {
        const fetchData = async () => {
          setLoading(true);
          try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/v_composite_full_stats?strategy_id=eq.${selectedStrategy}&order=month_end_date.desc`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } });
            const data = await response.json();
            
            // Handle error responses - ensure we always have an array
            if (!response.ok || !Array.isArray(data)) {
              console.error('Error fetching composite stats:', data);
              setCompositeData([]);
              setLoading(false);
              return;
            }
            
            setCompositeData(data);
            
            // Fetch composite return overrides
            const overridesResponse = await fetch(`${SUPABASE_URL}/rest/v1/composite_returns?strategy_id=eq.${selectedStrategy}&select=month_end_date,gross_return_override,net_return_override`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } });
            const overridesData = await overridesResponse.json();
            // Create lookup map by month_end_date - only if we got an array back
            const overridesMap = {};
            if (Array.isArray(overridesData)) {
              overridesData.forEach(o => { overridesMap[o.month_end_date] = o; });
            }
            setCompositeOverrides(overridesMap);
            
            if (data.length > 0 && !selectedDate) setSelectedDate(data[0].month_end_date);
            if (data.length > 0) {
              const latestMonth = data[0].month_end_date;
              // Fetch monthly_data with client_id to identify MC
              const aumResponse = await fetch(`${SUPABASE_URL}/rest/v1/monthly_data?month_end_date=eq.${latestMonth}&select=ending_balance,client_id`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } });
              const aumData = await aumResponse.json();
              // Fetch schwab_custody for this month
              const schwabResponse = await fetch(`${SUPABASE_URL}/rest/v1/schwab_custody?month_end_date=eq.${latestMonth}`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } });
              const schwabData = await schwabResponse.json();
              const schwabTotal = (Array.isArray(schwabData) && schwabData.length > 0) ? (schwabData[0].asset_value || 0) : 0;
              // Find MC client
              const clientsResponse = await fetch(`${SUPABASE_URL}/rest/v1/clients?select=client_id,client_name`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } });
              const clientsList = await clientsResponse.json();
              const mcClient = Array.isArray(clientsList) ? clientsList.find(c => c.client_name && c.client_name.toLowerCase().includes('mechanical contractors')) : null;
              const mcBalance = mcClient && Array.isArray(aumData) ? (aumData.find(d => d.client_id === mcClient.client_id)?.ending_balance || 0) : 0;
              // Firm AUM = GTFI + GMA + (Schwab - MC)
              const totalMonthly = Array.isArray(aumData) ? aumData.reduce((sum, d) => sum + (d.ending_balance || 0), 0) : 0;
              setFirmAUM(totalMonthly + schwabTotal - mcBalance);
            }
            await loadPortfolioDetails(selectedStrategy, selectedDate || (data.length > 0 ? data[0].month_end_date : null));
          } catch (err) { console.error('Error fetching composite data:', err); setCompositeData([]); }
          setLoading(false);
        };
        fetchData();
      }, [selectedStrategy]);

      useEffect(() => { if (selectedDate) loadPortfolioDetails(selectedStrategy, selectedDate); }, [selectedDate]);

      const loadPortfolioDetails = async (strategyId, monthEndDate) => {
        if (!monthEndDate) return;
        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/composite_portfolio_details?strategy_id=eq.${strategyId}&month_end_date=eq.${monthEndDate}`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } });
          const data = await response.json();
          setPortfolioDetails(data.length > 0 ? data[0] : null);
        } catch (err) { setPortfolioDetails(null); }
      };

      const calcStats = (returns, benchReturns, riskFreeRate = 0.04) => {
        const validReturns = returns.filter(r => r !== null && !isNaN(r));
        const validBench = benchReturns.filter(r => r !== null && !isNaN(r));
        if (validReturns.length < 2) return {};
        const mean = validReturns.reduce((a, b) => a + b, 0) / validReturns.length;
        const variance = validReturns.reduce((sum, r) => sum + Math.pow(r - mean, 2), 0) / (validReturns.length - 1);
        const stdDev = Math.sqrt(variance) * Math.sqrt(12);
        const benchMean = validBench.reduce((a, b) => a + b, 0) / validBench.length;
        const benchVariance = validBench.reduce((sum, r) => sum + Math.pow(r - benchMean, 2), 0) / (validBench.length - 1);
        const benchStdDev = Math.sqrt(benchVariance) * Math.sqrt(12);
        const n = Math.min(validReturns.length, validBench.length);
        let num = 0, den1 = 0, den2 = 0;
        for (let i = 0; i < n; i++) { const d1 = validReturns[i] - mean; const d2 = validBench[i] - benchMean; num += d1 * d2; den1 += d1 * d1; den2 += d2 * d2; }
        const correlation = den1 * den2 === 0 ? 0 : num / Math.sqrt(den1 * den2);
        const rSquared = correlation * correlation;
        const beta = Math.sqrt(benchVariance) === 0 ? 0 : correlation * Math.sqrt(variance) / Math.sqrt(benchVariance);
        const cumReturn = validReturns.reduce((acc, r) => acc * (1 + r), 1) - 1;
        const benchCumReturn = validBench.reduce((acc, r) => acc * (1 + r), 1) - 1;
        const annReturn = validReturns.length >= 12 ? Math.pow(1 + cumReturn, 12 / validReturns.length) - 1 : cumReturn;
        const benchAnnReturn = validBench.length >= 12 ? Math.pow(1 + benchCumReturn, 12 / validBench.length) - 1 : benchCumReturn;
        const alpha = annReturn - riskFreeRate - beta * (benchAnnReturn - riskFreeRate);
        const sharpe = stdDev === 0 ? 0 : (annReturn - riskFreeRate) / stdDev;
        const benchSharpe = benchStdDev === 0 ? 0 : (benchAnnReturn - riskFreeRate) / benchStdDev;
        const downsideReturns = validReturns.filter(r => r < 0);
        const downsideStd = Math.sqrt(downsideReturns.length > 1 ? downsideReturns.reduce((sum, r) => sum + r * r, 0) / downsideReturns.length : 0) * Math.sqrt(12);
        const sortino = downsideStd === 0 ? 0 : (annReturn - riskFreeRate) / downsideStd;
        const benchDownside = validBench.filter(r => r < 0);
        const benchDownsideStd = Math.sqrt(benchDownside.length > 1 ? benchDownside.reduce((sum, r) => sum + r * r, 0) / benchDownside.length : 0) * Math.sqrt(12);
        const benchSortino = benchDownsideStd === 0 ? 0 : (benchAnnReturn - riskFreeRate) / benchDownsideStd;
        const pctPositive = validReturns.filter(r => r > 0).length / validReturns.length;
        const benchPctPositive = validBench.filter(r => r > 0).length / validBench.length;
        let peak = 1, maxDrawdown = 0, cumVal = 1;
        for (const r of validReturns) { cumVal *= (1 + r); if (cumVal > peak) peak = cumVal; const dd = (peak - cumVal) / peak; if (dd > maxDrawdown) maxDrawdown = dd; }
        let benchPeak = 1, benchMaxDrawdown = 0, benchCumVal = 1;
        for (const r of validBench) { benchCumVal *= (1 + r); if (benchCumVal > benchPeak) benchPeak = benchCumVal; const dd = (benchPeak - benchCumVal) / benchPeak; if (dd > benchMaxDrawdown) benchMaxDrawdown = dd; }
        return { stdDev, alpha, beta, correlation, rSquared, sharpe, sortino, pctPositive, maxDrawdown, benchStdDev, benchSharpe, benchSortino, benchPctPositive, benchMaxDrawdown };
      };

      const getBenchmarkReturns = (indexId, compositeDates) => {
        const indexData = allIndexReturns[indexId] || [];
        const result = compositeDates.map(date => { 
          const dateNorm = date.substring(0, 10);
          const found = indexData.find(d => d.date.substring(0, 10) === dateNorm); 
          return found ? found.ret : 0; 
        });
        if (indexId === 4) {
          console.log('DEBUG GA result first5:', JSON.stringify(result.slice(0, 5)), 'last5:', JSON.stringify(result.slice(-5)));
          console.log('DEBUG GA raw last3:', JSON.stringify(indexData.slice(-3)));
        }
        return result;
      };

      const calcPeriodReturn = (returns, months) => {
        const periodReturns = returns.slice(-months);
        if (periodReturns.length < months) return null;
        const cum = periodReturns.reduce((acc, r) => acc * (1 + (r || 0)), 1) - 1;
        return months >= 12 ? Math.pow(1 + cum, 12 / months) - 1 : cum;
      };

      // Helper to get net return with override applied
      const getNetReturn = (d) => {
        const override = compositeOverrides[d.month_end_date]?.net_return_override;
        const val = (override !== null && override !== undefined) ? override : d.monthly_net;
        return parseFloat(val) || 0;
      };

      const calcYTDReturn = (data, selDate) => {
        const year = selDate.substring(0, 4);
        const ytdData = data.filter(d => d.month_end_date.startsWith(year) && d.month_end_date <= selDate);
        return ytdData.reduce((acc, d) => acc * (1 + (getNetReturn(d) || 0)), 1) - 1;
      };

      if (loading) return <div className="p-8">Loading composite data...</div>;
      const currentData = compositeData.find(d => d.month_end_date === selectedDate) || compositeData[0];
      if (!currentData) return (
        <div className="p-8">
          <div className="flex gap-4 items-center mb-1">
            <select value={selectedStrategy} onChange={(e) => { setSelectedStrategy(parseInt(e.target.value)); setSelectedDate(null); }} className="px-4 py-2 border rounded font-medium">
              <option value={1}>GTFI - Tactical Fixed Income</option>
              <option value={2}>GMA - Multi-Asset</option>
            </select>
          </div>
          <p className="text-gray-600">No composite data available for {selectedStrategy === 1 ? 'GTFI' : 'GMA'}. Make sure clients with this strategy have monthly data entered.</p>
        </div>
      );
      
      const effectiveDate = selectedDate || currentData.month_end_date;

      // Filter data to only include dates up to and including the selected date
      const filteredCompositeData = compositeData.filter(d => d.month_end_date <= effectiveDate);

      const strategyName = selectedStrategy === 1 ? 'GRIDIRON TACTICAL FIXED INCOME' : 'GRIDIRON MULTI-ASSET';
      const strategyCode = selectedStrategy === 1 ? 'GTFI' : 'GMA';
      const config = benchmarkConfig[selectedStrategy];
      const allDates = filteredCompositeData.map(d => d.month_end_date).reverse();
      // Use net_return_override if available, otherwise use calculated monthly_net
      const allNetReturns = filteredCompositeData.map(d => {
        const override = compositeOverrides[d.month_end_date]?.net_return_override;
        const val = (override !== null && override !== undefined) ? override : d.monthly_net;
        return parseFloat(val) || 0;
      }).reverse();
      const benchmarkReturns = {};
      config.benchmarks.forEach(bench => { benchmarkReturns[bench.id] = getBenchmarkReturns(bench.id, allDates); });
      console.log('DEBUG allDates LAST 5:', JSON.stringify(allDates.slice(-5)));
      console.log('DEBUG benchmarkReturns[4] LAST 5:', JSON.stringify((benchmarkReturns[4]||[]).slice(-5)));
      console.log('DEBUG benchmarkReturns[2] LAST 5:', JSON.stringify((benchmarkReturns[2]||[]).slice(-5)));
      console.log('DEBUG benchmarkReturns[4] FIRST 5:', JSON.stringify((benchmarkReturns[4]||[]).slice(0,5)));
      console.log('DEBUG benchmarkReturns[2] FIRST 5:', JSON.stringify((benchmarkReturns[2]||[]).slice(0,5)));
      const primaryBenchReturns = benchmarkReturns[config.primaryBenchId] || [];
      const riskMetrics = calcStats(allNetReturns, primaryBenchReturns);

      // Get MTD using override if available
      const overrideMTD = compositeOverrides[currentData.month_end_date]?.net_return_override;
      const compositeMTD = (overrideMTD !== null && overrideMTD !== undefined) ? overrideMTD : (currentData.monthly_net || 0);
      const compositeYTD = calcYTDReturn(filteredCompositeData, effectiveDate);
      const composite1Y = calcPeriodReturn(allNetReturns, 12);
      const composite3Y = calcPeriodReturn(allNetReturns, 36);
      const composite5Y = calcPeriodReturn(allNetReturns, 60);
      const compositeSICum = allNetReturns.reduce((acc, r) => acc * (1 + (r || 0)), 1) - 1;
      const compositeSIAnn = allNetReturns.length >= 12 ? Math.pow(1 + compositeSICum, 12 / allNetReturns.length) - 1 : compositeSICum;

      const calcBenchPeriod = (benchId, months) => calcPeriodReturn(benchmarkReturns[benchId] || [], months);
      const calcBenchYTD = (benchId) => {
        const year = effectiveDate.substring(0, 4);
        const ytdDates = allDates.filter(d => d.startsWith(year) && d <= effectiveDate);
        const ytdRets = ytdDates.map(d => { const idx = allDates.indexOf(d); return (benchmarkReturns[benchId] || [])[idx] || 0; });
        return ytdRets.reduce((acc, r) => acc * (1 + r), 1) - 1;
      };
      const calcBenchSI = (benchId) => { const rets = benchmarkReturns[benchId] || []; const cum = rets.reduce((acc, r) => acc * (1 + (r || 0)), 1) - 1; return rets.length >= 12 ? Math.pow(1 + cum, 12 / rets.length) - 1 : cum; };
      const calcBenchSICum = (benchId) => (benchmarkReturns[benchId] || []).reduce((acc, r) => acc * (1 + (r || 0)), 1) - 1;

      const years = [];
      const currentYear = parseInt(effectiveDate.substring(0, 4));
      for (let y = currentYear; y >= currentYear - 5; y--) {
        const yearData = filteredCompositeData.filter(d => d.month_end_date.startsWith(String(y)));
        if (yearData.length > 0) {
          const annNet = yearData.reduce((acc, d) => acc * (1 + (getNetReturn(d) || 0)), 1) - 1;
          const benchAnnuals = {};
          config.benchmarks.forEach(bench => { const yearDates = yearData.map(d => d.month_end_date); const yearBenchRets = yearDates.map(date => { const idx = allDates.indexOf(date); return (benchmarkReturns[bench.id] || [])[idx] || 0; }); benchAnnuals[bench.id] = yearBenchRets.reduce((acc, r) => acc * (1 + r), 1) - 1; });
          years.push({ year: y, net: annNet, benchmarks: benchAnnuals });
        }
      }

      const monthlyGrid = {};
      filteredCompositeData.forEach(d => { const year = d.month_end_date.substring(0, 4); const month = parseInt(d.month_end_date.substring(5, 7)); if (!monthlyGrid[year]) monthlyGrid[year] = {}; monthlyGrid[year][month] = getNetReturn(d); });
      const gridYears = Object.keys(monthlyGrid).sort().reverse();

      const vamiData = [];
      let compCum = 1;
      const benchCums = {};
      config.benchmarks.forEach(b => benchCums[b.id] = 1);
      allDates.forEach((date, idx) => {
        compCum *= (1 + (allNetReturns[idx] || 0));
        config.benchmarks.forEach(b => { benchCums[b.id] *= (1 + ((benchmarkReturns[b.id] || [])[idx] || 0)); });
        vamiData.push({ date: new Date(date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', year: '2-digit' }), Composite: ((compCum - 1) * 100).toFixed(2), ...config.benchmarks.reduce((obj, b) => { obj[b.shortName] = ((benchCums[b.id] - 1) * 100).toFixed(2); return obj; }, {}) });
      });

      const formatPct = (val, decimals = 2) => (val === null || val === undefined || isNaN(val)) ? '-' : (val * 100).toFixed(decimals) + '%';
      const formatPctParens = (val) => (val === null || val === undefined || isNaN(val)) ? '-' : val < 0 ? `(${Math.abs(val * 100).toFixed(2)}%)` : `${(val * 100).toFixed(2)}%`;

      return (
        <div className="p-6 bg-white">
          <div className="flex justify-between items-center mb-4 no-print">
            <div className="flex gap-4 items-center">
              <select value={selectedStrategy} onChange={(e) => { setSelectedStrategy(parseInt(e.target.value)); setSelectedDate(null); }} className="px-4 py-2 border rounded font-medium">
                <option value={1}>GTFI - Tactical Fixed Income</option>
                <option value={2}>GMA - Multi-Asset</option>
              </select>
              <select value={selectedDate || ''} onChange={(e) => setSelectedDate(e.target.value)} className="px-4 py-2 border rounded">
                {compositeData.map(d => (<option key={d.month_end_date} value={d.month_end_date}>{new Date(d.month_end_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</option>))}
              </select>
              <div className="flex items-center gap-2">
                <label className="text-sm font-medium">GIPS Verification End:</label>
                <input 
                  type="text" 
                  value={verificationEndDate[selectedStrategy]} 
                  onChange={(e) => {
                    const updated = {...verificationEndDate, [selectedStrategy]: e.target.value};
                    setVerificationEndDate(updated);
                    localStorage.setItem('gridironVerificationDates', JSON.stringify(updated));
                  }} 
                  className="px-2 py-1 border rounded w-28 text-sm"
                  placeholder="MM/DD/YYYY"
                />
              </div>
            </div>
            <button onClick={async () => {
              // Generate chart image before printing
              const chartEl = document.querySelector('.recharts-wrapper');
              if (chartEl) {
                try {
                  // Capture chart with higher quality for print
                  const canvas = await html2canvas(chartEl, { 
                    scale: 3, 
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false
                  });
                  setChartImageUrl(canvas.toDataURL('image/png'));
                  // Wait for state to update then print
                  setTimeout(() => window.print(), 150);
                } catch (err) {
                  console.error('Error generating chart image:', err);
                  window.print();
                }
              } else {
                window.print();
              }
            }} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Print / Export PDF</button>
            <button onClick={() => setShowLayoutSettings(!showLayoutSettings)} className="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700 ml-2">
              {showLayoutSettings ? 'Hide' : 'Show'} Layout Settings
            </button>
          </div>
          
          {showLayoutSettings && (
            <div className="no-print mb-4 p-4 bg-gray-100 rounded border">
              <h4 className="font-bold mb-3">PDF Layout Settings (WYSIWYG) - {selectedStrategy === 1 ? 'GTFI' : 'GMA'}</h4>
              <div className="grid grid-cols-3 gap-4 mb-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Logo Height</label>
                  <input type="range" min="40" max="100" value={layoutSettings.logoHeight} onChange={(e) => updateLayoutSettings({...layoutSettings, logoHeight: parseInt(e.target.value)})} className="w-full" />
                  <span className="text-xs">{layoutSettings.logoHeight}px</span>
                </div>

      const [compositeData, setCompositeData] = useState([]);
      const [selectedStrategy, setSelectedStrategy] = useState(1);
      const [loading, setLoading] = useState(true);
      const [selectedDate, setSelectedDate] = useState(null);

      // GIPS Audit Export state
      const [gipsExportYear, setGipsExportYear] = useState(new Date().getFullYear());
      const [gipsExporting, setGipsExporting] = useState(false);

      // GIPS Audit Export Function
      const exportGIPSAudit = async () => {
        setGipsExporting(true);
        try {
          // Build the query for the selected year
          const startDate = `${gipsExportYear}-01-01`;
          const endDate = `${gipsExportYear}-12-31`;
          // Also fetch prior month (Dec of prior year) for first-full-month new account detection
          const priorDecDate = `${gipsExportYear - 1}-12-01`;
          
          // Fetch all monthly data for the year + prior December
          const mdResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/monthly_data?month_end_date=gte.${priorDecDate}&month_end_date=lte.${endDate}&order=month_end_date`,
            {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`
              }
            }
          );
          const allMonthlyData = await mdResponse.json();
          const monthlyDataForYear = allMonthlyData.filter(d => d.month_end_date >= startDate);
          
          // Get all clients and strategies for joining
          const clientsResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/clients`,
            {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`
              }
            }
          );
          const allClients = await clientsResponse.json();
          
          const strategiesResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/strategies`,
            {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`
              }
            }
          );
          const strategies = await strategiesResponse.json();
          
          // Fetch composite stats for the year
          const compositeStatsResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/v_composite_full_stats?month_end_date=gte.${startDate}&month_end_date=lte.${endDate}&order=month_end_date`,
            {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`
              }
            }
          );
          const compositeStats = await compositeStatsResponse.json();
          
          // Fetch Schwab custody data for the year
          const schwabResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/schwab_custody?month_end_date=gte.${startDate}&month_end_date=lte.${endDate}&order=month_end_date`,
            {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`
              }
            }
          );
          const schwabData = await schwabResponse.json();
          
          // Build lookup maps
          const clientMap = {};
          allClients.forEach(c => { clientMap[c.client_id] = c; });
          const strategyMap = {};
          strategies.forEach(s => { strategyMap[s.strategy_id] = s; });
          
          // Find Mechanical Contractors for Schwab netting
          const mechContractors = allClients.find(c => c.client_name && c.client_name.toLowerCase().includes('mechanical contractors'));
          
          // ===== SHEET 1: Account-Level Data =====
          const sheet1Rows = monthlyDataForYear.map(md => {
            const client = clientMap[md.client_id] || {};
            const strategy = strategyMap[client.strategy_id] || {};
            
            let exclusionReason = null;
            const exclCheck = isExcludedFromComposite(md, allMonthlyData);
            if (exclCheck.excluded) {
              exclusionReason = exclCheck.reason;
            }
            
            return {
              'Client Name': client.client_name || '',
              'Account Number': client.account_number || '',
              'Composite': strategy.strategy_code || '',
              'Month End Date': md.month_end_date,
              'Beginning Balance': md.beginning_balance,
              'Ending Balance': md.ending_balance,
              'Gross Return (%)': md.gross_return_pct != null ? (md.gross_return_pct * 100) : (md.beginning_balance > 0 ? (() => { const raw = calcModifiedDietz(md.beginning_balance, md.ending_balance, md.contributions, md.withdrawals, md.day_of_flow, md.month_end_date, md.contribution_day, md.withdrawal_day); if (client.fee_payment === 'Internal') { const mgmtFee = md.ending_balance * ((client.annual_mgmt_fee_rate || client.annual_mgmt_fee || 0.0075) / 12); return calcModifiedDietz(md.beginning_balance, md.ending_balance + mgmtFee, md.contributions, md.withdrawals, md.day_of_flow, md.month_end_date, md.contribution_day, md.withdrawal_day) * 100; } return raw * 100; })() : null),
              'Net Return (%)': md.net_all_fees_return_pct != null ? (md.net_all_fees_return_pct * 100) : (md.net_return_pct != null ? (md.net_return_pct * 100) : (md.beginning_balance > 0 ? (() => { const gr = calcModifiedDietz(md.beginning_balance, md.ending_balance, md.contributions, md.withdrawals, md.day_of_flow, md.month_end_date, md.contribution_day, md.withdrawal_day); return client.fee_payment === 'Internal' ? gr * 100 : (gr - ((client.annual_mgmt_fee_rate || client.annual_mgmt_fee || 0.0075) / 12)) * 100; })() : null)),
              'Contributions': md.contributions,
              'Withdrawals': md.withdrawals,
              'Flow Day': md.day_of_flow,
              'Management Fee': md.management_fee,
              'Accrued Perf Fee': md.accrued_perf_fee,
              'Fee Internal/External': client.fee_payment || '',
              'Large Flow Flag': md.large_flow_flag ? 'TRUE' : 'FALSE',
              'Internal Fee Withdrawal': md.internal_fee_withdrawal,
              'Withdrawal Type': md.withdrawal_type || '',
              'Exclusion Reason': exclusionReason || ''
            };
          });
          
          // Sort by composite, client_name, month_end_date
          sheet1Rows.sort((a, b) => {
            if (a.Composite !== b.Composite) return a.Composite.localeCompare(b.Composite);
            if (a['Client Name'] !== b['Client Name']) return a['Client Name'].localeCompare(b['Client Name']);
            return a['Month End Date'].localeCompare(b['Month End Date']);
          });
          
          // ===== SHEET 2: Composite Performance & AUM =====
          // Get unique months
          const uniqueMonths = [...new Set(monthlyDataForYear.map(d => d.month_end_date))].sort();
          
          const sheet2Rows = uniqueMonths.map(month => {
            // Get GTFI stats
            const gtfiStats = compositeStats.find(s => s.month_end_date === month && s.strategy_id === 1);
            // Get GMA stats
            const gmaStats = compositeStats.find(s => s.month_end_date === month && s.strategy_id === 2);
            
            // Get all GTFI accounts for this month
            const gtfiAccounts = monthlyDataForYear.filter(d => d.month_end_date === month && clientMap[d.client_id]?.strategy_id === 1);
            const gtfiTotalAccounts = gtfiAccounts.length;
            // Accounts included in calc = those not excluded per GIPS policy
            const gtfiIncludedAccounts = gtfiAccounts.filter(d => 
              !isExcludedFromComposite(d, allMonthlyData).excluded
            ).length;
            
            // Get all GMA accounts for this month
            const gmaAccounts = monthlyDataForYear.filter(d => d.month_end_date === month && clientMap[d.client_id]?.strategy_id === 2);
            const gmaTotalAccounts = gmaAccounts.length;
            // Accounts included in calc
            const gmaIncludedAccounts = gmaAccounts.filter(d => 
              !isExcludedFromComposite(d, allMonthlyData).excluded
            ).length;
            
            // Calculate GTFI AUM from monthly data
            const gtfiAUM = gtfiAccounts.reduce((sum, d) => sum + (d.ending_balance || 0), 0);
            
            // Calculate GMA AUM from monthly data
            const gmaAUM = gmaAccounts.reduce((sum, d) => sum + (d.ending_balance || 0), 0);
            
            // Get Schwab data for this month
            const schwab = schwabData.find(s => s.month_end_date === month);
            const schwabTotal = schwab?.asset_value || 0;
            
            // Get MC balance for this month
            const mcBalance = mechContractors 
              ? (monthlyDataForYear.find(d => d.month_end_date === month && d.client_id === mechContractors.client_id)?.ending_balance || 0)
              : 0;
            
            const schwabNet = schwabTotal - mcBalance;
            const firmAUM = gtfiAUM + gmaAUM + schwabNet;
            
            return {
              'Month End Date': month,
              'GTFI Gross Return (%)': gtfiStats?.monthly_gross != null ? (gtfiStats.monthly_gross * 100) : null,
              'GTFI Net Return (%)': gtfiStats?.monthly_net != null ? (gtfiStats.monthly_net * 100) : null,
              'GTFI AUM': gtfiAUM,
              'GTFI Total Accounts': gtfiTotalAccounts,
              'GTFI Accounts in Calc': gtfiIncludedAccounts,
              'GMA Gross Return (%)': gmaStats?.monthly_gross != null ? (gmaStats.monthly_gross * 100) : null,
              'GMA Net Return (%)': gmaStats?.monthly_net != null ? (gmaStats.monthly_net * 100) : null,
              'GMA AUM': gmaAUM,
              'GMA Total Accounts': gmaTotalAccounts,
              'GMA Accounts in Calc': gmaIncludedAccounts,
              'Schwab Total': schwabTotal,
              'Schwab Net (less MC)': schwabNet,
              'Firm AUM': firmAUM
            };
          });
          
          // Create workbook with SheetJS
          const XLSX = window.XLSX;
          const wb = XLSX.utils.book_new();
          
          // Add Sheet 1: Account Data
          const ws1 = XLSX.utils.json_to_sheet(sheet1Rows);
          XLSX.utils.book_append_sheet(wb, ws1, 'Account Data');
          
          // Add Sheet 2: Composite Performance
          const ws2 = XLSX.utils.json_to_sheet(sheet2Rows);
          XLSX.utils.book_append_sheet(wb, ws2, 'Composite Performance');
          
          // Download Excel file
          XLSX.writeFile(wb, `GIPS_Audit_Export_${gipsExportYear}.xlsx`);
          
        } catch (err) {
          console.error('GIPS export error:', err);
          alert('Error exporting GIPS data: ' + err.message);
        } finally {
          setGipsExporting(false);
        }
      };

      useEffect(() => {
        const fetchCompositeStats = async () => {
          setLoading(true);
          try {
            const response = await fetch(
              `${SUPABASE_URL}/rest/v1/v_composite_full_stats?strategy_id=eq.${selectedStrategy}&order=month_end_date.desc`,
              {
                headers: {
                  'apikey': SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`
                }
              }
            );
            const data = await response.json();
            
            // Also fetch index returns to calculate benchmark periods
            const indexRes = await fetch(
              `${SUPABASE_URL}/rest/v1/index_returns?index_id=eq.1&order=month_end_date.desc`,
              {
                headers: {
                  'apikey': SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`
                }
              }
            );
            const indexData = await indexRes.json();
            
            // Calculate benchmark returns for each composite month
            const enrichedData = data.map(d => {
              const monthDate = d.month_end_date;
              const year = monthDate.substring(0, 4);
              const month = parseInt(monthDate.substring(5, 7));
              
              // Find index returns up to this date
              const indexUpToDate = indexData.filter(i => i.month_end_date <= monthDate).sort((a, b) => b.month_end_date.localeCompare(a.month_end_date));
              
              // Calculate QTD (current quarter)
              const quarterStartMonth = Math.floor((month - 1) / 3) * 3 + 1;
              const quarterStart = `${year}-${String(quarterStartMonth).padStart(2, '0')}-01`;
              const qtdReturns = indexUpToDate.filter(i => i.month_end_date >= quarterStart && i.month_end_date <= monthDate);
              const qtdBench = qtdReturns.reduce((acc, i) => acc * (1 + (i.monthly_return || 0)), 1) - 1;
              
              // Calculate YTD benchmark
              const ytdStart = `${year}-01-01`;
              const ytdReturns = indexUpToDate.filter(i => i.month_end_date >= ytdStart && i.month_end_date <= monthDate);
              const ytdBench = ytdReturns.reduce((acc, i) => acc * (1 + (i.monthly_return || 0)), 1) - 1;
              
              // Calculate 5-Year benchmark (annualized)
              const fiveYearReturns = indexUpToDate.slice(0, 60); // 60 months
              let fiveYrBenchAnn = null;
              if (fiveYearReturns.length >= 60) {
                const cumReturn = fiveYearReturns.reduce((acc, i) => acc * (1 + (i.monthly_return || 0)), 1);
                fiveYrBenchAnn = Math.pow(cumReturn, 12 / 60) - 1;
              }
              
              // Calculate 10-Year benchmark (annualized)
              const tenYearReturns = indexUpToDate.slice(0, 120); // 120 months
              let tenYrBenchAnn = null;
              if (tenYearReturns.length >= 120) {
                const cumReturn = tenYearReturns.reduce((acc, i) => acc * (1 + (i.monthly_return || 0)), 1);
                tenYrBenchAnn = Math.pow(cumReturn, 12 / 120) - 1;
              }
              
              // Calculate Since Inception benchmark (use all available data matching composite months)
              const siMonths = d.months_si || indexUpToDate.length;
              const siReturns = indexUpToDate.slice(0, siMonths);
              let siBenchAnn = null;
              if (siReturns.length > 0) {
                const cumReturn = siReturns.reduce((acc, i) => acc * (1 + (i.monthly_return || 0)), 1);
                siBenchAnn = siReturns.length >= 12 ? Math.pow(cumReturn, 12 / siReturns.length) - 1 : cumReturn - 1;
              }
              
              return {
                ...d,
                qtd_bench: qtdBench,
                ytd_bench: ytdBench,
                trail_5yr_bench_ann: fiveYrBenchAnn,
                trail_10yr_bench_ann: tenYrBenchAnn,
                si_bench_ann: siBenchAnn
              };
            });
            
            setCompositeData(enrichedData);
            if (enrichedData.length > 0) {
              setAvailableDates(enrichedData.map(d => d.month_end_date));
              if (!selectedDate) setSelectedDate(enrichedData[0].month_end_date);
            }
          } catch (err) {
            console.error('Error fetching composite stats:', err);
          }
          setLoading(false);
        };
        fetchCompositeStats();
      }, [selectedStrategy]);

      if (loading) return <div className="p-8">Loading composite data...</div>;

      const currentData = compositeData.find(d => d.month_end_date === selectedDate) || compositeData[0];
      if (!currentData) return <div className="p-8">No composite data available</div>;

      const strategyName = selectedStrategy === 1 ? 'GTFI - Gridiron Tactical Fixed Income' : 'GMA - Gridiron Multi-Asset';
      const benchmarkName = selectedStrategy === 1 ? 'Bloomberg US Aggregate Bond Index' : '60% S&P 500 / 40% US Agg';
      
      // Calculate QTD for composite (gross and net)
      const selectedYear = currentData.month_end_date.substring(0, 4);
      const selectedMonth = parseInt(currentData.month_end_date.substring(5, 7));
      const quarterStartMonth = Math.floor((selectedMonth - 1) / 3) * 3 + 1;
      const quarterStart = `${selectedYear}-${String(quarterStartMonth).padStart(2, '0')}-01`;
      const qtdData = compositeData.filter(d => d.month_end_date >= quarterStart && d.month_end_date <= currentData.month_end_date);
      const qtdGross = qtdData.reduce((acc, d) => acc * (1 + (d.monthly_gross || 0)), 1) - 1;
      const qtdNet = qtdData.reduce((acc, d) => acc * (1 + (d.monthly_net || 0)), 1) - 1;

      // Build VAMI data for chart
      const vamiData = compositeData.slice().reverse().map((d, idx) => {
        const prevData = idx > 0 ? compositeData.slice().reverse().slice(0, idx) : [];
        const cumReturn = prevData.reduce((acc, p) => acc * (1 + (p.monthly_gross || 0)), 1) * (1 + (d.monthly_gross || 0)) - 1;
        const cumBench = prevData.reduce((acc, p) => acc * (1 + (p.monthly_bench || 0)), 1) * (1 + (d.monthly_bench || 0)) - 1;
        return {
          date: new Date(d.month_end_date).toLocaleDateString('en-US', { month: 'short', year: '2-digit' }),
          Composite: ((1 + cumReturn) * 100).toFixed(2),
          Benchmark: ((1 + cumBench) * 100).toFixed(2)
        };
      });

      return (
        <div className="p-8">
          {/* Header */}
          <div className="mb-6 flex justify-between items-center">
            <div>
              <h1 className="text-2xl font-bold">Composite Performance Statistics</h1>
              <p className="text-gray-600">GIPS-Compliant Composite Returns</p>
            </div>
            <div className="flex gap-4 items-center">
              <select 
                value={selectedStrategy} 
                onChange={(e) => { setSelectedStrategy(parseInt(e.target.value)); setSelectedDate(null); }}
                className="px-4 py-2 border rounded font-medium"
              >
                <option value={1}>GTFI - Tactical Fixed Income</option>
                <option value={2}>GMA - Multi-Asset</option>
              </select>
              <select 
                value={selectedDate || ''} 
                onChange={(e) => setSelectedDate(e.target.value)}
                className="px-4 py-2 border rounded"
              >
                {availableDates.map(d => (
                  <option key={d} value={d}>
                    {new Date(d).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                  </option>
                ))}
              </select>
              
              {/* GIPS Audit Export */}
              <div className="border-l pl-4 flex gap-2 items-center">
                <select
                  value={gipsExportYear}
                  onChange={(e) => setGipsExportYear(Number(e.target.value))}
                  className="px-3 py-2 border rounded"
                >
                  {Array.from({ length: 12 }, (_, i) => new Date().getFullYear() - i).map(year => (
                    <option key={year} value={year}>{year}</option>
                  ))}
                </select>
                <button 
                  onClick={exportGIPSAudit}
                  disabled={gipsExporting}
                  className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 disabled:bg-gray-400 whitespace-nowrap"
                >
                  {gipsExporting ? 'Exporting...' : 'GIPS Audit Export'}
                </button>
              </div>
            </div>
          </div>

          {/* Strategy Header */}
          <div className="bg-purple-50 p-4 rounded-lg mb-6">
            <h2 className="text-xl font-bold" style={{ color: 'rgb(147, 51, 234)' }}>{strategyName}</h2>
            <p className="text-gray-600">Benchmark: {benchmarkName}</p>
            <p className="text-sm text-gray-500 mt-1">
              As of {new Date(currentData.month_end_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
              {' | '}{currentData.num_accounts} accounts | {formatCurrency(currentData.total_assets)} AUM
            </p>
          </div>

          <div className="grid grid-cols-2 gap-6">
            {/* Left Column - Performance Tables */}
            <div className="space-y-6">
              {/* Returns Table */}
              <div className="bg-white border rounded-lg p-4">
                <h3 className="font-bold text-lg mb-1">Performance Returns</h3>
                <table className="w-full">
                  <thead>
                    <tr className="border-b-2">
                      <th className="text-left py-2">Period</th>
                      <th className="text-right py-2">Gross</th>
                      <th className="text-right py-2">Net</th>
                      <th className="text-right py-2">Benchmark</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr className="border-b">
                      <td className="py-2">Month</td>
                      <td className="text-right">{formatPercent(currentData.monthly_gross, 2)}</td>
                      <td className="text-right">{formatPercent(currentData.monthly_net, 2)}</td>
                      <td className="text-right">{formatPercent(currentData.monthly_bench, 2)}</td>
                    </tr>
                    <tr className="border-b">
                      <td className="py-2">QTD</td>
                      <td className="text-right">{formatPercent(qtdGross, 2)}</td>
                      <td className="text-right">{formatPercent(qtdNet, 2)}</td>
                      <td className="text-right">{formatPercent(currentData.qtd_bench, 2)}</td>
                    </tr>
                    <tr className="border-b">
                      <td className="py-2">YTD</td>
                      <td className="text-right">{formatPercent(currentData.ytd_gross, 2)}</td>
                      <td className="text-right">{formatPercent(currentData.ytd_net, 2)}</td>
                      <td className="text-right">{formatPercent(currentData.ytd_bench, 2)}</td>
                    </tr>
                    <tr className="border-b">
                      <td className="py-2">1-Year</td>
                      <td className="text-right">{currentData.trail_1yr_gross ? formatPercent(currentData.trail_1yr_gross, 2) : '-'}</td>
                      <td className="text-right">{currentData.trail_1yr_net ? formatPercent(currentData.trail_1yr_net, 2) : '-'}</td>
                      <td className="text-right">{currentData.trail_1yr_bench ? formatPercent(currentData.trail_1yr_bench, 2) : '-'}</td>
                    </tr>
                    <tr className="border-b">
                      <td className="py-2">3-Year (Ann.)</td>
                      <td className="text-right">{currentData.trail_3yr_gross_ann ? formatPercent(currentData.trail_3yr_gross_ann, 2) : '-'}</td>
                      <td className="text-right">{currentData.trail_3yr_net_ann ? formatPercent(currentData.trail_3yr_net_ann, 2) : '-'}</td>
                      <td className="text-right">{currentData.trail_3yr_bench_ann ? formatPercent(currentData.trail_3yr_bench_ann, 2) : '-'}</td>
                    </tr>
                    <tr className="border-b">
                      <td className="py-2">5-Year (Ann.)</td>
                      <td className="text-right">{currentData.trail_5yr_gross_ann ? formatPercent(currentData.trail_5yr_gross_ann, 2) : '-'}</td>
                      <td className="text-right">{currentData.trail_5yr_net_ann ? formatPercent(currentData.trail_5yr_net_ann, 2) : '-'}</td>
                      <td className="text-right">{currentData.trail_5yr_bench_ann ? formatPercent(currentData.trail_5yr_bench_ann, 2) : '-'}</td>
                    </tr>
                    <tr className="border-b">
                      <td className="py-2">10-Year (Ann.)</td>
                      <td className="text-right">{currentData.trail_10yr_gross_ann ? formatPercent(currentData.trail_10yr_gross_ann, 2) : '-'}</td>
                      <td className="text-right">{currentData.trail_10yr_net_ann ? formatPercent(currentData.trail_10yr_net_ann, 2) : '-'}</td>
                      <td className="text-right">{currentData.trail_10yr_bench_ann ? formatPercent(currentData.trail_10yr_bench_ann, 2) : '-'}</td>
                    </tr>
                    <tr className="bg-gray-50 font-semibold">
                      <td className="py-2">Since Inception (Ann.)</td>
                      <td className="text-right">{formatPercent(currentData.si_gross_ann, 2)}</td>
                      <td className="text-right">{formatPercent(currentData.si_net_ann, 2)}</td>
                      <td className="text-right">{currentData.si_bench_ann ? formatPercent(currentData.si_bench_ann, 2) : '-'}</td>
                    </tr>
                  </tbody>
                </table>
                <p className="text-xs text-gray-500 mt-2">Inception: {currentData.months_si} months of track record</p>
              </div>

              {/* Calendar Year Returns Table */}
              <div className="bg-white border rounded-lg p-4">
                <h3 className="font-bold text-lg mb-1">Calendar Year Returns</h3>
                <table className="w-full">
                  <thead>
                    <tr className="border-b-2">
                      <th className="text-left py-2">Year</th>
                      <th className="text-right py-2">Gross</th>
                      <th className="text-right py-2">Net</th>
                      <th className="text-right py-2">Benchmark</th>
                      <th className="text-right py-2">Excess</th>
                    </tr>
                  </thead>
                  <tbody>
                    {(() => {
                      const currentYear = parseInt(currentData.month_end_date.substring(0, 4));
                      const years = [currentYear, currentYear - 1, currentYear - 2, currentYear - 3, currentYear - 4, currentYear - 5];
                      
                      return years.map(year => {
                        const yearData = compositeData.filter(d => d.month_end_date.startsWith(String(year)));
                        
                        if (yearData.length === 0) {
                          return (
                            <tr key={year} className="border-b">
                              <td className="py-1 font-medium">{year}{year === currentYear ? ' YTD' : ''}</td>
                              <td className="text-right">-</td>
                              <td className="text-right">-</td>
                              <td className="text-right">-</td>
                              <td className="text-right">-</td>
                            </tr>
                          );
                        }
                        
                        const annualGross = yearData.reduce((acc, d) => acc * (1 + (d.monthly_gross || 0)), 1) - 1;
                        const annualNet = yearData.reduce((acc, d) => acc * (1 + (d.monthly_net || 0)), 1) - 1;
                        const annualBench = yearData.reduce((acc, d) => acc * (1 + (d.monthly_bench || 0)), 1) - 1;
                        const excess = annualGross - annualBench;
                        
                        return (
                          <tr key={year} className="border-b">
                            <td className="py-1 font-medium">{year}{year === currentYear ? ' YTD' : ''}</td>
                            <td className="text-right">{formatPercent(annualGross, 2)}</td>
                            <td className="text-right">{formatPercent(annualNet, 2)}</td>
                            <td className="text-right">{formatPercent(annualBench, 2)}</td>
                            <td className={`text-right ${excess >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                              {excess >= 0 ? '+' : ''}{formatPercent(excess, 2)}
                            </td>
                          </tr>
                        );
                      });
                    })()}
                  </tbody>
                </table>
              </div>

              {/* Monthly Returns Table - same width as Performance Returns */}
              <div className="bg-white border rounded-lg p-4">
                <h3 className="font-bold text-lg mb-1">Monthly Returns History</h3>
                <div className="overflow-x-auto" style={{ maxHeight: '300px', overflowY: 'auto' }}>

                    <thead className="sticky top-0 bg-white">
                      <tr className="border-b-2">
                        <th className="text-left py-2 px-1">Month</th>
                        <th className="text-right py-2 px-1">Gross</th>
                        <th className="text-right py-2 px-1">Net</th>
                        <th className="text-right py-2 px-1">Bench</th>
                        <th className="text-right py-2 px-1">Excess</th>

                        <th className="text-right py-2 px-1">AUM</th>

                          <td className="py-1 px-1 text-xs">{new Date(d.month_end_date).toLocaleDateString('en-US', { month: 'short', year: '2-digit' })}</td>
                          <td className={`text-right py-1 px-1 ${d.monthly_gross >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatPercent(d.monthly_gross, 2)}</td>
                          <td className={`text-right py-1 px-1 ${d.monthly_net >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatPercent(d.monthly_net, 2)}</td>
                          <td className="text-right py-1 px-1">{formatPercent(d.monthly_bench, 2)}</td>
                          <td className={`text-right py-1 px-1 ${(d.monthly_gross - d.monthly_bench) >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatPercent(d.monthly_gross - d.monthly_bench, 2)}</td>
                          <td className="text-right py-1 px-1">{d.num_accounts}</td>

    // ============================================
    // COMPOSITE DATA VIEW — Monthly Detail + AUM Breakdown
    // ============================================
    function CompositeDataView() {
      const [cdSubTab, setCdSubTab] = useState('stats');
      const [cdClients, setCdClients] = useState([]);
      const [cdStrategies, setCdStrategies] = useState([]);
      const [cdMonthly, setCdMonthly] = useState([]);
      const [cdPriorMonthly, setCdPriorMonthly] = useState([]);
      const [cdCompositeRet, setCdCompositeRet] = useState([]);
      const [cdLoading, setCdLoading] = useState(true);
      const [cdError, setCdError] = useState(null);
      const [cdMonth, setCdMonth] = useState(null);
      const [cdYear, setCdYear] = useState(null);
      const [cdYearOpts, setCdYearOpts] = useState([]);
      const [cdReady, setCdReady] = useState(false);

      const cdMonthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      const getMonthEndDate = function(year, monthIdx) {
        var d = new Date(year, monthIdx + 1, 0);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      };

      // Step 1: Load clients, strategies, find latest month
      useEffect(function() {
        var doInit = async function() {
          try {
            var clients = await supabaseFetch('clients', '?order=client_name');
            var strategies = await supabaseFetch('strategies');
            setCdClients(clients);
            setCdStrategies(strategies);

            // Find latest month - try composite_returns first, fall back to schwab_custody
            var defaultMonth = null;
            try {
              var crRows = await supabaseFetch('composite_returns', '?order=month_end_date.desc&limit=1');
              if (crRows.length > 0) defaultMonth = crRows[0].month_end_date;
            } catch(e2) { console.warn('composite_returns query failed, trying schwab_custody'); }

            if (!defaultMonth) {
              try {
                var scRows = await supabaseFetch('schwab_custody', '?order=month_end_date.desc&limit=1');
                if (scRows.length > 0) defaultMonth = scRows[0].month_end_date;
              } catch(e3) { console.warn('schwab_custody fallback also failed'); }
            }

            if (defaultMonth) {
              var parts = defaultMonth.split('-');
              setCdYear(parseInt(parts[0]));
              setCdMonth(parseInt(parts[1]) - 1);
            } else {
              var n = new Date();
              setCdYear(n.getFullYear());
              setCdMonth(n.getMonth() > 0 ? n.getMonth() - 1 : 11);
            }

            var thisYear = new Date().getFullYear();
            var earliest = thisYear;
            for (var ci = 0; ci < clients.length; ci++) {
              if (clients[ci].account_open_date) {
                var y = parseInt(clients[ci].account_open_date.substring(0, 4));
                if (y < earliest) earliest = y;
              }
            }
            var yrs = [];
            for (var yi = earliest; yi <= thisYear; yi++) yrs.push(yi);
            setCdYearOpts(yrs);
            setCdReady(true);
          } catch (e) {
            console.error('CompositeDataView init error:', e);
            setCdError('Init failed: ' + e.message);
          }
        };
        doInit();
      }, []);

      // Step 2: Load monthly data when ready and month/year change
      useEffect(function() {
        if (!cdReady || cdMonth === null || cdYear === null) return;
        var dateKey = getMonthEndDate(cdYear, cdMonth);
        // Also compute prior month date for new account detection
        var priorDate = new Date(cdYear, cdMonth, 0); // last day of prior month
        var priorDateKey = priorDate.getFullYear() + '-' + String(priorDate.getMonth()+1).padStart(2,'0') + '-' + String(priorDate.getDate()).padStart(2,'0');

        var loadMonth = async function() {
          setCdLoading(true);
          try {
            var md = await supabaseFetch('monthly_data', '?month_end_date=eq.' + dateKey);
            var cr = await supabaseFetch('composite_returns', '?month_end_date=eq.' + dateKey);
            // Fetch prior month data to detect first-full-month new accounts
            var priorMd = await supabaseFetch('monthly_data', '?month_end_date=eq.' + priorDateKey);
            setCdMonthly(md);
            setCdCompositeRet(cr);
            setCdPriorMonthly(priorMd);
          } catch (e) {
            console.error('CompositeDataView month load error:', e);
            setCdError(e.message);
          }
          setCdLoading(false);
        };
        loadMonth();
      }, [cdReady, cdMonth, cdYear]);

      // Build strategy data
      var buildStrat = function(sid) {
        var active = cdClients.filter(function(c) { return c.strategy_id === sid && c.status === 'Active'; });
        var rows = [];
        for (var ai = 0; ai < active.length; ai++) {
          var c = active[ai];
          var md = null;
          for (var mi = 0; mi < cdMonthly.length; mi++) {
            if (cdMonthly[mi].client_id === c.client_id) { md = cdMonthly[mi]; break; }
          }
          if (!md) continue;
          var bb = md.beginning_balance || 0;
          var eb = md.ending_balance || 0;
          var contrib = md.contributions || 0;
          var wdraw = Math.abs(md.withdrawals || 0);
          var netFlow = contrib - wdraw;
          var changeVal = eb - bb - netFlow;
          var totalFees = (md.management_fee || 0) + (md.performance_fee || 0);
          var grossRet = md.gross_return_pct;
          var netRet = md.net_return_pct;
          // Use net_all_fees_return_pct as the true net return (includes perf fee deduction)
          var netRetAllFees = md.net_all_fees_return_pct;
          // If returns are null, calculate from balances
          if (grossRet == null && bb > 0) {
            var isInternalCalc = c.fee_payment === 'Internal';
            var rawRet = calcModifiedDietz(bb, eb, contrib, wdraw, md.day_of_flow, md.month_end_date, md.contribution_day, md.withdrawal_day);
            var isFeePaymentCalc = isInternalCalc && md.withdrawal_type === 'fee_payment';
            if (isInternalCalc && isFeePaymentCalc) {
              // Fee_payment month: gross = rawReturn (don't add mgmt_fee to ending)
              grossRet = rawRet;
            } else if (isInternalCalc) {
              // Normal Internal: add mgmt fee back to ending for gross
              var mgmtFeeCalc = eb * ((c.annual_mgmt_fee_rate || c.annual_mgmt_fee || 0.0075) / 12);
              grossRet = calcModifiedDietz(bb, eb + mgmtFeeCalc, contrib, wdraw, md.day_of_flow, md.month_end_date, md.contribution_day, md.withdrawal_day);
            } else {
              grossRet = rawRet;
            }
          }
          if (netRet == null && grossRet != null) {
            var isInternal = c.fee_payment === 'Internal';
            var isFeePaymentNet = isInternal && md.withdrawal_type === 'fee_payment';
            if (isInternal && isFeePaymentNet) {
              // Fee_payment month: net = gross minus rate-based mgmt fee impact
              var feeRate = c.annual_mgmt_fee_rate || c.annual_mgmt_fee || 0.0075;
              var mgmtFeeNet = eb * (feeRate / 12);
              netRet = grossRet - (mgmtFeeNet / bb);
            } else if (isInternal) {
              // Normal Internal: raw Modified Dietz from actual ending IS the net return
              netRet = calcModifiedDietz(bb, eb, contrib, wdraw, md.day_of_flow, md.month_end_date, md.contribution_day, md.withdrawal_day);
            } else {
              var annualRate = c.annual_mgmt_fee_rate || c.annual_mgmt_fee || 0.0075;
              netRet = grossRet - (annualRate / 12);
            }
          }
          // If net_all_fees still null, fall back to netRet
          if (netRetAllFees == null) {
            netRetAllFees = netRet;
          }
          // Determine exclusion reason per GIPS policy
          var excludeReason = null;
          if (md.large_flow_flag === true) {
            excludeReason = 'Large Flow (>40%)';
          } else if (bb === 0 || bb === null) {
            excludeReason = 'New Account (Funding Month)';
          } else {
            // Check if prior month was funding month (bb=0) → this is first full month, exclude
            var priorMd = null;
            for (var pi = 0; pi < cdPriorMonthly.length; pi++) {
              if (cdPriorMonthly[pi].client_id === c.client_id) { priorMd = cdPriorMonthly[pi]; break; }
            }
            if (priorMd && (priorMd.beginning_balance === 0 || priorMd.beginning_balance === null)) {
              excludeReason = 'New Account (1st Full Month)';
            }
          }
          var isExcluded = excludeReason !== null;
          rows.push({ name: c.client_name, bb: bb, eb: eb, changeVal: changeVal, totalFees: totalFees, contributions: contrib, withdrawals: wdraw, grossRet: grossRet, netRet: netRet, netRetAllFees: netRetAllFees, hasPerfFee: (c.performance_fee_rate || 0) > 0, excluded: isExcluded, excludeReason: excludeReason });
        }
        rows.sort(function(a, b) { return b.bb - a.bb; });

        var cr = null;
        for (var ri = 0; ri < cdCompositeRet.length; ri++) {
          if (cdCompositeRet[ri].strategy_id === sid) { cr = cdCompositeRet[ri]; break; }
        }
        var included = rows.filter(function(r) { return !r.excluded; });
        return {
          rows: rows, cr: cr, included: included,
          totBB:      included.reduce(function(s,r) { return s + r.bb; }, 0),
          totChange:  included.reduce(function(s,r) { return s + r.changeVal; }, 0),
          totEB:      included.reduce(function(s,r) { return s + r.eb; }, 0),
          totFees:    included.reduce(function(s,r) { return s + r.totalFees; }, 0),
          totContrib: included.reduce(function(s,r) { return s + r.contributions; }, 0),
          totWdraw:   included.reduce(function(s,r) { return s + r.withdrawals; }, 0),
        };
      };

      var s1Data = buildStrat(1);
      var s2Data = buildStrat(2);
      var getStratName = function(id) {
        for (var si = 0; si < cdStrategies.length; si++) {
          if (cdStrategies[si].strategy_id === id) return cdStrategies[si].strategy_name;
        }
        return id === 1 ? 'GTFI' : 'GMA';
      };
      var dateLabel = (cdMonth !== null && cdYear !== null) ? cdMonthNames[cdMonth] + ' ' + cdYear : '';

      if (cdError) {
        return React.createElement('div', {className: 'p-8 text-red-600'}, 'Error: ' + cdError);
      }

      return (
        <div className="min-h-[600px]">
          <div className="bg-gray-50 border-b px-6 py-3 flex items-center justify-between mobile-stack">
            <div className="flex gap-2 flex-wrap">
              <button onClick={function() { setCdSubTab('stats'); }} className={'px-4 py-1.5 text-sm font-bold rounded ' + (cdSubTab === 'stats' ? 'bg-purple-600 text-white' : 'bg-white border border-gray-300 hover:bg-gray-100')}>
                Performance Stats
              </button>
              <button onClick={function() { setCdSubTab('detail'); }} className={'px-4 py-1.5 text-sm font-bold rounded ' + (cdSubTab === 'detail' ? 'bg-purple-600 text-white' : 'bg-white border border-gray-300 hover:bg-gray-100')}>
                Monthly Detail
              </button>
              <button onClick={function() { setCdSubTab('gips'); }} className={'px-4 py-1.5 text-sm font-bold rounded ' + (cdSubTab === 'gips' ? 'bg-purple-600 text-white' : 'bg-white border border-gray-300 hover:bg-gray-100')}>
                GIPS Presentations
              </button>
              <button onClick={function() { setCdSubTab('overrides'); }} className={'px-4 py-1.5 text-sm font-bold rounded ' + (cdSubTab === 'overrides' ? 'bg-purple-600 text-white' : 'bg-white border border-gray-300 hover:bg-gray-100')}>
                Return Overrides
              </button>
            </div>
            {cdSubTab === 'detail' && cdReady && (
              <div className="flex items-center gap-3">
                <label className="text-sm font-medium text-gray-600">Month:</label>
                <select value={cdMonth !== null ? cdMonth : ''} onChange={function(e) { setCdMonth(parseInt(e.target.value)); }} className="px-3 py-1.5 border rounded text-sm font-medium">
                  {cdMonthNames.slice().reverse().map(function(m, i) { var idx = 11 - i; return <option key={idx} value={idx}>{m}</option>; })}
                </select>
                <label className="text-sm font-medium text-gray-600">Year:</label>
                <select value={cdYear !== null ? cdYear : ''} onChange={function(e) { setCdYear(parseInt(e.target.value)); }} className="px-3 py-1.5 border rounded text-sm font-medium">
                  {cdYearOpts.slice().reverse().map(function(y) { return <option key={y} value={y}>{y}</option>; })}
                </select>
              </div>
            )}
          </div>

          {(!cdReady || (cdLoading && cdSubTab === 'detail')) ? (
            <div className="flex items-center justify-center py-20 text-gray-500">Loading composite data...</div>
          ) : (
            <div className="p-6">
              {cdSubTab === 'stats' && (
                <CompositeStats />
              )}

              {cdSubTab === 'detail' && (
                <div className="space-y-8">
                  <CDDetailTable sid={1} sname={getStratName(1)} data={s1Data} dateLabel={dateLabel} />
                  <CDDetailTable sid={2} sname={getStratName(2)} data={s2Data} dateLabel={dateLabel} />
                </div>
              )}

              {cdSubTab === 'gips' && (
                <GIPSPresentations />
              )}

              {cdSubTab === 'overrides' && (
                <ReturnOverridesInline />
              )}
            </div>
          )}
        </div>
      );
    }


    // ── Detail Table (per composite) ──
    function CDDetailTable({ sid, sname, data, dateLabel }) {
      const { rows, cr, totBB, totChange, totEB, totFees, totContrib, totWdraw, included } = data;
      
      // If composite_returns record exists, use it; otherwise calculate asset-weighted from included rows
      let compGross = cr?.gross_return ?? null;
      let compNet   = cr?.net_return ?? null;
      if (compGross == null && included.length > 0 && totBB > 0) {
        compGross = included.reduce(function(s, r) { return s + (r.bb / totBB) * (r.grossRet || 0); }, 0);
      }
      if (compNet == null && included.length > 0 && totBB > 0) {
        compNet = included.reduce(function(s, r) { return s + (r.bb / totBB) * (r.netRetAllFees || 0); }, 0);
      }
      
      const numAccts  = cr?.num_accounts ?? included.length;
      const totAssets = cr?.total_assets ?? totEB;
      const exclCount = rows.filter(r => r.excluded).length;
      const bannerColor = sid === 1 ? 'bg-blue-700' : 'bg-purple-700';

      return (
        <div>
          <div className={`${bannerColor} text-white px-5 py-3 rounded-t-lg flex items-center justify-between`}>
            <div className="flex items-center gap-4">
              <span className="font-bold text-base">{sname}</span>
              <span className="text-white/60 text-xs font-medium">{dateLabel}</span>
            </div>
            <div className="flex items-center gap-6 text-xs">
              <span><span className="text-white/50">Accounts: </span><b>{numAccts}</b></span>
              <span><span className="text-white/50">Composite Assets: </span><b>{formatCurrency(totAssets)}</b></span>
              {exclCount > 0 && (
                <span className="bg-amber-400/20 text-amber-200 px-2 py-0.5 rounded-full font-bold text-xs">{exclCount} excluded</span>
              )}
            </div>
          </div>

          <div className="bg-white border border-gray-200 border-t-0 rounded-b-lg overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-gray-50 border-b">
                    <th className="text-left py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Client</th>
                    <th className="text-right py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Beginning Balance</th>
                    <th className="text-right py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Additions</th>
                    <th className="text-right py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Withdrawals</th>
                    <th className="text-right py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Change in Value</th>
                    <th className="text-right py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Ending Balance</th>
                    <th className="text-right py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Total Fees</th>
                    <th className="text-right py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Gross Return</th>
                    <th className="text-right py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Net Return</th>
                    <th className="text-center py-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.length === 0 ? (
                    <tr><td colSpan={10} className="text-center py-10 text-gray-400">No data for this period</td></tr>
                  ) : rows.map((r, i) => (
                    <tr key={i} className={`border-b border-gray-100 hover:bg-blue-50/40 ${r.excluded ? 'bg-amber-50' : i%2===0 ? 'bg-white' : 'bg-gray-50/40'}`}>
                      <td className={`py-2 px-3 font-medium ${r.excluded ? 'text-amber-700' : 'text-gray-800'}`}>{r.name}</td>
                      <td className="text-right py-2 px-3 text-gray-600 tabular-nums">{formatCurrency(r.bb)}</td>
                      <td className={`text-right py-2 px-3 tabular-nums ${r.contributions > 0 ? 'text-green-700' : 'text-gray-400'}`}>{formatCurrency(r.contributions)}</td>
                      <td className={`text-right py-2 px-3 tabular-nums ${r.withdrawals > 0 ? 'text-red-600' : 'text-gray-400'}`}>{formatCurrency(r.withdrawals)}</td>
                      <td className={`text-right py-2 px-3 tabular-nums font-medium ${r.changeVal >= 0 ? 'text-green-700' : 'text-red-600'}`}>{formatCurrency(r.changeVal)}</td>
                      <td className="text-right py-2 px-3 text-gray-600 tabular-nums">{formatCurrency(r.eb)}</td>
                      <td className="text-right py-2 px-3 text-gray-500 tabular-nums">{formatCurrency(r.totalFees)}</td>
                      <td className={`text-right py-2 px-3 tabular-nums font-medium ${(r.grossRet??0) >= 0 ? 'text-green-700' : 'text-red-600'}`}>{formatPercent(r.grossRet, 2)}</td>
                      <td className={`text-right py-2 px-3 tabular-nums font-medium ${(r.netRetAllFees??0) >= 0 ? 'text-green-700' : 'text-red-600'}`}>{formatPercent(r.netRetAllFees, 2)}{r.hasPerfFee ? ' *' : ''}</td>
                      <td className="text-center py-2 px-3">
                        {r.excluded ? (
                          <span className="inline-flex items-center gap-1 text-xs font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded-full">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            {r.excludeReason || 'Excluded'}
                          </span>
                        ) : (
                          <span className="inline-block w-2 h-2 rounded-full bg-green-400"></span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
                {rows.length > 0 && (
                  <tfoot>
                    <tr className="bg-gray-100 border-t-2 border-gray-300 font-bold text-gray-800">
                      <td className="py-3 px-3">Composite Total</td>
                      <td className="text-right py-3 px-3 tabular-nums">{formatCurrency(totBB)}</td>
                      <td className="text-right py-3 px-3 tabular-nums text-green-700">{formatCurrency(totContrib)}</td>
                      <td className="text-right py-3 px-3 tabular-nums text-red-600">{formatCurrency(totWdraw)}</td>
                      <td className={`text-right py-3 px-3 tabular-nums ${totChange >= 0 ? 'text-green-700' : 'text-red-600'}`}>{formatCurrency(totChange)}</td>
                      <td className="text-right py-3 px-3 tabular-nums">{formatCurrency(totEB)}</td>
                      <td className="text-right py-3 px-3 tabular-nums text-gray-600">{formatCurrency(totFees)}</td>
                      <td className={`text-right py-3 px-3 tabular-nums ${(compGross??0) >= 0 ? 'text-green-700' : 'text-red-600'}`}>{formatPercent(compGross, 2)}</td>
                      <td className={`text-right py-3 px-3 tabular-nums ${(compNet??0) >= 0 ? 'text-green-700' : 'text-red-600'}`}>{formatPercent(compNet, 2)}</td>
                      <td className="text-center py-3 px-3 text-xs text-gray-500">{rows.filter(r=>!r.excluded).length} of {rows.length}</td>
                    </tr>
                  </tfoot>
                )}
              </table>
              {rows.some(r => r.hasPerfFee) && (
                <div className="px-4 py-2 text-xs text-gray-500 border-t border-gray-100">* Net return includes performance fee accrual</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // GIPS PRESENTATIONS COMPONENT
    // ============================================
    function GIPSPresentations() {
      const [selectedComposite, setSelectedComposite] = useState('GTFI');
      const [gipsYear, setGipsYear] = useState(new Date().getFullYear());
      const [generating, setGenerating] = useState(false);
      const [previewData, setPreviewData] = useState(null);
      const [loading, setLoading] = useState(true);

      // Hardcoded audited historical data - DO NOT MODIFY
