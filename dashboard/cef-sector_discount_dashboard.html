const SB_URL = 'https://nzinvxticgyjobkqxxhl.supabase.co';
const LS_KEY = 'gridiron_sb_key2';

function getStoredKey() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch(e) { return ''; }
}

async function sbQuery(path, key) {
  const url = SB_URL + '/rest/v1/' + path;
  const res = await fetch(url, {
    headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error('HTTP ' + res.status + ': ' + text.substring(0, 200));
  }
  return res.json();
}

// Paginated fetch
async function sbQueryAll(path, key, onProgress) {
  let all = [];
  let offset = 0;
  const limit = 1000;
  while (true) {
    const sep = path.includes('?') ? '&' : '?';
    const data = await sbQuery(path + sep + 'limit=' + limit + '&offset=' + offset, key);
    all = all.concat(data);
    if (onProgress) onProgress(all.length);
    if (data.length < limit) break;
    offset += limit;
  }
  return all;
}

function getSector(ticker, assetClass) {
  // Always check explicit maps first (our mapping overrides Supabase asset_class)
  if (EQ_SECTOR_MAP[ticker]) return EQ_SECTOR_MAP[ticker];
  if (FI_SECTOR_MAP[ticker]) return FI_SECTOR_MAP[ticker];
  // Fallback for unmapped tickers
  if (assetClass === 'EQ' || assetClass === 'Equity') return 'General';
  if (assetClass === 'FI') return 'Diversified';
  return 'Diversified';
}

function isEquity(ticker, assetClass) {
  // Always check explicit maps first
  if (EQ_SECTOR_MAP[ticker]) return true;
  if (FI_SECTOR_MAP[ticker]) return false;
  // Fallback for unmapped tickers
  if (assetClass === 'EQ' || assetClass === 'Equity') return true;
  if (assetClass === 'FI') return false;
  return false;
}

// ===== MAIN APP =====
function App() {
  const [sbKey, setSbKey] = useState(getStoredKey());
  const [keyInput, setKeyInput] = useState('');
  const [status, setStatus] = useState('idle');
  const [statusMsg, setStatusMsg] = useState('');
  const [errorMsg, setErrorMsg] = useState('');

  const [rawTickers, setRawTickers] = useState(null);
  const [rawDaily, setRawDaily] = useState(null);

  const [assetType, setAssetType] = useState('fi');
  const [timeRange, setTimeRange] = useState('all');
  const [pdfBusy, setPdfBusy] = useState(false);

  // Save key
  function saveKey() {
    const k = keyInput.trim();
    if (!k) return;
    try { localStorage.setItem(LS_KEY, k); } catch(e) {}
    setSbKey(k);
  }

  function disconnect() {
    try { localStorage.removeItem(LS_KEY); } catch(e) {}
    setSbKey('');
    setRawTickers(null);
    setRawDaily(null);
  }

  // Load data
  useEffect(() => {
    if (!sbKey) return;
    let cancelled = false;

    async function load() {
      setStatus('loading');
      setErrorMsg('');
      try {
        setStatusMsg('Step 1: Loading tickers from cef_tickers...');
        const tickers = await sbQuery(
          'cef_tickers?select=ticker,fund_name,asset_class&order=ticker',
          sbKey
        );
        if (cancelled) return;
        setStatusMsg('Got ' + tickers.length + ' tickers. Step 2: Loading monthly discounts...');

        const daily = await sbQueryAll(
          'cef_monthly_discounts?select=ticker,month_date,discount_pct',
          sbKey,
          (count) => setStatusMsg('Loading monthly discounts... ' + count.toLocaleString() + ' rows')
        );
        if (cancelled) return;
        setStatusMsg('Got ' + daily.length + ' daily rows. Processing...');

        setRawTickers(tickers);
        setRawDaily(daily);
        setStatus('ready');
        setStatusMsg('');
      } catch (err) {
        if (cancelled) return;
        console.error('Load error:', err);
        setStatus('error');
        setErrorMsg(err.message);
      }
    }
    load();
    return () => { cancelled = true; };
  }, [sbKey]);

  // ===== PROCESS DATA =====
  const processed = useMemo(() => {
    if (!rawTickers || !rawDaily) return null;

    // Build ticker metadata (normalize to uppercase to avoid duplicates like NML/nml)
    const meta = {};
    rawTickers.forEach(t => {
      const tk = t.ticker.toUpperCase();
      const eq = isEquity(tk, t.asset_class);
      const sector = getSector(tk, t.asset_class);
      meta[tk] = { sector, eq, name: t.fund_name };
    });

    // Group monthly data by ticker (view already has one row per ticker per month)
    const byTicker = {};
    rawDaily.forEach(row => {
      const tk = row.ticker.toUpperCase();
      if (!meta[tk]) return;
      if (!byTicker[tk]) byTicker[tk] = {};
      const ym = row.month_date.substring(0, 7);
      // If duplicate ticker (case variant), keep the value (they should be identical)
      byTicker[tk][ym] = Number(row.discount_pct);
    });

    // ===== OXLC DIAGNOSTICS (check browser console) =====
    const watchTickers = ['OXLC'];
    watchTickers.forEach(wt => {
      const inMeta = !!meta[wt];
      const inByTicker = !!byTicker[wt];
      const months = byTicker[wt] ? Object.keys(byTicker[wt]).sort() : [];
      console.group('%c🔍 Ticker Diagnostic: ' + wt, 'color: #b8860b; font-weight: bold');
      console.log('In cef_tickers:', inMeta ? '✅ YES — asset_class=' + (rawTickers.find(t => t.ticker.toUpperCase() === wt)?.asset_class || 'null') : '❌ NO — missing from cef_tickers table');
      console.log('In cef_monthly_discounts:', inByTicker ? '✅ YES — ' + months.length + ' months of data' : '❌ NO — zero rows in table');
      if (months.length) {
        console.log('First data point:', months[0], '→', byTicker[wt][months[0]]);
        console.log('Last data point:', months[months.length-1], '→', byTicker[wt][months[months.length-1]]);
      }
      console.groupEnd();
    });
    // Log all tickers in cef_monthly_discounts that are NOT in cef_tickers (silently dropped)
    const orphanDiscountTickers = [...new Set(rawDaily.map(r => r.ticker.toUpperCase()))].filter(t => !meta[t]);
    if (orphanDiscountTickers.length) {
      console.warn('⚠️ Tickers with discount data but NOT in cef_tickers (silently dropped):', orphanDiscountTickers.join(', '));
    }

    // Collect all months
    const monthSet = new Set();
    Object.values(byTicker).forEach(months => Object.keys(months).forEach(ym => monthSet.add(ym)));
    const allMonths = [...monthSet].sort();

    // Auto-exclude stale/defunct tickers (no data in last 3 months)
    const latestMonth = allMonths[allMonths.length - 1];
    const staleCutoff = (() => {
      const [y, m] = latestMonth.split('-').map(Number);
      const d = new Date(y, m - 1 - 3, 1); // 3 months before latest
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    })();
    const staleExcluded = [];
    Object.keys(byTicker).forEach(t => {
      const months = Object.keys(byTicker[t]).sort();
      const lastDataMonth = months[months.length - 1];
      if (lastDataMonth < staleCutoff) {
        staleExcluded.push(t);
        delete byTicker[t];
      }
    });
    if (staleExcluded.length > 0) {
      console.log('Auto-excluded stale tickers (' + staleExcluded.length + '):', staleExcluded.join(', '));
    }

    // Group tickers by sector
    const sectorTickers = {};
    Object.keys(meta).forEach(t => {
      if (!byTicker[t]) return;
      const sec = meta[t].sector;
      if (!sectorTickers[sec]) sectorTickers[sec] = [];
      sectorTickers[sec].push(t);
    });

    // Build sector-level monthly averages
    const sectors = Object.entries(sectorTickers).map(([sec, tickers]) => {
      const eq = meta[tickers[0]].eq;
      const monthly = [];

      allMonths.forEach(ym => {
        const vals = tickers
          .map(t => byTicker[t] && byTicker[t][ym] != null ? byTicker[t][ym] : null)
          .filter(v => v != null);
        if (vals.length > 0) {
          const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
          monthly.push({ date: ym, discount: Math.round(avg * 10000) / 100 });
        }
      });

      const allVals = monthly.map(m => m.discount);
      const histAvg = allVals.length ? allVals.reduce((s, v) => s + v, 0) / allVals.length : 0;
      const current = monthly.length ? monthly[monthly.length - 1].discount : null;

      return {
        sector: sec, eq, tickers, monthly,
        histAvg: Math.round(histAvg * 100) / 100,
        min: allVals.length ? Math.round(Math.min(...allVals) * 100) / 100 : 0,
        max: allVals.length ? Math.round(Math.max(...allVals) * 100) / 100 : 0,
        current,
        diff: current != null ? Math.round((current - histAvg) * 100) / 100 : null,
        count: tickers.length,
      };
    });

    const eq = sectors.filter(s => s.eq).sort((a, b) => {
      const ai = EQ_SECTOR_ORDER.indexOf(a.sector);
      const bi = EQ_SECTOR_ORDER.indexOf(b.sector);
      if (ai >= 0 && bi >= 0) return ai - bi;
      if (ai >= 0) return -1;
      if (bi >= 0) return 1;
      return b.count - a.count;
    });
    const fi = sectors.filter(s => !s.eq).sort((a, b) => {
      const ai = FI_SECTOR_ORDER.indexOf(a.sector);
      const bi = FI_SECTOR_ORDER.indexOf(b.sector);
      if (ai >= 0 && bi >= 0) return ai - bi;
      if (ai >= 0) return -1;
      if (bi >= 0) return 1;
      return b.count - a.count;
    });
    const latestDate = rawDaily.length ? rawDaily[rawDaily.length - 1].month_date : '—';

    return { eq, fi, latestDate, staleExcluded };
  }, [rawTickers, rawDaily]);

  // Time filter
  function filterByTime(monthly) {
    if (timeRange === 'all' || !monthly.length) return monthly;
    const last = monthly[monthly.length - 1].date;
    const y = parseInt(last.substring(0, 4));
    const m = parseInt(last.substring(5, 7));
    const yrs = timeRange === '1y' ? 1 : timeRange === '3y' ? 3 : 5;
    const cutoff = (y - yrs) + '-' + String(m).padStart(2, '0');
    return monthly.filter(d => d.date >= cutoff);
  }

  // ===== PDF EXPORT =====
  async function exportPDF() {
    if (!processed) return;
    setPdfBusy(true);
    try {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('l', 'mm', 'a4');
      const W = pdf.internal.pageSize.getWidth();
      const H = pdf.internal.pageSize.getHeight();
      const mg = 12;
      const secs = assetType === 'fi' ? processed.fi : processed.eq;
      const label = assetType === 'fi' ? 'Fixed Income' : 'Equity';
      const totalPages = Math.ceil(secs.length / 3);

      // Date range
      const allData = secs.flatMap(s => s.monthly);
      const firstDate = allData.length ? allData[0].date : '';
      const lastDate = allData.length ? allData[allData.length - 1].date : '';
      function fmtDate(ym) {
        if (!ym) return '';
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const parts = ym.split('-');
        return months[parseInt(parts[1]) - 1] + '-' + parts[0].substring(2);
      }
      const dateRange = fmtDate(firstDate) + ' \u2013 ' + fmtDate(lastDate);

      function drawHeader(pageNum) {
        // Logo top-right (120x81 original, render ~18mm wide - compact)
        const logoW = 18;
        const logoH = logoW * (81 / 120);
        try {
          pdf.addImage(GP_LOGO_B64, 'PNG', W - mg - logoW, 3, logoW, logoH);
        } catch(e) { console.warn('Logo error:', e); }

        // Date range below gold line, right-aligned
        pdf.setFontSize(7);
        pdf.setFont('helvetica', 'normal');
        pdf.setTextColor(99, 102, 107);
        pdf.text(dateRange, W - mg, 23, { align: 'right' });

        // Title top-left in GOLD
        pdf.setFontSize(14);
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(202, 170, 121);
        pdf.text('GRIDIRON PARTNERS', mg, 9);

        // Subtitle in gray
        pdf.setFontSize(8);
        pdf.setFont('helvetica', 'normal');
        pdf.setTextColor(99, 102, 107);
        pdf.text('CEF ' + label + ' Sector Discounts \u2014 Sector Detail', mg, 15);

        // Gold accent line under header
        pdf.setDrawColor(202, 170, 121);
        pdf.setLineWidth(0.8);
        pdf.line(mg, 19, W - mg, 19);

        // Page number bottom-right
        pdf.setFontSize(7);
        pdf.setTextColor(150, 150, 150);
        pdf.text('Page ' + pageNum + ' of ' + totalPages, W - mg, H - 5, { align: 'right' });
      }

      function drawSectorSlot(s, slotIdx, chartData) {
        const headerEnd = 27;
        const disclosureReserve = 18;
        const usableH = H - headerEnd - disclosureReserve;
        const topY = headerEnd + slotIdx * (usableH / 3);
        const slotH = usableH / 3 - 4;
        const chartW = W * 0.58;
        const chartH = slotH - 16;
        const chartX = mg;
        const chartY = topY + 14;
        const tableX = mg + chartW + 10;
        const tableW = W - tableX - mg;

        // Sector title
        pdf.setFontSize(12);
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(0, 0, 0);
        pdf.text(s.sector, mg, topY + 8);

        // ---- Stats table on the right ----
        const tblY = topY + 2;
        const labelW = tableW * 0.34;
        const dataColW = (tableW - labelW) / 3;
        const col0 = tableX;
        const col1 = tableX + labelW;
        const col2 = col1 + dataColW;
        const col3 = col2 + dataColW;
        const rowH = 8;

        // Header row - gold fills across 3 data columns
        pdf.setFillColor(202, 170, 121);
        pdf.rect(col1, tblY, dataColW, rowH, 'F');
        pdf.rect(col2, tblY, dataColW, rowH, 'F');
        pdf.rect(col3, tblY, dataColW, rowH, 'F');
        pdf.setFontSize(8);
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(255, 255, 255);
        pdf.text('Current', col1 + dataColW / 2, tblY + 5.5, { align: 'center' });
        pdf.text('Hist Avg', col2 + dataColW / 2, tblY + 5.5, { align: 'center' });
        pdf.text('Diff', col3 + dataColW / 2, tblY + 5.5, { align: 'center' });

        // Sector data row
        const r1Y = tblY + rowH;
        pdf.setFillColor(245, 245, 245);
        pdf.rect(col0, r1Y, tableW, rowH, 'F');
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(0, 0, 0);
        pdf.setFontSize(8);
        pdf.text(s.sector, col0 + 2, r1Y + 5.5);
        pdf.setFont('helvetica', 'normal');
        pdf.text(s.current != null ? s.current.toFixed(1) + '%' : '\u2014', col1 + dataColW / 2, r1Y + 5.5, { align: 'center' });
        pdf.text(s.histAvg.toFixed(1) + '%', col2 + dataColW / 2, r1Y + 5.5, { align: 'center' });
        // Diff with color
        const diffVal = s.diff;
        if (diffVal != null) {
          if (diffVal > 0.1) { pdf.setFillColor(254, 226, 226); }
          else if (diffVal < -0.1) { pdf.setFillColor(209, 250, 229); }
          else { pdf.setFillColor(245, 245, 245); }
          pdf.rect(col3, r1Y, dataColW, rowH, 'F');
          pdf.setTextColor(0, 0, 0);
          pdf.setFont('helvetica', 'bold');
          pdf.text((diffVal >= 0 ? '+' : '') + diffVal.toFixed(1) + 'pp', col3 + dataColW / 2, r1Y + 5.5, { align: 'center' });
        }

        // Range row
        const r2Y = r1Y + rowH;
        pdf.setFillColor(255, 255, 255);
        pdf.rect(col0, r2Y, tableW, rowH, 'F');
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(0, 0, 0);
        pdf.text('Range', col0 + 2, r2Y + 5.5);
        pdf.setFont('helvetica', 'normal');
        pdf.text(s.min.toFixed(1) + '%', col1 + dataColW / 2, r2Y + 5.5, { align: 'center' });
        pdf.text(s.max.toFixed(1) + '%', col2 + dataColW / 2, r2Y + 5.5, { align: 'center' });
        const rangeWidth = Math.round((s.max - s.min) * 10) / 10;
        pdf.text(rangeWidth.toFixed(1) + 'pp', col3 + dataColW / 2, r2Y + 5.5, { align: 'center' });

        // Table borders
        pdf.setDrawColor(200, 200, 200);
        pdf.setLineWidth(0.3);
        pdf.rect(col0, tblY, tableW, rowH * 3);
        pdf.line(col0, tblY + rowH, col0 + tableW, tblY + rowH);
        pdf.line(col0, tblY + rowH * 2, col0 + tableW, tblY + rowH * 2);

        // ---- Chart ----
        if (chartData.length > 1) {
          const vals = chartData.map(d => d.discount);
          const yMin = Math.floor(Math.min(Math.min(...vals), s.histAvg) - 2);
          const yMax = Math.ceil(Math.max(Math.max(...vals), s.histAvg) + 2);
          const yRange = yMax - yMin || 1;

          // Y-axis grid and labels
          const numGridLines = 5;
          const yStep = yRange / numGridLines;
          pdf.setDrawColor(230, 230, 230);
          pdf.setLineWidth(0.15);
          for (let g = 0; g <= numGridLines; g++) {
            const gy = chartY + (g / numGridLines) * chartH;
            pdf.line(chartX, gy, chartX + chartW, gy);
            const gv = yMax - (g / numGridLines) * yRange;
            pdf.setFontSize(7);
            pdf.setTextColor(100, 100, 100);
            pdf.text(Math.round(gv) + '%', chartX - 2, gy + 1, { align: 'right' });
          }

          // Hist avg band (light gold shading ±0.5%)
          const bandTop = chartY + ((yMax - s.histAvg - 0.8) / yRange) * chartH;
          const bandBot = chartY + ((yMax - s.histAvg + 0.8) / yRange) * chartH;
          pdf.setFillColor(202, 170, 121);
          pdf.setGState && pdf.setGState(new pdf.GState({opacity: 0.15}));
          pdf.rect(chartX, bandTop, chartW, bandBot - bandTop, 'F');
          pdf.setGState && pdf.setGState(new pdf.GState({opacity: 1}));

          // Hist avg line (solid gold)
          const avgYpos = chartY + ((yMax - s.histAvg) / yRange) * chartH;
          pdf.setDrawColor(202, 170, 121);
          pdf.setLineWidth(0.8);
          pdf.line(chartX, avgYpos, chartX + chartW, avgYpos);
          // "H" label at right end
          pdf.setFontSize(8);
          pdf.setTextColor(202, 170, 121);
          pdf.setFont('helvetica', 'bold');
          pdf.text('H', chartX + chartW + 2, avgYpos + 1);

          // Area fill (gray)
          // Use polygon for fill - build path
          const pts = chartData.map((d, di) => ({
            x: chartX + (di / (chartData.length - 1)) * chartW,
            y: chartY + ((yMax - d.discount) / yRange) * chartH
          }));

          // Data line (dark)
          pdf.setDrawColor(31, 41, 55);
          pdf.setLineWidth(0.6);
          pdf.setFont('helvetica', 'normal');
          for (let di = 1; di < pts.length; di++) {
            pdf.line(pts[di - 1].x, pts[di - 1].y, pts[di].x, pts[di].y);
          }

          // X-axis labels (Apr-13, Oct-14, Apr-16, etc.)
          pdf.setFontSize(6);
          pdf.setTextColor(100, 100, 100);
          const li = Math.max(1, Math.floor(chartData.length / 7));
          chartData.forEach((d, di) => {
            const isInterval = di % li === 0;
            const isLast = di === chartData.length - 1;
            // Skip last label if it's within half an interval of the previous label
            if (isLast && !isInterval) {
              const prevLabelIdx = Math.floor((chartData.length - 1) / li) * li;
              if ((chartData.length - 1) - prevLabelIdx < li * 0.6) return;
            }
            if (isInterval || isLast) {
              pdf.text(fmtDate(d.date), pts[di].x, chartY + chartH + 5, { align: 'center' });
            }
          });

          // Chart border (bottom and left)
          pdf.setDrawColor(180, 180, 180);
          pdf.setLineWidth(0.3);
          pdf.line(chartX, chartY + chartH, chartX + chartW, chartY + chartH);
          pdf.line(chartX, chartY, chartX, chartY + chartH);
        }
      }

      // Generate pages
      for (let i = 0; i < secs.length; i++) {
        if (i % 3 === 0) {
          if (i > 0) pdf.addPage();
          drawHeader(Math.floor(i / 3) + 1);
        }
        drawSectorSlot(secs[i], i % 3, filterByTime(secs[i].monthly));
      }

      // Disclosure at bottom of last page
      pdf.setFontSize(5);
      pdf.setTextColor(100, 100, 100);
      pdf.setFont('helvetica', 'normal');
      const discLines = pdf.splitTextToSize(DISCLOSURE, W - 2 * mg);
      pdf.text(discLines, mg, H - 15);

      pdf.save('CEF_' + (assetType === 'fi' ? 'FI' : 'Equity') + '_Sector_Discounts_' + new Date().toISOString().split('T')[0] + '.pdf');
    } catch (err) {
      console.error(err);
      alert('PDF error: ' + err.message);
    }
    setPdfBusy(false);
  }

  // ===== RENDER =====

  // No key — show login
  if (!sbKey) {
    return (
      <div className="max-w-lg mx-auto mt-20 bg-white rounded-lg shadow p-8">
        <h2 className="text-xl font-bold mb-2">Gridiron CEF Sector Discount Dashboard</h2>
        <p className="text-gray-500 text-sm mb-6">Connect to Supabase to load your CEF data.</p>
        <div className="flex gap-2">
          <input
            type="password"
            className="flex-1 border rounded px-3 py-2 text-sm font-mono"
            placeholder="Paste Supabase anon key (eyJ...)"
            value={keyInput}
            onChange={e => setKeyInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && saveKey()}
          />
          <button className="bg-blue-600 text-white px-4 py-2 rounded text-sm font-semibold" onClick={saveKey}>Connect</button>
        </div>
      </div>
    );
  }

  // Loading
  if (status === 'loading') {
    return (
      <div className="text-center py-20">
        <div className="inline-block w-8 h-8 border-4 border-gray-200 border-t-yellow-600 rounded-full animate-spin mb-4"></div>
        <div className="text-gray-600 text-sm">{statusMsg || 'Loading...'}</div>
        <div className="text-gray-400 text-xs mt-2">This may take a moment for large datasets</div>
      </div>
    );
  }

  // Error
  if (status === 'error') {
    return (
      <div className="max-w-2xl mx-auto mt-10">
        <div className="bg-red-50 border border-red-200 rounded-lg p-6">
          <h3 className="text-red-800 font-bold mb-2">Failed to load data</h3>
          <pre className="text-red-700 text-xs whitespace-pre-wrap mb-4">{errorMsg}</pre>
          <div className="flex gap-3">
            <button className="bg-blue-600 text-white px-4 py-2 rounded text-sm" onClick={() => { setSbKey(sbKey + ' '); setTimeout(() => setSbKey(sbKey), 10); }}>Retry</button>
            <button className="bg-gray-200 text-gray-700 px-4 py-2 rounded text-sm" onClick={disconnect}>Disconnect</button>
          </div>
        </div>
        <div className="mt-4 text-xs text-gray-400">
          <p>Common fixes:</p>
          <ul className="list-disc ml-4 mt-1">
            <li>Check that cef_tickers, cef_daily, and cef_monthly_discounts view exist</li>
            <li>Ensure RLS policies allow SELECT for anon key on all tables/views</li>
            <li>Verify column names: ticker, fund_name, asset_class (tickers) / ticker, month_date, discount_pct (view)</li>
          </ul>
        </div>
      </div>
    );
  }

  // No data yet
  if (!processed) {
    return <div className="text-center py-20 text-gray-400">Waiting for data...</div>;
  }

  const sectors = assetType === 'fi' ? processed.fi : processed.eq;

  return (
    <div>
      {/* Config bar */}
      <div className="bg-blue-50 border-b border-blue-200 px-5 py-2 flex justify-between items-center text-xs no-print">
        <div className="flex items-center gap-2">
          <span>🔑 Connected</span>
          <span className="text-green-600 font-bold">✓</span>
          <span className="text-gray-400">|</span>
          <span className="text-gray-500">{rawTickers?.length} tickers, {rawDaily?.length?.toLocaleString()} daily rows</span>
        </div>
        <div className="flex gap-2">
          <button className="bg-blue-100 text-blue-700 border border-blue-300 rounded px-3 py-1 text-xs" onClick={() => window.location.reload()}>↻ Refresh</button>
          <button className="bg-gray-200 text-gray-600 rounded px-3 py-1 text-xs" onClick={disconnect}>Disconnect</button>
        </div>
      </div>

      {/* Header */}
      <div className="gold-bg px-6 py-4 flex justify-between items-center flex-wrap gap-3">
        <div>
          <h1 className="text-xl font-bold text-white">CEF Sector Discount Dashboard</h1>
          <div className="text-white text-xs opacity-80 mt-1">
            Gridiron Partners • Data through {processed.latestDate} • {sectors.length} Sectors • {sectors.reduce((s, sec) => s + sec.count, 0)} Funds
            {processed.staleExcluded && processed.staleExcluded.length > 0 && (
              <span title={processed.staleExcluded.join(', ')}> • {processed.staleExcluded.length} stale ticker{processed.staleExcluded.length > 1 ? 's' : ''} auto-excluded</span>
            )}
          </div>
        </div>
        <div className="flex items-center gap-3 flex-wrap">
          {/* Asset toggle */}
          <div className="inline-flex rounded-md overflow-hidden border-2 border-white border-opacity-30">
            <button className={`px-4 py-1 text-xs font-semibold ${assetType === 'equity' ? 'bg-white text-yellow-700' : 'text-white text-opacity-70'}`} onClick={() => setAssetType('equity')}>
              Equity ({processed.eq.length})
            </button>
            <button className={`px-4 py-1 text-xs font-semibold ${assetType === 'fi' ? 'bg-white text-yellow-700' : 'text-white text-opacity-70'}`} onClick={() => setAssetType('fi')}>
              Fixed Income ({processed.fi.length})
            </button>
          </div>
          {/* Time range */}
          <div className="flex gap-1">
            {['1y', '3y', '5y', 'all'].map(r => (
              <button key={r} className={`px-3 py-1 text-xs rounded border ${timeRange === r ? 'bg-yellow-700 text-white border-yellow-700' : 'bg-white text-gray-600 border-gray-300'}`} onClick={() => setTimeRange(r)}>
                {r.toUpperCase()}
              </button>
            ))}
          </div>
          <button className="border border-white border-opacity-40 text-white rounded px-3 py-1 text-xs no-print" onClick={exportPDF} disabled={pdfBusy}>
            {pdfBusy ? '⏳...' : '📄 PDF'}
          </button>
        </div>
      </div>

      <div className="p-5">
        {/* Summary Table */}
        <div className="bg-white border rounded-lg overflow-hidden mb-6">
          <table className="w-full text-xs">
            <thead>
              <tr style={{ background: 'rgb(202,170,121)' }} className="text-white">
                <th className="text-left py-2 px-3">Sector</th>
                <th className="text-right py-2 px-3">Funds</th>
                <th className="text-right py-2 px-3">Current</th>
                <th className="text-right py-2 px-3">Hist Avg</th>
                <th className="text-right py-2 px-3">Diff (pp)</th>
                <th className="text-right py-2 px-3">Min</th>
                <th className="text-right py-2 px-3">Max</th>
              </tr>
            </thead>
            <tbody>
              {sectors.map((s, i) => {
                const dc = s.diff != null ? (s.diff < -0.5 ? '#059669' : s.diff > 0.5 ? '#dc2626' : '#1f2937') : '#6b7280';
                var diffBg = '#ffffff';
                if (s.diff != null && s.diff < 0) diffBg = '#d1fae5';
                if (s.diff != null && s.diff > 0) diffBg = '#fee2e2';
                return (
                  <tr key={s.sector} className="border-b hover:bg-yellow-50">
                    <td className="py-2 px-3 font-semibold" style={{ color: SEC_COLORS[i % SEC_COLORS.length] }}>{s.sector}</td>
                    <td className="text-right py-2 px-3">{s.count}</td>
                    <td className="text-right py-2 px-3">{s.current != null ? s.current.toFixed(2) + '%' : '—'}</td>
                    <td className="text-right py-2 px-3">{s.histAvg.toFixed(2)}%</td>
                    <td className="text-right py-2 px-3 font-semibold" style={{ color: dc, background: diffBg }}>{s.diff != null ? (s.diff >= 0 ? '+' : '') + s.diff.toFixed(2) : '—'}</td>
                    <td className="text-right py-2 px-3">{s.min.toFixed(2)}%</td>
                    <td className="text-right py-2 px-3">{s.max.toFixed(2)}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Sector Charts */}
        {sectors.map((s, si) => {
          const data = filterByTime(s.monthly);
          const goldHex = '#CAA879';
          const interval = Math.max(1, Math.floor(data.length / 12));

          return (
            <div key={s.sector} className="bg-white border rounded-lg p-4 mb-5">
              <div className="flex justify-between items-baseline mb-1">
                <div>
                  <div className="text-sm font-bold" style={{ color: SEC_COLORS[si % SEC_COLORS.length] }}>{s.sector}</div>
                  <div className="text-xs text-gray-500">
                    {s.count} funds • Current: {s.current != null ? s.current.toFixed(2) + '%' : '—'} •
                    Hist Avg: {s.histAvg.toFixed(2)}% •
                    Diff: <span style={{ color: s.diff < -0.5 ? '#059669' : s.diff > 0.5 ? '#dc2626' : '#1f2937', fontWeight: 600 }}>
                      {s.diff != null ? (s.diff >= 0 ? '+' : '') + s.diff.toFixed(2) + 'pp' : '—'}
                    </span> •
                    Range: [{s.min.toFixed(1)}%, {s.max.toFixed(1)}%]
                  </div>
                </div>
              </div>

              {data.length > 1 ? (
                <ResponsiveContainer width="100%" height={200}>
                  <ComposedChart data={data} margin={{ top: 15, right: 60, left: 10, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                    <XAxis dataKey="date" tick={{ fontSize: 9, fill: '#666' }} interval={interval} />
                    <YAxis tick={{ fontSize: 9, fill: '#666' }} tickFormatter={v => v.toFixed(0) + '%'} domain={['auto', 'auto']} />
                    <Tooltip formatter={v => v != null ? v.toFixed(2) + '%' : '—'} />
                    <ReferenceLine y={s.histAvg} stroke={goldHex} strokeWidth={2}
                      label={{ value: 'Hist Avg (' + s.histAvg.toFixed(1) + '%)', position: 'right', fontSize: 9, fill: goldHex, fontWeight: 'bold' }} />
                    <Area type="monotone" dataKey="discount" fill="#d1d5db" fillOpacity={0.3} stroke="none" isAnimationActive={false} connectNulls={true} />
                    <Line type="monotone" dataKey="discount" stroke="#1f2937" strokeWidth={2} dot={false} connectNulls={true} isAnimationActive={false} />
                  </ComposedChart>
                </ResponsiveContainer>
              ) : (
                <div className="py-8 text-center text-gray-400 text-sm">Insufficient data for chart</div>
              )}
            </div>
          );
        })}

        {/* Disclosure */}
        <div className="mt-6 pt-4 border-t text-gray-400" style={{ fontSize: '9px', lineHeight: '1.5', whiteSpace: 'pre-wrap' }}>
          {DISCLOSURE}
        </div>
      </div>
    </div>
  );
}



// ═══════════════════════════════════════════════
// EMBED MODE: Parent window captures sector charts via postMessage
// ═══════════════════════════════════════════════
(function() {
  if (window.parent === window) return;
  
  window.addEventListener('message', async function(e) {
    const msg = e.data;
    if (!msg || !msg.type) return;
    
    if (msg.type === 'gp-embed-init') {
      // Auto-set Supabase key
      if (msg.key) {
        try { localStorage.setItem('gridiron_sb_key2', msg.key); } catch(ex) {}
        // Reload to pick up the key
        location.reload();
      }
    }
    
    if (msg.type === 'gp-set-asset-type') {
      // Click the FI or EQ tab button
      const buttons = document.querySelectorAll('button');
      buttons.forEach(b => {
        if (msg.assetType === 'fi' && b.textContent.includes('Fixed Income')) b.click();
        if (msg.assetType === 'eq' && b.textContent.includes('Equity')) b.click();
      });
      await new Promise(r => setTimeout(r, 300));
      window.parent.postMessage({ type: 'gp-asset-type-set' }, '*');
    }
    
    if (msg.type === 'gp-capture-sector') {
      // Capture a single sector chart by name
      const { id, sectorName } = msg;
      await new Promise(r => setTimeout(r, 200));
      
      const allCharts = document.querySelectorAll('.bg-white.border.rounded-lg');
      let target = null;
      
      allCharts.forEach(el => {
        const nameEl = el.querySelector('.text-sm.font-bold');
        if (nameEl && nameEl.textContent.trim() === sectorName) {
          target = el;
        }
      });
      
      if (!target) {
        window.parent.postMessage({ type: 'gp-capture-sector-done', id, image: null, error: 'Not found: ' + sectorName }, '*');
        return;
      }
      
      try {
        const canvas = await html2canvas(target, {
          scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff'
        });
        const image = canvas.toDataURL('image/jpeg', 0.85);
        window.parent.postMessage({ type: 'gp-capture-sector-done', id, sectorName, image }, '*');
      } catch(err) {
        window.parent.postMessage({ type: 'gp-capture-sector-done', id, image: null, error: err.message }, '*');
      }
    }
  });
  
  // Poll for data readiness and notify parent
  const checkReady = setInterval(() => {
    const charts = document.querySelectorAll('.bg-white.border.rounded-lg');
    if (charts.length > 0) {
      clearInterval(checkReady);
      // Collect sector names
      const sectorNames = [];
      charts.forEach(el => {
        const nameEl = el.querySelector('.text-sm.font-bold');
        if (nameEl) sectorNames.push(nameEl.textContent.trim());
      });
      window.parent.postMessage({ type: 'gp-data-ready', sectorNames }, '*');
    }
  }, 500);
})();

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
