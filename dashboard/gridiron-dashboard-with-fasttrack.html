        const positiveMonths = finalNetReturns.filter(r => r > 0).length;
        const pctPositive = positiveMonths / finalNetReturns.length;
        
        // Benchmark metrics
        const bench1StdDev = calcStdDev(benchmark1Returns);
        const bench1Cum = calcCumulative(benchmark1Returns);
        const bench1Ann = calcAnnualized(bench1Cum, benchmark1Returns.length);
        const bench1Sharpe = bench1StdDev > 0 ? bench1Ann / bench1StdDev : 0;
        const bench1Positive = benchmark1Returns.filter(r => r > 0).length / benchmark1Returns.length;
        
        const bench2StdDev = calcStdDev(benchmark2Returns);
        const bench2Cum = calcCumulative(benchmark2Returns);
        const bench2Ann = calcAnnualized(bench2Cum, benchmark2Returns.length);
        const bench2Sharpe = bench2StdDev > 0 ? bench2Ann / bench2StdDev : 0;
        const bench2Positive = benchmark2Returns.filter(r => r > 0).length / benchmark2Returns.length;
        
        // Alpha, Beta, Correlation, R-squared vs benchmarks (using final returns)
        const corrBench1 = calcCorrelation(finalNetReturns, benchmark1Returns);
        const corrBench2 = calcCorrelation(finalNetReturns, benchmark2Returns);
        const betaBench1 = calcBeta(finalNetReturns, benchmark1Returns);
        const betaBench2 = calcBeta(finalNetReturns, benchmark2Returns);
        // Alpha = Portfolio Return - Beta * Benchmark Return (simplified, 0% RF)
        const alphaBench1 = annReturn - betaBench1 * bench1Ann;
        const alphaBench2 = annReturn - betaBench2 * bench2Ann;
        
        // Performance periods (use final returns which include overrides)
        const oneYearData = data.slice(-12);
        const threeYearData = data.slice(-36);
        const fiveYearData = data.slice(-60);
        
        const oneYearReturns = oneYearData.map((d, i) => finalNetReturns[data.length - oneYearData.length + i]);
        const threeYearReturns = threeYearData.map((d, i) => finalNetReturns[data.length - threeYearData.length + i]);
        const fiveYearReturns = fiveYearData.map((d, i) => finalNetReturns[data.length - fiveYearData.length + i]);
        
        const oneYearBench1 = oneYearData.map((d, i) => benchmark1Returns[data.length - oneYearData.length + i]);
        const threeYearBench1 = threeYearData.map((d, i) => benchmark1Returns[data.length - threeYearData.length + i]);
        const fiveYearBench1 = fiveYearData.map((d, i) => benchmark1Returns[data.length - fiveYearData.length + i]);
        
        const oneYearBench2 = oneYearData.map((d, i) => benchmark2Returns[data.length - oneYearData.length + i]);
        const threeYearBench2 = threeYearData.map((d, i) => benchmark2Returns[data.length - threeYearData.length + i]);
        const fiveYearBench2 = fiveYearData.map((d, i) => benchmark2Returns[data.length - fiveYearData.length + i]);
        
        // QTD and YTD for benchmarks
        const ytdBench1Returns = benchmark1Returns.slice(-ytdData.length);

        return {

          changeInValueMtd, changeInValueQtd, changeInValueYtd,

          bench2StdDev, bench2Sharpe, bench2Positive,
          // Correlation metrics
          corrBench1, corrBench2, betaBench1, betaBench2, alphaBench1, alphaBench2,
          rSquaredBench1: corrBench1 * corrBench1,
          rSquaredBench2: corrBench2 * corrBench2,
          // Performance (net of all fees)

          // 1 Year (only if 12+ months of data)

                          const isInternal = freshClient?.fee_payment === 'Internal';
                          console.log(`Recalc: ${freshClient.client_name}, fee_payment=${freshClient.fee_payment}, isInternal=${isInternal}`);
                          
                          const allData = await supabaseFetch('monthly_data', `?client_id=eq.${selectedClientId}&order=month_end_date`);
                          if (!allData || allData.length === 0) { alert('No monthly data found.'); return; }
                          
                          // Get fee schedule for this client
                          const feeScheds = await supabaseFetch('fee_schedule', `?client_id=eq.${selectedClientId}&order=effective_date`);
                          
                          const getFeeRate = (monthEndDate) => {
                            if (feeScheds && feeScheds.length > 0) {
                              const applicable = feeScheds.filter(s => s.effective_date <= monthEndDate).sort((a, b) => b.effective_date.localeCompare(a.effective_date))[0];
                              if (applicable) return applicable.annual_mgmt_fee_rate || 0;
                            }
                            return freshClient?.annual_mgmt_fee_rate || freshClient?.annual_mgmt_fee || 0.0075;
                          };
                          
                          let updated = 0;
                          let errors = 0;
                          
                          for (let i = 0; i < allData.length; i++) {
                            const d = allData[i];
                            const begin = d.beginning_balance || 0;
                            const end = d.ending_balance || 0;
                            const contrib = d.contributions || 0;
                            const withdr = d.withdrawals || 0;
                            
                            if (begin <= 0 && contrib <= 0) continue;
                            
                            const annualRate = getFeeRate(d.month_end_date);
                            const isFeePaymentMonth = isInternal && d.withdrawal_type === 'fee_payment';
                            
                            // For fee_payment months on Internal clients, the withdrawal is a fee
                            // disbursement, not an investment flow. Separate it for correct calculations:
                            // - mgmt fee: based on ending balance (matches custodian's actual charge)
                            // - Modified Dietz: include fee_payment as withdrawal so it gets added back
                            //   to gain (the ending balance is reduced by the fee payment)
                            const feePaymentAmt = isFeePaymentMonth ? Math.abs(withdr) : 0;
                            const regularWithdr = isFeePaymentMonth ? 0 : withdr;
                            const hasRegularFlows = contrib !== 0 || regularWithdr !== 0;
                            
                            // Calculate management fee (rate-based)
                            // For fee_payment months: use ending balance * rate/12 (the fee_payment
                            // withdrawal is a disbursement, not an investment flow that should affect
                            // the fee base)
                            let mgmtFee;
                            if (isFeePaymentMonth) {
                              mgmtFee = end * (annualRate / 12);
                            } else if (hasRegularFlows) {
                              mgmtFee = calcTimeWeightedMgmtFee(begin, contrib, withdr, d.day_of_flow, d.month_end_date, annualRate, d.contribution_day, d.withdrawal_day);
                            } else {
                              mgmtFee = end * (annualRate / 12);
                            }
                            
                            // Modified Dietz: include ALL withdrawals (fee_payment gets added back to
                            // gain since the ending balance is reduced by the fee disbursement)
                            const rawReturn = calcModifiedDietz(begin, end, contrib, withdr, d.day_of_flow, d.month_end_date, d.contribution_day, d.withdrawal_day);
                            
                            let grossPct, netPct;
                            if (isInternal && isFeePaymentMonth) {
                              // Fee_payment month: the fee_payment withdrawal IS the fee leaving the account.
                              // Gross = raw Modified Dietz (adds back fee_withdrawal to gain, don't also add mgmt_fee)
                              // Net = Gross minus rate-based mgmt fee impact
                              grossPct = rawReturn;
                              const avgCap = begin + (() => {
                                const absW = Math.abs(withdr);
                                if (d.withdrawal_day) {
                                  const dim = parseInt((d.month_end_date || '').split('-')[2]) || 30;
                                  return -absW * (dim - d.withdrawal_day) / dim;
                                }
                                return 0;
                              })();
                              netPct = grossPct - (mgmtFee / (avgCap || begin));
                            } else if (isInternal) {
                              // Internal: ending balance already has monthly mgmt fee deducted
                              // rawReturn is NET, add mgmt fee back to ending for GROSS
                              grossPct = calcModifiedDietz(begin, end + mgmtFee, contrib, withdr, d.day_of_flow, d.month_end_date, d.contribution_day, d.withdrawal_day);
                              netPct = rawReturn;
                            } else {
                              // External: ending balance is before fee deduction
                              grossPct = rawReturn;
                              const gain = end - begin - contrib + Math.abs(withdr || 0);
                              const denom = rawReturn !== 0 ? Math.abs(gain / rawReturn) : (begin > 0 ? begin : contrib);
                              netPct = rawReturn - (mgmtFee / denom);
                            }
                            
                            if (isFeePaymentMonth) {
                              console.log(`Recalc fee_payment month ${d.month_end_date}:`, {
                                begin, end, feePaymentAmt, mgmtFee,
                                grossPct: (grossPct*100).toFixed(4) + '%',
                                netPct: (netPct*100).toFixed(4) + '%',
                                oldGross: d.gross_return_pct ? (d.gross_return_pct*100).toFixed(4) + '%' : 'null',
                                oldNet: d.net_return_pct ? (d.net_return_pct*100).toFixed(4) + '%' : 'null'
                              });
                            }
                            
                            // Update DB
                            const patchBody = {
                              gross_return_pct: grossPct,
                              net_return_pct: netPct,
                              management_fee: mgmtFee,
                              net_all_fees_return_pct: netPct
                            };
                            
                            try {
                              const resp = await fetch(
                                `${SUPABASE_URL}/rest/v1/monthly_data?client_id=eq.${selectedClientId}&month_end_date=eq.${d.month_end_date}`,
                                {
                                  method: 'PATCH',
                                  headers: {
                                    'apikey': SUPABASE_ANON_KEY,
                                    'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,
                                    'Content-Type': 'application/json',
                                    'Prefer': 'return=minimal'
                                  },
                                  body: JSON.stringify(patchBody)
                                }
                              );
                              if (resp.ok) updated++;
                              else {
                                console.error(`Recalc PATCH failed for ${d.month_end_date}: ${resp.status} ${await resp.text()}`);
                                errors++;
                              }
                            } catch (fetchErr) {
                              console.error(`Recalc fetch error for ${d.month_end_date}:`, fetchErr);
                              errors++;
                            }
                            // Throttle: small delay every 10 requests to avoid rate limits
                            if (i > 0 && i % 10 === 0) {
                              await new Promise(r => setTimeout(r, 100));
                            }
                          }
                          
                          alert(`Recalculation complete!\n${updated} months updated, ${errors} errors.\n\nRefreshing data...`);
                          
                          // Refresh monthly data
                          const refreshData = await supabaseFetch('monthly_data', `?client_id=eq.${selectedClientId}&order=month_end_date`);

                          // Refresh clients in case fee_payment was updated

                          if (refreshClients) setClients(refreshClients);
                          
                        } catch (err) {
                          console.error('Recalculation error:', err);
                          alert('Error during recalculation: ' + err.message);
                        }
                      }}
                      className="px-4 py-2 bg-orange-600 text-white rounded hover:bg-orange-700 text-sm"

                    </p>

                    <form onSubmit={async (e) => {
                      e.preventDefault();
                      const form = e.target;
                      const clientId = parseInt(form.client_id.value);
                      const monthEndDate = form.month_end_date.value;
                      const endingBalance = parseFloat(form.ending_balance.value) || 0;
                      const contributions = parseFloat(form.contributions.value) || 0;

                    try {
                      // Get prior month's ending balance to use as beginning balance

                      );
                      const beginningBalance = priorMonthData.length > 0 ? priorMonthData[0].ending_balance : 0;
                      
                      const data = {
                        client_id: clientId,
                        month_end_date: monthEndDate,
                        beginning_balance: beginningBalance,
                        ending_balance: endingBalance,
                        contributions: contributions,
                        withdrawals: totalWithdrawals > 0 ? -totalWithdrawals : 0,
                        withdrawal_type: withdrawalType,
                        contribution_day: contributionDay,
                        withdrawal_day: withdrawalDay,
                        day_of_flow: contributionDay || withdrawalDay  // Keep in sync for views
                      };

                      // Calculate and store gross/net returns and fees

                      const hasFlows = beginningBalance > 0 || contributions > 0;
                      if (hasFlows) {
                        const isInternal = saveClient?.fee_payment === 'Internal';
                        const annualRate = saveClient?.annual_mgmt_fee_rate || saveClient?.annual_mgmt_fee || 0.0075;
                        const isFeePaymentMonth = isInternal && withdrawalType === 'fee_payment';
                        
                        // Management fee: for fee_payment months use ending * rate/12
                        // (fee_payment withdrawal is a disbursement, not an investment flow)
                        if (isFeePaymentMonth) {
                          data.management_fee = endingBalance * (annualRate / 12);
                        } else if (contributions > 0 || withdrawals > 0) {
                          data.management_fee = calcTimeWeightedMgmtFee(beginningBalance, contributions, data.withdrawals, data.day_of_flow, monthEndDate, annualRate, data.contribution_day, data.withdrawal_day);
                        } else {
                          data.management_fee = endingBalance * (annualRate / 12);
                        }
                        
                        // Modified Dietz: include ALL withdrawals (fee_payment gets added back
                        // to gain since ending balance is reduced by the disbursement)
                        const rawReturn = calcModifiedDietz(
                          beginningBalance, endingBalance, contributions,
                          data.withdrawals, data.day_of_flow, monthEndDate,
                          data.contribution_day, data.withdrawal_day
                        );
                        
                        if (isInternal && isFeePaymentMonth) {
                          // Fee_payment month: the fee_payment withdrawal IS the fee leaving the account.
                          // Gross = raw Modified Dietz (adds back fee_withdrawal to gain, don't also add mgmt_fee)

                            if (data.withdrawal_day) {
                              const dim = parseInt((monthEndDate || '').split('-')[2]) || 30;
                              return -absW * (dim - data.withdrawal_day) / dim;
                            }
                            return 0;
                          })();
                          data.net_return_pct = rawReturn - (data.management_fee / (avgCap || beginningBalance));

                          // rawReturn is NET, add mgmt fee back to ending for GROSS
                          data.gross_return_pct = calcModifiedDietz(
                            beginningBalance, endingBalance + data.management_fee, contributions,
                            data.withdrawals, data.day_of_flow, monthEndDate,
                            data.contribution_day, data.withdrawal_day
                          );
                          data.net_return_pct = rawReturn;

                          // External: ending balance is before fee deduction
                          data.gross_return_pct = rawReturn;
                          const gain = endingBalance - beginningBalance - contributions + Math.abs(data.withdrawals || 0);
                          const denom = rawReturn !== 0 ? Math.abs(gain / rawReturn) : (beginningBalance > 0 ? beginningBalance : contributions);
                          data.net_return_pct = rawReturn - (data.management_fee / denom);
                        }
                        
                        // net_all_fees_return_pct starts as net_return_pct
                        // Will be updated below with performance fee if applicable
                        data.net_all_fees_return_pct = data.net_return_pct;

                            begin: beginningBalance, end: endingBalance,
                            feeWithdrawal: feeWithdrawal, mgmtFee: data.management_fee,
                            gross: (data.gross_return_pct*100).toFixed(4) + '%',
                            net: (data.net_return_pct*100).toFixed(4) + '%'
                          });
                        }
                      } else {
                        data.gross_return_pct = 0;
                        data.net_return_pct = 0;
                        data.net_all_fees_return_pct = 0;
                        data.management_fee = 0;
                      }

                          `${SUPABASE_URL}/rest/v1/monthly_data?client_id=eq.${clientId}&month_end_date=eq.${monthEndDate}`,

                            method: 'PATCH',
                            headers: {
                              'apikey': SUPABASE_ANON_KEY,
                              'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,
                              'Content-Type': 'application/json',
                              'Prefer': 'return=representation'
                            },
                            body: JSON.stringify(data)
                          }
                        );

                        response = await fetch(
                          `${SUPABASE_URL}/rest/v1/monthly_data`,
                          {
                            method: 'POST',
                            headers: {
                              'apikey': SUPABASE_ANON_KEY,
                              'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,
                              'Content-Type': 'application/json',
                              'Prefer': 'return=representation'
                            },
                            body: JSON.stringify(data)
                          }
                        );
                      }
                      
                      if (response.ok) {

                        // Fetch all monthly data for this client to do full HWM calculation

                          } catch(e) { /* ignore */ }

                            // The Statement view will recalculate the correct accrued_perf_fee,
                            // performance_fee, and net_all_fees_return_pct when the client is viewed
                            const d = existing.length > 0 ? (await supabaseFetch('monthly_data', `?client_id=eq.${clientId}&month_end_date=eq.${monthEndDate}`))[0] : null;
                            if (d) {

                                    'Prefer': 'return=minimal'
                                  },
                                  body: JSON.stringify({
                                    performance_fee: 0,
                                    net_all_fees_return_pct: defaultNetAllFees
                                  })
                                }
                              );
                              console.log(`Perf fee defaults saved for ${monthEndDate}: performance_fee=0, net_all_fees=${(defaultNetAllFees*100).toFixed(4)}% (will be recalculated by Statement view)`);
                            }
                          } catch (pfErr) {
                            console.error('Error setting perf fee defaults:', pfErr);
                          }
                        }
                        
                        alert(`Monthly data ${existing.length > 0 ? 'updated' : 'saved'} successfully!\nBeginning Balance: ${formatCurrency(beginningBalance)}`);
                        // Refresh monthly data if same client selected
                        if (clientId === selectedClientId) {
                          const refreshData = await supabaseFetch('monthly_data', `?client_id=eq.${selectedClientId}&order=month_end_date`);
                          setMonthlyData(refreshData);
                        }
                      } else {
                        const errorText = await response.text();
                        alert(`Error saving: ${errorText}`);
                      }
                    } catch (err) {
                      alert(`Error: ${err.message}`);
                    }

          endCashOverride: n12(),
          clientIds: {}
        };
      }

      function makeBlank(bc) {
        return {
          clients: CLIENT_DEFS.map(function(d) { return { name:d.n, manual:!!d.m, values:z12(), statuses:n12(), src:z12() }; }),
          perfFees: z12(), perfStatuses: n12(),
          budgetedExp: z12(), actualExp: z12(),
          mandySalary: [3000,3000,3000,3000,3000,3000,3000,3000,3000,3000,3000,3000],
          mikeSalary: z12(), davidSalary: z12(),
          mikeWage: z12(), davidWage: z12(),
          ret401kEE: z12(), ret401kER: z12(), retCB: z12(),
          autoMike: z12(), autoDavid: z12(),
          beginCash: bc || 0,
          endCashOverride: n12(),
          clientIds: {}
        };
      }

      var SK = "gridiron_comp_v7";
      const [years, setYears] = useState(null);
      const [sy, setSy] = useState(2026);
      const [ek, setEk] = useState(null);
      const [ev, setEv] = useState("");
      const [hov, setHov] = useState(null);
      const [refreshing, setRefreshing] = useState(false);
      var eRef = React.useRef(null);

      useEffect(function() {
        try {
          var saved = localStorage.getItem(SK);
          if (saved) {
            var p = JSON.parse(saved);
            // Reconcile: ensure each year's client list matches CLIENT_DEFS
            if (p.years) {
              Object.keys(p.years).forEach(function(yKey) {
                var yr = p.years[yKey];
                if (!yr || !yr.clients) return;
                if (yr.clients.length !== CLIENT_DEFS.length) {
                  // Rebuild clients array to match CLIENT_DEFS, preserving existing data where names match
                  var oldByName = {};
                  yr.clients.forEach(function(c) { if (c && c.name) oldByName[c.name] = c; });
                  yr.clients = CLIENT_DEFS.map(function(d) {
                    if (oldByName[d.n]) return oldByName[d.n];
                    return { name:d.n, manual:!!d.m, values:[].concat(d.f), statuses:n12(), src:z12() };
                  });
                }
              });
            }
            setYears(p.years);
            setSy(p.sy || 2026);
          } else { setYears({2026: makeDefault()}); }
        } catch(e) { setYears({2026: makeDefault()}); }
      }, []);

      useEffect(function() {
        if (years) {
          try { localStorage.setItem(SK, JSON.stringify({years:years, sy:sy})); } catch(e) {}
        }
      }, [years, sy]);

      useEffect(function() { if (ek && eRef.current) eRef.current.focus(); }, [ek]);

      if (!years) return <div className="p-8">Loading...</div>;
      var yr = years[sy];
      if (!yr) return <div className="p-8">No data for {sy}</div>;

      function upd(fn) {
        setYears(function(prev) {
          try {
            var next = JSON.parse(JSON.stringify(prev));
            if (next[sy]) fn(next[sy]);
            return next;
          } catch(e) {
            console.error('upd error:', e);
            return prev;
          }
        });
      }

      // Refresh fees from Supabase
      async function refreshFees() {
        setRefreshing(true);
        try {
          var clientsData = await supabaseFetch('clients', '?select=client_id,client_name&order=client_name');
          if (!clientsData) { setRefreshing(false); return; }

          // Match comp planner rows to Supabase clients
          var matches = {};
          CLIENT_DEFS.forEach(function(def, idx) {
            if (def.m || !def.s || def.s.length === 0) return;
            var found = clientsData.find(function(c) {
              var lower = c.client_name.toLowerCase();
              return def.s.every(function(term) { return lower.indexOf(term.toLowerCase()) >= 0; });
            });
            if (found) matches[idx] = found.client_id;
          });

          // Fetch monthly_data for relevant period
          var startDate = (sy - 1) + '-10-01';
          var endDate = sy + '-12-31';
          var mdData = await supabaseFetch('monthly_data', '?select=client_id,month_end_date,management_fee,accrued_perf_fee&month_end_date=gte.' + startDate + '&month_end_date=lte.' + endDate + '&order=month_end_date');
          if (!mdData) { setRefreshing(false); return; }

          upd(function(y) {
            try {
              if (!y || !y.clients) return;
              y.clientIds = matches;
              Object.entries(matches).forEach(function(entry) {
                var idx = parseInt(entry[0]);
                var cid = entry[1];
                if (!y.clients[idx] || !y.clients[idx].values) return;
                var clientMd = mdData.filter(function(d) { return d.client_id === cid; });

                // First pass: pull actual fees for each payment quarter
                var actualFees = {};
                for (var pq = 1; pq <= 4; pq++) {
                  var calc = calcQuarterForPayment(pq, sy);
                  var calcMonths = [];
                  for (var cm = 1; cm <= 3; cm++) {
                    var mo = (calc.q - 1) * 3 + cm;
                    calcMonths.push(calc.y + '-' + String(mo).padStart(2, '0'));
                  }

                  var qFees = clientMd.filter(function(d) {
                    if (!d || !d.month_end_date) return false;
                    var ym = d.month_end_date.substring(0, 7);
                    return calcMonths.some(function(cm2) { return ym === cm2; });
                  });

                  var totalFee = qFees.reduce(function(s, d) { return s + (d.management_fee || 0); }, 0);
                  var monthsFound = qFees.length;

                  if (monthsFound > 0 && totalFee > 0) {
                    if (monthsFound < 3) totalFee = totalFee * 3 / monthsFound;
                    // For Q4 calc quarters, add performance fee from December accrued_perf_fee
                    // (perf fees are annual, billed with Q4 invoice)
                    if (calc.q === 4) {
                      var decRec = clientMd.find(function(d) {
                        return d.month_end_date && d.month_end_date.startsWith(calc.y + '-12');
                      });
                      if (decRec && decRec.accrued_perf_fee > 0) {
                        totalFee += decRec.accrued_perf_fee;
                      }
                    }
                    actualFees[pq] = { fee: Math.round(totalFee), months: monthsFound };
                  }
                }

                // Find the most recent actual fee to use as estimate for future quarters
                var bestEstimate = 0;
                for (var eq = 1; eq <= 4; eq++) {
                  if (actualFees[eq]) bestEstimate = actualFees[eq].fee;
                }

                // Second pass: apply actual fees and estimate missing quarters
                for (var pq2 = 1; pq2 <= 4; pq2++) {
                  var payMonth = (pq2 - 1) * 3;
                  var qm = qMonths(pq2);
                  var hasExisting = qm.some(function(m) { return y.clients[idx].values[m] > 0; });

                  if (actualFees[pq2]) {
                    // We have actual data — always update first month of payment quarter
                    if (!hasExisting) {
                      y.clients[idx].values[payMonth] = actualFees[pq2].fee;
                      y.clients[idx].src[payMonth] = actualFees[pq2].months;
                    }
                    bestEstimate = actualFees[pq2].fee;
                  } else if (bestEstimate > 0 && !hasExisting) {
                    // No actual data — use best estimate from prior quarter
                    y.clients[idx].values[payMonth] = bestEstimate;
                    y.clients[idx].src[payMonth] = -1; // -1 = estimated
                  }
                }
              });
            } catch(e) {
              console.error('Error in refreshFees upd callback:', e);
            }
          });
        } catch(e) {
          console.error('Refresh fees error:', e);
        }
        setRefreshing(false);
      }

      // Calculations
      var monthlyRev = [];
      for (var mi = 0; mi < 12; mi++) {
        var rv = 0;
        for (var ci2 = 0; ci2 < yr.clients.length; ci2++) rv += yr.clients[ci2].values[mi] || 0;
        monthlyRev.push(rv);
      }

      var expUsed = yr.actualExp.map(function(a, i) { return a > 0 ? a : yr.budgetedExp[i] || 0; });
      var totalSal = yr.mandySalary.map(function(v, i) { return v + (yr.mikeSalary[i]||0) + (yr.davidSalary[i]||0); });
      var partnerDist = yr.mikeSalary.map(function(v, i) { return Math.floor(Math.max(v, yr.davidSalary[i]||0) / 2); });
      var mikeDist = partnerDist;
      var davidDist = partnerDist;
      var mikeWageCalc = yr.mikeSalary.map(function(v, i) { return v - partnerDist[i]; });
      var davidWageCalc = yr.davidSalary.map(function(v, i) { return v - partnerDist[i]; });
      var msPlusMandy = yr.mikeSalary.map(function(v, i) { return v + (yr.mandySalary[i]||0) + (yr.autoMike[i]||0); });
      var dkTotal = yr.davidSalary.map(function(v, i) { return v + (yr.autoDavid[i]||0); });
      var retTotal = yr.ret401kEE.map(function(v, i) { return v + (yr.ret401kER[i]||0) + (yr.retCB[i]||0); });
      var autoTotal = yr.autoMike.map(function(v, i) { return v + (yr.autoDavid[i]||0); });

      // Cash flow
      var beginCash = [];
      var endCash = [];
      var endCashCalc = [];
      var eco = yr.endCashOverride || n12();
      for (var ci = 0; ci < 12; ci++) {
        var bc = ci === 0 ? (yr.beginCash || 0) : endCash[ci-1];
        beginCash.push(bc);
        var calcEnd = bc + monthlyRev[ci] - expUsed[ci] - totalSal[ci] - (retTotal[ci]||0) - (autoTotal[ci]||0);
        endCashCalc.push(calcEnd);
        endCash.push(eco[ci] !== "none" && eco[ci] !== null ? eco[ci] : calcEnd);
      }
      var cashBefore = beginCash.map(function(v, i) { return v + monthlyRev[i] - expUsed[i]; });
      var totalRevWithCash = beginCash.map(function(v, i) { return v + monthlyRev[i]; });

      // Styling constants
      var hdrS = {position:"sticky",left:0,zIndex:2,backgroundColor:"#1F2937",color:"white",padding:"1px 6px",fontSize:11,fontWeight:700,borderRight:"2px solid #D1D5DB",whiteSpace:"nowrap",minWidth:200};
      var cellS = function(bg) { return {textAlign:"right",fontSize:11,padding:"1px 4px",border:"1px solid #E5E7EB",backgroundColor:bg||"white",fontVariantNumeric:"tabular-nums",cursor:"pointer"}; };
      var secS = {backgroundColor:"#374151",color:"#F9FAFB",padding:"2px 6px",fontSize:11,fontWeight:700,letterSpacing:1};
      var ytdS = {textAlign:"right",fontSize:11,padding:"1px 4px",borderLeft:"3px solid #3B82F6",fontWeight:700,backgroundColor:"#EFF6FF",fontVariantNumeric:"tabular-nums"};

      // Row builders
      function secRow(label) {
        return <tr><td colSpan={14} style={secS}>{label}</td></tr>;
      }
      function spacer(key) {
        return <tr key={key}><td colSpan={14} style={{height:4,backgroundColor:"#F3F4F6"}}></td></tr>;
      }
      function calcRow(label, vals, bg, noYtd) {
        return <tr style={{backgroundColor:bg||"#F9FAFB"}}>
          <td style={{position:"sticky",left:0,zIndex:2,backgroundColor:bg||"#F9FAFB",padding:"1px 6px",fontSize:11,fontWeight:600,borderRight:"2px solid #D1D5DB",whiteSpace:"nowrap",minWidth:200}}>{label}</td>
          {vals.map(function(v,m){ return <td key={m} style={cellS(bg||"#F9FAFB")}>{fmtS(v)}</td>; })}
          <td style={ytdS}>{noYtd ? "" : fmtS(arrSum(vals))}</td>
        </tr>;
      }

      function editableRow(label, defaults, prefix, accessor, bg) {
        return <tr style={{backgroundColor:bg||"white"}}>
          <td style={{position:"sticky",left:0,zIndex:2,backgroundColor:bg||"white",padding:"1px 6px",fontSize:11,fontWeight:500,borderRight:"2px solid #D1D5DB",whiteSpace:"nowrap",minWidth:200}}>{label}</td>
          {defaults.map(function(v,m){
            var key = prefix + "_" + m;
            var isEditing = ek === key;
            return <td key={m} style={cellS(bg||"#FFFBEB")}
              onDoubleClick={function(){ setEk(key); setEv(String(v||0)); }}
            >
              {isEditing ?
                <input ref={eRef} type="number" value={ev} style={{width:"100%",fontSize:11,textAlign:"right",border:"2px solid #3B82F6",padding:"0 2px",outline:"none"}}
                  onChange={function(e){ setEv(e.target.value); }}
                  onBlur={function(){
                    upd(function(y){ accessor(y)[m] = parseFloat(ev) || 0; });
                    setEk(null);
                  }}
                  onKeyDown={function(e){
                    if (e.key === "Enter") {
                      upd(function(y){ accessor(y)[m] = parseFloat(ev) || 0; });
                      setEk(null);
                    } else if (e.key === "Escape") { setEk(null); }
                  }}
                />
                : <span>{fmt(v)}</span>
              }
            </td>;
          })}
          <td style={ytdS}>{fmtS(arrSum(defaults))}</td>
        </tr>;
      }

      // Shift a client fee left or right within the quarter
      function shiftClient(idx, m, dir) {
        var qStart = Math.floor(m / 3) * 3;
        var qEnd = qStart + 2;
        var target = m + dir;
        if (target < qStart || target > qEnd) return; // stay in quarter
        upd(function(y) {
          var vals = y.clients[idx].values;
          var stats = y.clients[idx].statuses;
          var src = y.clients[idx].src;
          // Swap values
          var tmpV = vals[target]; vals[target] = vals[m]; vals[m] = tmpV;
          var tmpS = stats[target]; stats[target] = stats[m]; stats[m] = tmpS;
          var tmpR = src[target]; src[target] = src[m]; src[m] = tmpR;
        });
      }

      function clientRow(c, idx) {
        return <tr key={idx} style={{backgroundColor: c.manual ? "#FEF9C3" : "white"}}
          onMouseEnter={function(){ setHov("c"+idx); }} onMouseLeave={function(){ setHov(null); }}>
          <td style={{position:"sticky",left:0,zIndex:2,backgroundColor: c.manual ? "#FEF9C3" : "white",padding:"1px 6px",fontSize:11,fontWeight:400,borderRight:"2px solid #D1D5DB",whiteSpace:"nowrap",minWidth:200}}>
            {c.name}
            {yr.clientIds && yr.clientIds[idx] ? <span style={{color:"#16A34A",marginLeft:4}} title="Matched to Supabase">{"\u2713"}</span> : null}
          </td>
          {c.values.map(function(v,m){
            var key = "c" + idx + "_" + m;
            var isEditing = ek === key;
            var status = c.statuses[m] || "none";
            var isHovered = hov === "c"+idx;
            var qStart = Math.floor(m / 3) * 3;
            var qEnd = qStart + 2;
            var canLeft = v > 0 && m > qStart;
            var canRight = v > 0 && m < qEnd;
            var baseBg = c.manual ? "#FEF9C3" : "white";
            var cellBg = v > 0 && status === "received" ? "#D1FAE5" : v > 0 && status === "invoiced" ? "#DBEAFE" : baseBg;
            var textColor = v > 0 && status === "received" ? "#065F46" : v > 0 && status === "invoiced" ? "#1E40AF" : undefined;
            return <td key={m} style={Object.assign({}, cellS(cellBg), {position:"relative", color:textColor})}
              onDoubleClick={function(){ setEk(key); setEv(String(v||0)); }}
              onClick={function(e){
                if (v > 0 && !isEditing) {
                  upd(function(y){
                    var st = y.clients[idx].statuses[m];
                    y.clients[idx].statuses[m] = st === "none" ? "invoiced" : st === "invoiced" ? "received" : "none";
                  });
                }
              }}
            >
              {isEditing ?
                <input ref={eRef} type="number" value={ev} style={{width:"100%",fontSize:11,textAlign:"right",border:"2px solid #3B82F6",padding:"0 2px",outline:"none"}}
                  onChange={function(e){ setEv(e.target.value); }}
                  onBlur={function(){
                    upd(function(y){ y.clients[idx].values[m] = parseFloat(ev) || 0; });
                    setEk(null);
                  }}
                  onKeyDown={function(e){
                    if (e.key === "Enter") {
                      upd(function(y){ y.clients[idx].values[m] = parseFloat(ev) || 0; });
                      setEk(null);
                    } else if (e.key === "Escape") { setEk(null); }
                  }}
                />
                : <span style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:1,minHeight:16}}>
                    {isHovered && canLeft ?
                      <span onClick={function(e){ e.stopPropagation(); shiftClient(idx,m,-1); }}
                        style={{cursor:"pointer",fontSize:9,color:"#6B7280",fontWeight:700,userSelect:"none",padding:"0 1px",lineHeight:1}}
                        title="Shift left">{"\u25C0"}</span>
                      : null}
                    <span style={{flex:1,textAlign:"right",fontStyle: c.src && c.src[m] === -1 ? "italic" : "normal",opacity: c.src && c.src[m] === -1 ? 0.7 : 1}}>{fmt(v)}</span>
                    {isHovered && canRight ?
                      <span onClick={function(e){ e.stopPropagation(); shiftClient(idx,m,1); }}
                        style={{cursor:"pointer",fontSize:9,color:"#6B7280",fontWeight:700,userSelect:"none",padding:"0 1px",lineHeight:1}}
                        title="Shift right">{"\u25B6"}</span>
                      : null}
                  </span>
              }
            </td>;
          })}
          <td style={ytdS}>{fmtS(arrSum(c.values))}</td>
        </tr>;
      }

      // Add year handler
      function addYear() {
        var nextY = Math.max.apply(null, Object.keys(years).map(Number)) + 1;
        var prevEnd = endCash[11] || 0;
        setYears(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          next[nextY] = makeBlank(prevEnd);
          return next;
        });
        setSy(nextY);
      }

      return (
        <div className="p-2" style={{fontSize:12}}>
          <div className="flex items-center gap-3 mb-2">
            <h2 className="text-lg font-bold">Revenue & Compensation Planner</h2>
            <div className="flex gap-1">
              {Object.keys(years).sort().map(function(y) {
                return <button key={y} onClick={function(){ setSy(parseInt(y)); }}
                  className={"px-3 py-1 rounded text-sm " + (parseInt(y) === sy ? "bg-amber-600 text-white" : "bg-gray-200")}>{y}</button>;
              })}
              <button onClick={addYear} className="px-3 py-1 rounded text-sm bg-gray-100 hover:bg-gray-200">+ Year</button>
            </div>
            <button onClick={refreshFees} disabled={refreshing}
              className={"px-3 py-1 rounded text-sm " + (refreshing ? "bg-gray-300" : "bg-blue-600 text-white hover:bg-blue-700")}>
              {refreshing ? "Refreshing..." : "\u21BB Refresh Fees"}
            </button>
            <button onClick={function(){
              if (confirm("Reset " + sy + " to defaults? This cannot be undone.")) {
                upd(function(y) {
                  var def = makeDefault();
                  Object.keys(def).forEach(function(k){ y[k] = def[k]; });
                });
              }
            }} className="px-3 py-1 rounded text-sm bg-red-100 text-red-700 hover:bg-red-200">Reset</button>
            <span className="text-xs text-gray-400 ml-2">Double-click any cell to edit \u2022 Click cell to cycle: white \u2192 blue (invoiced) \u2192 green (received) \u2022 \u25C0\u25B6 shift within quarter \u2022 Italic = estimated</span>
          </div>

          <div style={{overflowX:"auto",maxHeight:"calc(100vh - 160px)",overflowY:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%"}}>
              <thead style={{position:"sticky",top:0,zIndex:3}}>
                <tr>
                  <th style={{position:"sticky",left:0,zIndex:4,backgroundColor:"#1F2937",color:"white",padding:"4px 6px",fontSize:11,fontWeight:700,borderRight:"2px solid #D1D5DB",minWidth:200,textAlign:"left"}}>{sy}</th>
                  {MONTHS.map(function(m,i){ return <th key={i} style={{backgroundColor:"#1F2937",color:"white",padding:"4px 8px",fontSize:11,fontWeight:600,textAlign:"center",minWidth:80}}>{m}</th>; })}
                  <th style={{backgroundColor:"#1E3A5F",color:"white",padding:"4px 8px",fontSize:11,fontWeight:700,textAlign:"center",borderLeft:"3px solid #3B82F6",minWidth:90}}>YTD</th>
                </tr>
              </thead>
              <tbody>
                {/* Revenue (includes beginning cash) */}
                {secRow("REVENUE")}
                <tr style={{backgroundColor:"#DBEAFE"}}>
                  <td style={{position:"sticky",left:0,zIndex:2,backgroundColor:"#DBEAFE",padding:"1px 6px",fontSize:11,fontWeight:600,borderRight:"2px solid #D1D5DB",whiteSpace:"nowrap",minWidth:200}}>Beginning Cash</td>
                  {beginCash.map(function(v,m){
                    if (m === 0) {
                      var key = "begcash";
                      var isEditing = ek === key;
                      return <td key={m} style={cellS("#DBEAFE")} onDoubleClick={function(){ setEk(key); setEv(String(v||0)); }}>
                        {isEditing ?
                          <input ref={eRef} type="number" value={ev} style={{width:"100%",fontSize:11,textAlign:"right",border:"2px solid #3B82F6",padding:"0 2px"}}
                            onChange={function(e){ setEv(e.target.value); }}
                            onBlur={function(){ upd(function(y){ y.beginCash = parseFloat(ev)||0; }); setEk(null); }}
                            onKeyDown={function(e){ if(e.key==="Enter"){upd(function(y){y.beginCash=parseFloat(ev)||0;});setEk(null);}else if(e.key==="Escape")setEk(null); }}
                          />
                          : <span style={{color:"#1D4ED8"}}>{fmtS(v)}</span>
                        }
                      </td>;
                    }
                    return <td key={m} style={cellS("#DBEAFE")}>{fmtS(v)}</td>;
                  })}
                  <td style={ytdS}></td>
                </tr>
                {yr.clients.map(function(c,i){ return clientRow(c,i); })}
                {calcRow("Fee Revenue", monthlyRev, "#ECFDF5")}
                {calcRow("Total Revenue", totalRevWithCash, "#D1FAE5", true)}
                {spacer("sp2")}

                {/* Expenses */}
                {secRow("EXPENSES")}
                {editableRow("Budgeted Expenses", yr.budgetedExp, "budg", function(d){return d.budgetedExp;})}
                {editableRow("Actual Expenses", yr.actualExp, "actexp", function(d){return d.actualExp;}, "#FEF2F2")}
                {calcRow("Cash Before Compensation", cashBefore, "#DBEAFE", true)}
                {spacer("sp3")}

                {/* Compensation */}
                {secRow("COMPENSATION \u2014 SET TOTAL COMP")}
                {editableRow("Mandy Salary", yr.mandySalary, "mandy", function(d){return d.mandySalary;}, "#F5F3FF")}
                {editableRow("Mike Total Comp", yr.mikeSalary, "mikes", function(d){return d.mikeSalary;}, "#EFF6FF")}
                {editableRow("David Total Comp", yr.davidSalary, "davids", function(d){return d.davidSalary;}, "#FEF9C3")}
                {calcRow("Total Comp", totalSal)}
                {spacer("sp3b")}

                {/* Partner Totals */}
                {secRow("PARTNER TOTALS & 50/50 CHECK (payroll split)")}
                {calcRow("Mike Salary", mikeWageCalc, "#EFF6FF")}
                <tr style={{backgroundColor:"#DBEAFE"}}>
                  <td style={{position:"sticky",left:0,zIndex:2,backgroundColor:"#DBEAFE",padding:"1px 6px",fontSize:11,fontWeight:500,borderRight:"2px solid #D1D5DB",whiteSpace:"nowrap",minWidth:200}}>Mike Partner Dist</td>
                  {mikeDist.map(function(v,m){return <td key={m} style={{textAlign:"right",fontSize:11,padding:"1px 4px",border:"1px solid #93C5FD",backgroundColor:"#DBEAFE",fontVariantNumeric:"tabular-nums"}}>{fmt(v)}</td>;})}
                  <td style={ytdS}>{fmtS(arrSum(mikeDist))}</td>
                </tr>
                {calcRow("David Salary", davidWageCalc, "#FEF9C3")}
                <tr style={{backgroundColor:"#FEF3C7"}}>
                  <td style={{position:"sticky",left:0,zIndex:2,backgroundColor:"#FEF3C7",padding:"1px 6px",fontSize:11,fontWeight:500,borderRight:"2px solid #D1D5DB",whiteSpace:"nowrap",minWidth:200}}>David Partner Dist</td>

    // Schwab Client AUM & Estimated Fees List Component
    function SchwabClientFeesList({ clients, schwabCustody, firmDataMonth, supabaseFetch, formatCurrency }) {
      const [clientData, setClientData] = useState([]);
      const [loading, setLoading] = useState(true);
      
      useEffect(() => {
        const loadClientData = async () => {
          if (!firmDataMonth) {
            setLoading(false);
            return;
          }
          
          setLoading(true);
          try {
            // Get monthly data for the selected month
            const monthlyData = await supabaseFetch('monthly_data', 
              `?month_end_date=eq.${firmDataMonth}`
            );
            
            // Get schwab custody row for this month (for HNW)
            const schwabRow = schwabCustody.find(s => s.month_end_date === firmDataMonth);
            const schwabTotal = schwabRow?.asset_value || 0;
            const wimmerVal = schwabRow?.wimmer_foundation || 0;
            
            // Find Mechanical Contractors
            const mechContractors = clients.find(c => c.client_name && c.client_name.toLowerCase().includes('mechanical contractors'));
            const mcData = monthlyData.find(d => d.client_id === mechContractors?.client_id);
            const mcBalance = mcData?.ending_balance || 0;
            
            // Calculate HNW (Schwab total - MC - Wimmer)
            const hnwBalance = schwabTotal - mcBalance - wimmerVal;
            
            // Build client list with ALL clients
            const results = [];
            
            // Get current year from firmDataMonth for fee estimation
            const selectedYear = parseInt(firmDataMonth.substring(0, 4));
            const selectedMonth = parseInt(firmDataMonth.substring(5, 7));
            const monthsRemaining = 12 - selectedMonth + 1; // Include current month
            
            // Add ALL active clients
            clients.forEach(client => {
              if (client.status === 'Active') {
                const clientMonthly = monthlyData.find(d => d.client_id === client.client_id);
                const aum = clientMonthly?.ending_balance || 0;
                const feeRate = client.annual_mgmt_fee_rate || 0.0075;
                
                // Estimated fees for full year = AUM * fee rate
                const estimatedFees = aum * feeRate;
                
                results.push({
                  client_name: client.client_name,
                  client_id: client.client_id,
                  aum: aum,
                  fee_rate: feeRate,
                  estimated_fees: estimatedFees,
                  type: 'client'
                });
              }
            });
            
            // Add HNW row (43 accounts at 0.25% = 25bps)
            const hnwFeeRate = 0.0025; // 25 bps
            const hnwEstimatedFees = hnwBalance * hnwFeeRate;
            results.push({
              client_name: 'Schwab HNW (43 accounts)',
              client_id: 'hnw',
              aum: hnwBalance,
              fee_rate: hnwFeeRate,
              estimated_fees: hnwEstimatedFees,
              type: 'hnw'
            });
            
            // Add Wimmer if it has value
            if (wimmerVal > 0) {
              const wimmerFeeRate = 0.0050; // Assume 50 bps for Wimmer
              const wimmerEstimatedFees = wimmerVal * wimmerFeeRate;
              results.push({
                client_name: 'Wimmer Foundation',
                client_id: 'wimmer',
                aum: wimmerVal,
                fee_rate: wimmerFeeRate,
                estimated_fees: wimmerEstimatedFees,
                type: 'wimmer'
              });
            }
            
            // Sort by AUM descending
            results.sort((a, b) => b.aum - a.aum);
            
            setClientData(results);
          } catch (err) {
            console.error('Error loading client data:', err);
          } finally {
            setLoading(false);
          }
        };
        
        loadClientData();
      }, [firmDataMonth, clients, schwabCustody]);
      
      if (loading) {
        return <div className="text-center py-4 text-gray-500">Loading client data...</div>;
      }
      
      // Calculate totals
      const totalAUM = clientData.reduce((sum, c) => sum + c.aum, 0);
      const totalEstimatedFees = clientData.reduce((sum, c) => sum + c.estimated_fees, 0);
      
      // Get year for display
      const displayYear = firmDataMonth ? firmDataMonth.substring(0, 4) : '';
      
      return (
        <div className="max-h-96 overflow-y-auto">
          <table className="w-full text-xs">
            <thead className="bg-gray-200 sticky top-0">
              <tr>
                <th className="text-left py-1 px-1">Client</th>
                <th className="text-right py-1 px-1">AUM</th>
                <th className="text-right py-1 px-1">Est. Annual Fees</th>
              </tr>
            </thead>
            <tbody>
              {clientData.map(row => (
                <tr key={row.client_id} className={`border-b hover:bg-gray-100 ${row.type === 'hnw' ? 'bg-purple-50' : row.type === 'wimmer' ? 'bg-blue-50' : ''}`}>
                  <td className="py-0.5 px-1">{row.client_name}</td>
                  <td className="text-right py-0.5 px-1">{formatCurrency(row.aum)}</td>
                  <td className="text-right py-0.5 px-1">{formatCurrency(row.estimated_fees)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot className="bg-gray-300 font-bold sticky bottom-0">
              <tr>
                <td className="py-1 px-1">Total</td>
                <td className="text-right py-1 px-1">{formatCurrency(totalAUM)}</td>
                <td className="text-right py-1 px-1">{formatCurrency(totalEstimatedFees)}</td>

    // Composite AUM Summary Component - shows both GTFI and GMA for selected month
    function CompositeAUMSummary({ firmDataMonth, supabaseFetch, formatCurrency }) {
      const [data, setData] = useState({ gtfi: null, gma: null });
      const [loading, setLoading] = useState(true);
      
      useEffect(() => {
        const fetchData = async () => {
          if (!firmDataMonth) {
            setLoading(false);
            return;
          }
          
          setLoading(true);
          try {
            // Get the year from selected month for YTD calculation
            const selectedYear = firmDataMonth.substring(0, 4);
            const yearStart = `${selectedYear}-01-01`;
            
            // Fetch clients
            const clientsRes = await fetch(
              `${SUPABASE_URL}/rest/v1/clients?select=client_id,strategy_id,client_name,status`, 
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const clients = await clientsRes.json();
            
            // Fetch monthly data for the selected month (for current AUM)
            const currentMonthRes = await fetch(
              `${SUPABASE_URL}/rest/v1/monthly_data?month_end_date=eq.${firmDataMonth}`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const currentMonthData = await currentMonthRes.json();
            
            // Fetch all monthly data YTD through selected month for additions/withdrawals
            const ytdRes = await fetch(
              `${SUPABASE_URL}/rest/v1/monthly_data?month_end_date=gte.${yearStart}&month_end_date=lte.${firmDataMonth}&order=month_end_date`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const ytdData = await ytdRes.json();
            
            // Get prior year end data to check for new accounts in the year
            const priorYearEnd = `${parseInt(selectedYear) - 1}-12-31`;
            const priorYearRes = await fetch(
              `${SUPABASE_URL}/rest/v1/monthly_data?month_end_date=eq.${priorYearEnd}&select=client_id,ending_balance`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const priorYearData = await priorYearRes.json();
            const priorYearClientIds = new Set(priorYearData.map(d => d.client_id));
            
            // Build client lookup
            const clientMap = {};
            clients.forEach(c => { clientMap[c.client_id] = c; });
            
            // Track which accounts have already been counted as new this year
            const countedAsNewThisYear = { 1: new Set(), 2: new Set() };
            const countedAsClosedThisYear = { 1: new Set(), 2: new Set() };
            
            // Calculate stats for each strategy
            const calcStrategyStats = (strategyId) => {
              // Current month stats
              let numAccounts = 0;
              let totalAssets = 0;
              
              currentMonthData.forEach(md => {
                const client = clientMap[md.client_id];
                if (!client || client.strategy_id !== strategyId) return;
                numAccounts += 1;
                totalAssets += md.ending_balance || 0;
              });
              
              // YTD cumulative additions and withdrawals
              let additionsAmount = 0;
              let additionsCount = 0;
              let withdrawalsAmount = 0;
              let withdrawalsCount = 0;
              let newAccountsCount = 0;
              let closedAccountsCount = 0;
              let newAccountNames = [];
              let closedAccountNames = [];
              
              // Group YTD data by month to process chronologically
              const monthsData = {};
              ytdData.forEach(md => {
                if (!monthsData[md.month_end_date]) monthsData[md.month_end_date] = [];
                monthsData[md.month_end_date].push(md);
              });
              
              const sortedMonths = Object.keys(monthsData).sort();
              let priorMonthClientIds = new Set(priorYearClientIds);
              
              sortedMonths.forEach(month => {
                const monthData = monthsData[month];
                const currentMonthClientIds = new Set();
                
                monthData.forEach(md => {
                  const client = clientMap[md.client_id];
                  if (!client || client.strategy_id !== strategyId) return;
                  
                  currentMonthClientIds.add(md.client_id);
                  
                  // Check if this is a new account this year (first time seeing it)
                  if (!priorMonthClientIds.has(md.client_id) && !countedAsNewThisYear[strategyId].has(md.client_id)) {
                    // New account - count the ending balance as addition
                    additionsAmount += md.ending_balance || 0;
                    additionsCount += 1;
                    newAccountsCount += 1;
                    newAccountNames.push(client.client_name);
                    countedAsNewThisYear[strategyId].add(md.client_id);
                  } else {
                    // Existing account - count contributions and withdrawals
                    if (md.contributions && md.contributions > 0) {
                      additionsAmount += md.contributions;
                      additionsCount += 1;
                    }
                    if (md.withdrawals && md.withdrawals < 0) {
                      withdrawalsAmount += Math.abs(md.withdrawals);
                      withdrawalsCount += 1;
                    }
                  }
                });
                
                // Check for terminated accounts this month
                priorMonthClientIds.forEach(clientId => {
                  const client = clientMap[clientId];
                  if (client && client.strategy_id === strategyId && !currentMonthClientIds.has(clientId) && !countedAsClosedThisYear[strategyId].has(clientId)) {
                    // Account closed this month
                    withdrawalsCount += 1;
                    closedAccountsCount += 1;
                    closedAccountNames.push(client.client_name);
                    countedAsClosedThisYear[strategyId].add(clientId);
                  }
                });
                
                // Update prior month client IDs for next iteration
                priorMonthClientIds = new Set([...priorMonthClientIds, ...currentMonthClientIds]);
              });
              
              return { numAccounts, totalAssets, additionsAmount, additionsCount, withdrawalsAmount, withdrawalsCount, newAccountsCount, closedAccountsCount, newAccountNames, closedAccountNames };
            };
            
            setData({
              gtfi: calcStrategyStats(1),
              gma: calcStrategyStats(2)
            });
          } catch (err) {
            console.error('Error fetching composite data:', err);
          } finally {
            setLoading(false);
          }
        };
        
        fetchData();
      }, [firmDataMonth]);
      
      if (loading) return <div className="text-gray-500 text-base py-2">Loading composite data...</div>;
      
      // Get year from firmDataMonth for display
      const displayYear = firmDataMonth ? firmDataMonth.substring(0, 4) : '';
      
      const CompositeCard = ({ title, stats, color }) => {
        if (!stats || stats.numAccounts === 0) return (
          <div className={`border rounded-lg p-4 ${color}`}>
            <h3 className="font-bold text-lg mb-1">{title}</h3>
            <p className="text-gray-500 text-base">No data</p>
          </div>
        );
        
        return (
          <div className={`border rounded-lg p-4 ${color}`}>
            <h3 className="font-bold text-lg mb-1">{title}</h3>
            <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-base">
              <div>Accounts:</div>
              <div className="text-right font-semibold">{stats.numAccounts || 0}</div>
              
              <div>Total AUM:</div>
              <div className="text-right font-semibold">{formatCurrency(stats.totalAssets || 0)}</div>
              
              <div className="text-green-700">{displayYear} YTD Additions:</div>
              <div className="text-right font-semibold text-green-700">
                {formatCurrency(stats.additionsAmount || 0)} ({stats.additionsCount || 0})
              </div>
              
              <div className="text-red-700">{displayYear} YTD Withdrawals:</div>
              <div className="text-right font-semibold text-red-700">
                {formatCurrency(stats.withdrawalsAmount || 0)} ({stats.withdrawalsCount || 0})
              </div>
              
              <div className="text-blue-700">{displayYear} New Accounts:</div>
              <div className="text-right font-semibold text-blue-700">{stats.newAccountsCount || 0}</div>
              {stats.newAccountNames && stats.newAccountNames.length > 0 && (
                <>
                  <div className="col-span-2 text-xs text-blue-600 pl-2 -mt-1">
                    {stats.newAccountNames.join(', ')}
                  </div>
                </>
              )}
              
              <div className="text-orange-700">{displayYear} Closed Accounts:</div>
              <div className="text-right font-semibold text-orange-700">{stats.closedAccountsCount || 0}</div>
              {stats.closedAccountNames && stats.closedAccountNames.length > 0 && (
                <>
                  <div className="col-span-2 text-xs text-orange-600 pl-2 -mt-1">
                    {stats.closedAccountNames.join(', ')}
                  </div>
                </>
              )}
            </div>
          </div>
        );
      };
      
      return (
        <div className="grid grid-cols-2 gap-4">
          <CompositeCard title="GTFI - Tactical Fixed Income" stats={data.gtfi} color="bg-blue-50" />
          <CompositeCard title="GMA - Multi-Asset" stats={data.gma} color="bg-purple-50" />
        </div>
      );
    }

              const aum = clientAUM[client.client_id] || 0;
              if (aum === 0) return; // Skip clients with no AUM this month
              
              const strategyCode = client.strategy_id === 1 ? 'GTFI' : 'GMA';
              
              if (client.strategy_id === 1) {
                gtfiTotal += aum;
                gtfiAccounts += 1;
              } else if (client.strategy_id === 2) {
                gmaTotal += aum;
                gmaAccounts += 1;
              }
              
              // ERISA

                erisa[strategyCode].aum += aum;
                erisa[strategyCode].accounts += 1;
                // Add to ERISA accounts list
                erisaAccountsList.push({
                  client_name: client.client_name,
                  strategy: strategyCode,
                  aum: aum
                });
              } else {
                nonErisa[strategyCode].aum += aum;
                nonErisa[strategyCode].accounts += 1;
              }
              
              // Client Type
              if (client.client_type && clientType[client.client_type]) {
                clientType[client.client_type].aum += aum;
                clientType[client.client_type].accounts += 1;
              }
              
              // Client Sub - combine P and W into P/W
              let subKey = client.client_sub;
              if (subKey === 'P' || subKey === 'W') subKey = 'P/W';
              if (subKey && clientSub[subKey]) {
                clientSub[subKey].aum += aum;
                clientSub[subKey].accounts += 1;
              }
              
              // Client Category (exclude Overlap)
              let catKey = client.client_category;
              if (catKey === 'P' || catKey === 'W') catKey = 'P/W';
              if (catKey && catKey !== 'Overlap' && clientCategory[catKey]) {
                clientCategory[catKey].aum += aum;
                clientCategory[catKey].accounts += 1;

              // Custodian

              custodians[custodian].aum += aum;
              custodians[custodian].accounts += 1;
            });
            
            // Sort ERISA accounts by AUM descending

            setData({

        if (ws[custTotalCell]) ws[custTotalCell].z = currFmt;
        
        XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
        
        // Download

    // Schwab Custody Row Component - fetches MC balance for each month
    function SchwabCustodyRow({ row, mechContractorsId, supabaseFetch, formatCurrency }) {
      const [mcBalance, setMcBalance] = useState(null);
      const [loading, setLoading] = useState(true);
      
      useEffect(() => {
        const fetchMcBalance = async () => {
          if (!mechContractorsId) {
            setLoading(false);
            return;
          }
          try {
            const data = await supabaseFetch('monthly_data', 
              `?client_id=eq.${mechContractorsId}&month_end_date=eq.${row.month_end_date}`
            );
            if (data.length > 0) {
              setMcBalance(data[0].ending_balance || 0);
            } else {
              setMcBalance(0);
            }
          } catch (err) {
            console.error('Error fetching MC balance:', err);
            setMcBalance(0);
          } finally {
            setLoading(false);
          }
        };
        fetchMcBalance();
      }, [row.month_end_date, mechContractorsId]);
      
      // Calculate: Total - MC - Wimmer = HNW
      const wimmerVal = row.wimmer_foundation || 0;
      const mcVal = mcBalance || 0;
      const schwabHNW = row.asset_value - mcVal - wimmerVal;
      
      // Format currency in millions for compactness
      const formatM = (val) => {
        if (val == null) return '-';
        if (Math.abs(val) >= 1000000) return '$' + (val / 1000000).toFixed(2) + 'M';
        return formatCurrency(val);
      };
      
      return (
        <tr className="border-b hover:bg-gray-100">
          <td className="py-1 px-1">
            {new Date(row.month_end_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', year: '2-digit' })}
          </td>
          <td className="text-right py-1 px-1">
            {formatM(row.asset_value)}
          </td>
          <td className="text-right py-1 px-1 text-red-600">
            {loading ? '...' : `(${formatM(mcVal)})`}
          </td>
          <td className="text-right py-1 px-1 text-red-600">
            {wimmerVal > 0 ? `(${formatM(wimmerVal)})` : '-'}
          </td>
          <td className="text-right py-1 px-1 font-semibold bg-purple-50">
            {loading ? '...' : formatM(schwabHNW)}
          </td>
        </tr>
      );
    }
    
    // Firm AUM Table Component
    function FirmAUMTable({ clients, schwabCustody, supabaseFetch, formatCurrency }) {
      const [aumData, setAumData] = useState([]);
      const [loading, setLoading] = useState(true);
      
      useEffect(() => {
        const loadAUMData = async () => {
          setLoading(true);
          try {
            // Get all monthly data
            const allMonthlyData = await supabaseFetch('monthly_data', '?order=month_end_date.desc&limit=10000');
            
            // Find Mechanical Contractors client ID
            const mechContractors = clients.find(c => c.client_name && c.client_name.toLowerCase().includes('mechanical contractors'));
            const mcId = mechContractors?.client_id;
            
            // Group by month
            const monthlyTotals = {};
            
            allMonthlyData.forEach(row => {
              const month = row.month_end_date;
              if (!monthlyTotals[month]) {
                monthlyTotals[month] = { gtfi: 0, gma: 0, mcBalance: 0 };
              }
              
              const client = clients.find(c => c.client_id === row.client_id);
              if (!client) return;
              
              const balance = row.ending_balance || 0;
              
              // Track MC balance separately
              if (row.client_id === mcId) {
                monthlyTotals[month].mcBalance = balance;
              }
              
              // Add to strategy totals
              if (client.strategy_id === 1) {
                monthlyTotals[month].gtfi += balance;
              } else if (client.strategy_id === 2) {
                monthlyTotals[month].gma += balance;
              }
            });
            
            // Combine with Schwab data
            const results = [];
            const months = [...new Set([
              ...Object.keys(monthlyTotals),
              ...schwabCustody.map(s => s.month_end_date)
            ])].sort((a, b) => b.localeCompare(a)); // Sort descending
            
            months.slice(0, 24).forEach(month => { // Last 24 months
              const totals = monthlyTotals[month] || { gtfi: 0, gma: 0, mcBalance: 0 };
              const schwab = schwabCustody.find(s => s.month_end_date === month);
              const schwabTotal = schwab?.asset_value || 0;
              const schwabNet = schwabTotal - totals.mcBalance; // Schwab minus MC
              
              results.push({
                month,
                gtfi: totals.gtfi,
                gma: totals.gma,
                schwabNet,
                firmAUM: totals.gtfi + totals.gma + schwabNet
              });
            });
            
            setAumData(results);
          } catch (err) {
            console.error('Error loading AUM data:', err);
          } finally {
            setLoading(false);
          }
        };
        
        if (clients.length > 0) {
          loadAUMData();
        }
      }, [clients, schwabCustody]);
      
      const formatM = (val) => {
        if (val == null || val === 0) return '-';
        if (Math.abs(val) >= 1000000) return '$' + (val / 1000000).toFixed(2) + 'M';
        return formatCurrency(val);
      };
      
      if (loading) {
        return <div className="text-center py-4 text-gray-500">Loading AUM data...</div>;
      }
      
      return (
        <div className="max-h-64 overflow-y-auto">
          <table className="w-full text-xs">
            <thead className="bg-gray-200 sticky top-0">
              <tr>
                <th className="text-left py-0 px-0.5">Month</th>
                <th className="text-right py-0 px-0.5">GTFI</th>
                <th className="text-right py-0 px-0.5">GMA</th>
                <th className="text-right py-0 px-0.5">Schwab (net MC)</th>
                <th className="text-right py-0 px-0.5 bg-green-100 font-bold">Firm AUM</th>
              </tr>
            </thead>
            <tbody>
              {aumData.map(row => (
                <tr key={row.month} className="border-b hover:bg-gray-100">
                  <td className="py-0 px-0.5">
                    {new Date(row.month + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', year: '2-digit' })}
                  </td>
                  <td className="text-right py-0 px-0.5">{formatM(row.gtfi)}</td>
                  <td className="text-right py-0 px-0.5">{formatM(row.gma)}</td>
                  <td className="text-right py-0 px-0.5">{formatM(row.schwabNet)}</td>
                  <td className="text-right py-0 px-0.5 font-semibold bg-green-50">{formatM(row.firmAUM)}</td>
                </tr>
              ))}
              {aumData.length === 0 && (
                <tr>
                  <td colSpan="5" className="py-2 text-center text-gray-500">No data available</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      );
    }
    
    // Performance Fee Summary Component
    function PerformanceFeeSummary({ clients, year, supabaseFetch, formatCurrency, formatPercent }) {
      const [feeData, setFeeData] = useState([]);
      const [loading, setLoading] = useState(true);
      
      useEffect(() => {
        const loadFeeData = async () => {
          setLoading(true);
          const results = [];
          
          // Get December data for the selected year (or latest month if current year)
          const currentYear = new Date().getFullYear();
          const targetMonth = year === currentYear ? null : `${year}-12-31`;
          
          for (const client of clients) {
            try {
              // Get monthly data for this client for the year
              const monthlyData = await supabaseFetch('monthly_data', 
                `?client_id=eq.${client.client_id}&month_end_date=gte.${year}-01-01&month_end_date=lte.${year}-12-31&order=month_end_date`
              );
              
              if (monthlyData.length === 0) {
                results.push({
                  client,
                  perfFeeYtd: 0,
                  hasData: false
                });
                continue;
              }
              
              // Get the latest month's accrued_perf_fee (this is the YTD value)
              const latestMonth = monthlyData[monthlyData.length - 1];
              const perfFeeYtd = latestMonth.accrued_perf_fee || 0;
              
              results.push({
                client,
                perfFeeYtd,
                latestMonth: latestMonth.month_end_date,
                hasData: true
              });
            } catch (err) {
              console.error(`Error loading data for ${client.client_name}:`, err);
              results.push({
                client,
                perfFeeYtd: 0,
                hasData: false,
                error: err.message
              });
            }
          }
          
          setFeeData(results);
          setLoading(false);
        };
        
        loadFeeData();
      }, [clients, year]);
      
      if (loading) {
        return <div className="text-gray-500">Loading performance fee data...</div>;
      }
      
      const totalPerfFees = feeData.reduce((sum, d) => sum + d.perfFeeYtd, 0);
      const clientsWithFees = feeData.filter(d => d.perfFeeYtd > 0).length;
      
      return (
        <div>
          <div className="mb-6 grid grid-cols-3 gap-4">
            <div className="bg-gray-100 p-4 rounded-lg">
              <p className="text-sm text-gray-600">Clients with Performance Fees</p>
              <p className="text-2xl font-bold">{clients.length}</p>
            </div>
            <div className="bg-gray-100 p-4 rounded-lg">
              <p className="text-sm text-gray-600">Clients Owing Fees ({year})</p>
              <p className="text-2xl font-bold">{clientsWithFees}</p>
            </div>
            <div className="bg-green-100 p-4 rounded-lg">
              <p className="text-sm text-gray-600">Total Performance Fees ({year})</p>
              <p className="text-2xl font-bold text-green-700">{formatCurrency(totalPerfFees)}</p>
            </div>
          </div>
          
          <p className="text-sm text-gray-500 mb-1">Note: Values shown are from each client's Statement calculation (YTD accrued performance fee as of their latest month).</p>
          
          <table className="w-full border-collapse">
            <thead>
              <tr className="border-b-2 border-gray-300">
                <th className="text-left py-2 px-3">Client</th>
                <th className="text-right py-2 px-3">Fee Rate</th>
                <th className="text-right py-2 px-3">Hurdle</th>
                <th className="text-right py-2 px-3">As Of</th>
                <th className="text-right py-2 px-3 font-bold">YTD Perf Fee</th>
              </tr>
            </thead>
            <tbody>
              {feeData.sort((a, b) => b.perfFeeYtd - a.perfFeeYtd).map((d, i) => (
                <tr key={d.client.client_id} className={`border-b border-gray-200 ${i % 2 === 0 ? 'bg-gray-50' : ''}`}>
                  <td className="py-2 px-3">{d.client.client_name}</td>
                  <td className="py-2 px-3 text-right">{formatPercent(d.client.performance_fee_rate, 0)}</td>
                  <td className="py-2 px-3 text-right">{d.client.hurdle_index_id ? 'US Agg' : 'None'}</td>
                  <td className="py-2 px-3 text-right">{d.hasData ? new Date(d.latestMonth).toLocaleDateString('en-US', { month: 'short', year: 'numeric' }) : '-'}</td>
                  <td className="py-2 px-3 text-right font-semibold" style={{ color: d.perfFeeYtd > 0 ? 'rgb(22, 163, 74)' : 'inherit' }}>
                    {d.hasData ? formatCurrency(d.perfFeeYtd) : '-'}
                  </td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-gray-400 font-bold">
                <td className="py-3 px-3">TOTAL</td>
                <td className="py-3 px-3"></td>
                <td className="py-3 px-3"></td>

            const dates = data.map(d => d.month_end_date);

          } catch (err) { console.error('Error loading dates:', err); }
