@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap');

:root {
  --gold: #CAA879;
  --gold-dark: #a88a5e;
  --dark: #1A1A2E;
  --charcoal: #333;
  --gray: #666;
  --light-gray: #e8e8e8;
  --green: #059669;
  --red: #DC2626;
  --pink-bg: #f9e0e0;
  --slide-w: 960px;
  --slide-h: 720px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Source Sans 3', 'Segoe UI', sans-serif; background: #f0ede8; color: var(--charcoal); }

/* ===== LOGIN ===== */
#login-screen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
}
.login-box {
  background: white; border-radius:12px; padding:48px; width:400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-box h1 { color: var(--gold); font-size:24px; margin-bottom:4px; }
.login-box .subtitle { color: var(--gray); font-size:14px; margin-bottom:32px; }
.login-box label { display:block; font-size:13px; color:var(--charcoal); margin-bottom:4px; font-weight:600; }
.login-box input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; margin-bottom:16px; font-family:inherit; }
.login-box input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(202,168,121,0.15); }
.login-box button { width:100%; padding:12px; background:var(--gold); color:white; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
.login-box button:hover { background:var(--gold-dark); }
.login-box .error { color:var(--red); font-size:13px; margin-top:8px; display:none; }

/* ===== DASHBOARD ===== */
#dashboard { display:none; }
.top-bar {
  background:var(--dark); color:white; padding:12px 24px; display:flex;
  align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;
}
.top-bar h2 { font-size:16px; font-weight:600; }
.top-bar h2 span { color:var(--gold); }
.top-bar .controls { display:flex; gap:12px; align-items:center; }
.top-bar select, .top-bar button {
  padding:8px 14px; border-radius:6px; font-size:13px; font-family:inherit; border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1); color:white; cursor:pointer;
}
.top-bar select option { background:var(--dark); color:white; }
.top-bar button { background:var(--gold); border:none; font-weight:600; }
.top-bar button:hover { background:var(--gold-dark); }
.top-bar .btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.3); }
.top-bar .btn-outline:hover { background:rgba(255,255,255,0.1); }

/* ===== SLIDE CONTAINER ===== */
.slides-wrap {
  padding:32px; display:flex; flex-direction:column; align-items:center; gap:32px;
}
.slide-label { font-size:12px; color:var(--gray); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; align-self:flex-start; max-width:var(--slide-w); width:100%; margin-left:auto; margin-right:auto; }
.slide {
  width: var(--slide-w); height: var(--slide-h); background: white;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12); position:relative; overflow:hidden;
  page-break-after: always; flex-shrink:0;
}

.slide-body .slide-header {
  padding: 20px 32px 0;
  display:flex; justify-content:space-between; align-items:baseline;
}
.slide-body .slide-header h2 {
  font-size:26px; font-weight:700;
}
.slide-body .slide-header h2 span { color:var(--gold); }
.slide-body .slide-header .date { font-size:20px; color:#999; letter-spacing:2px; }
.slide-body .header-line {
  margin:8px 32px 0; height:3px;
  background: linear-gradient(to right, var(--gold) 60%, var(--light-gray) 60%);
}
.slide-body .slide-content { padding:16px 32px; }

/* ===== SECTOR CHART AREA ===== */
.sector-pair { display:flex; flex-direction:column; gap:8px; height:100%; }
.sector-block { display:flex; gap:12px; flex:1; align-items:stretch; }
.sector-chart-wrap { flex:1; position:relative; height:260px; }
.sector-chart-wrap canvas { width:100%!important; height:100%!important; }
.sector-stats {
  width:170px; display:flex; flex-direction:column; justify-content:center; font-size:12px;
}
.sector-stats .stat-name { background:var(--dark); color:white; padding:4px 8px; font-weight:700; text-align:center; font-size:11px; }
.sector-stats .stat-label { padding:4px 8px; color:var(--charcoal); text-align:center; font-size:11px; }
.sector-stats .stat-value { padding:4px 8px; text-align:center; font-weight:600; font-size:13px; }
.sector-stats .stat-value.pink { background:var(--pink-bg); }

/* ===== PERFORMANCE TABLE ===== */
.perf-header { margin-bottom:8px; }
.perf-header h3 { font-size:20px; font-weight:700; }
.perf-header .gold-sub { color:var(--gold); font-size:13px; font-weight:600; }
.perf-header .strat-sub { color:var(--gray); font-size:12px; }
.perf-header .date-sub { color:#999; font-size:12px; }

table.perf {
  width:100%; border-collapse:collapse; font-size:12px; margin-bottom:10px;
}
table.perf thead th {
  background:var(--gold); color:white; padding:5px 10px; font-weight:700; font-size:11px;
  text-align:right;
}
table.perf thead th:first-child { text-align:left; }
table.perf tbody td { padding:4px 10px; border-bottom:1px solid #eee; text-align:right; }
table.perf tbody td:first-child { text-align:left; }
table.perf tbody tr.bold td { font-weight:700; border-top:1px solid #aaa; }
.pos { color:var(--green); }
.neg { color:var(--red); }

/* ===== FACT SHEET ===== */
.fact-top { display:flex; gap:16px; margin-bottom:8px; }
.fact-chart { flex:1; height:240px; }
.fact-tables { width:300px; }
table.fact-tbl {
  width:100%; border-collapse:collapse; font-size:11px; margin-bottom:8px;
}
table.fact-tbl thead th {
  background:var(--gold); color:white; padding:3px 6px; font-weight:700; font-size:10px; text-align:right;
}
table.fact-tbl thead th:first-child { text-align:left; }
table.fact-tbl tbody td { padding:3px 6px; border-bottom:1px solid #eee; text-align:right; font-size:10px; }
table.fact-tbl tbody td:first-child { text-align:left; }

table.monthly-grid {
  width:100%; border-collapse:collapse; font-size:9px;
}
table.monthly-grid thead th {
  background:var(--gold); color:white; padding:3px 4px; font-weight:700; font-size:8px; text-align:center;
}
table.monthly-grid tbody td { padding:3px 4px; text-align:center; border-bottom:1px solid #f0f0f0; font-size:8.5px; }
table.monthly-grid tbody td.year-cell { font-weight:700; text-align:left; }
table.monthly-grid tbody td.ytd-cell { font-weight:700; }

// SUPABASE HELPERS

async function sbGet(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${TOKEN}` }
  });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

async function sbAll(table, select='*', filt='', order='') {
  let rows=[], off=0;
  while(true) {
    let p = `${table}?select=${select}&limit=10000&offset=${off}`;
    if(filt) p += `&${filt}`;
    if(order) p += `&order=${order}`;
    const b = await sbGet(p);
    rows.push(...b);
    if(b.length < 10000) break;
    off += 10000;
  }
  return rows;
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    if(!r.ok) { const e = await r.json(); throw new Error(e.error_description || e.msg || 'Login failed'); }
    const data = await r.json();
    TOKEN = data.access_token;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    await loadAllData();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

  const clients = await sbAll('clients','*','','client_name.asc');
  loading.innerHTML = '<div class="spinner"></div><p style="margin-top:12px">Loading strategies...</p>';
  const strats = await sbAll('strategies');
  loading.innerHTML = '<div class="spinner"></div><p style="margin-top:12px">Loading index returns...</p>';

  loading.innerHTML = '<div class="spinner"></div><p style="margin-top:12px">Loading CEF tickers...</p>';
  const tickers = await sbAll('cef_tickers','ticker,sector,asset_class,fund_name');
  loading.innerHTML = '<div class="spinner"></div><p style="margin-top:12px">Loading CEF daily data...</p>';

  const ir = {};
  for(const r of idx) {
    if(!ir[r.index_id]) ir[r.index_id] = {};
    ir[r.index_id][r.month_end_date.slice(0,7)] = r.monthly_return;

  const sel = document.getElementById('sel-client');
  sel.innerHTML = clients.map((c,i) => `<option value="${i}">${c.client_name}</option>`).join('');

  loadClientMonths();
  loading.style.display = 'none';
}

async function loadClientMonths() {
  const ci = document.getElementById('sel-client').value;
  const client = ALL_DATA.clients[ci];
  MONTHLY = await sbAll('monthly_data','*',`client_id=eq.${client.client_id}`,'month_end_date.asc');
  const months = [...new Set(MONTHLY.map(d => d.month_end_date.slice(0,7)))].sort().reverse();
  const sel = document.getElementById('sel-month');
  sel.innerHTML = months.map(m => `<option value="${m}">${fmtMo(m)}</option>`).join('');
}

// ══════════════════════════════════════════════════════════════
// FORMATTING
// ══════════════════════════════════════════════════════════════
function fmtMo(ym) { const [y,m] = ym.split('-'); return `${MONTHS[+m]} ${y}`; }
function fmtMoShort(ym) { const [y,m] = ym.split('-'); return `${MONTHS[+m].slice(0,3)} ${y}`; }
function fmtDate(ym) {
  const [y,m] = ym.split('-').map(Number);
  const ld = new Date(y,m,0).getDate();
  return `${MONTHS[m]} ${ld}, ${y}`;
}
function fmtCat(ym) { const [y,m] = ym.split('-'); return `${MONTHS[+m].slice(0,3)}-${y.slice(2)}`; }
function fmtDollar(v) {
  if(v==null) return '$0.00';
  const s = Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return v >= 0 ? `$${s}` : `-$${s}`;
}
function fmtPct(v,dp=2) {
  if(v==null||v===undefined) return '—';
  return v.toFixed(dp)+'%';
}
function pcClass(v) { return v >= 0 ? 'pos' : 'neg'; }

// ══════════════════════════════════════════════════════════════
// SECTOR DATA
// ══════════════════════════════════════════════════════════════
function buildSectors() {
  const tkSec = {};
  for(const t of ALL_DATA.tickers) {
    const m = SECTOR_MAP[t.sector] || t.sector;
    if(FI_SECTORS.includes(m)) tkSec[t.ticker] = m;
  }
  const tkMo = {};
  for(const d of ALL_DATA.cef_daily) {
    const s = tkSec[d.ticker];
    if(s) {
      if(!tkMo[d.ticker]) tkMo[d.ticker] = {};
      tkMo[d.ticker][d.trade_date.slice(0,7)] = d.discount_pct;
    }
  }
  const allMonths = [...new Set(Object.values(tkMo).flatMap(o => Object.keys(o)))].sort();
  const out = {};
  for(const sec of FI_SECTORS) {
    const stks = Object.keys(tkSec).filter(t => tkSec[t]===sec);
    const series=[], vals=[];
    for(const ym of allMonths) {
      const v = stks.map(t => tkMo[t]?.[ym]).filter(x => x!=null);
      if(v.length) { const a=v.reduce((s,x)=>s+x,0)/v.length; series.push([ym,a]); vals.push(a); }
      else series.push([ym,null]);
    }
    const ha = vals.length ? vals.reduce((s,x)=>s+x,0)/vals.length : 0;
    const cur = vals.length ? vals[vals.length-1] : null;
    out[sec] = { series, hist_avg: ha, current: cur };
  }
  return out;
}

// ══════════════════════════════════════════════════════════════
// PERFORMANCE CALCULATIONS
// ══════════════════════════════════════════════════════════════
function perfCalcs(data, month) {
  const year = month.slice(0,4);
  const md = data.find(d => d.month_end_date.slice(0,7)===month);
  if(!md) return null;
  const mo = +month.slice(5);
  const qs = `${year}-${mo<=3?'01':mo<=6?'04':mo<=9?'07':'10'}`;
  const ytdD = data.filter(d => d.month_end_date.slice(0,4)===year && d.month_end_date.slice(0,7)<=month);
  const qtdD = data.filter(d => d.month_end_date.slice(0,7)>=qs && d.month_end_date.slice(0,7)<=month);
  const siD = data.filter(d => d.month_end_date.slice(0,7)<=month);
  const begQ = qtdD.length ? qtdD[0].beginning_balance : md.beginning_balance;
  const begY = ytdD.length ? ytdD[0].beginning_balance : md.beginning_balance;
  const addQ = qtdD.reduce((s,d)=>s+(d.contributions||0),0);
  const addY = ytdD.reduce((s,d)=>s+(d.contributions||0),0);
  const wdQ = qtdD.reduce((s,d)=>s+(d.withdrawals||0),0);
  const wdY = ytdD.reduce((s,d)=>s+(d.withdrawals||0),0);
  const chgM = (md.ending_balance||0)-(md.beginning_balance||0)-(md.contributions||0)+(md.withdrawals||0);
  const chgQ = (md.ending_balance||0)-(begQ||0)-addQ+wdQ;
  const chgY = (md.ending_balance||0)-(begY||0)-addY+wdY;
  const gm = (md.gross_return_pct||0)*100;
  const nm = (md.net_return_pct||0)*100;
  const fm = gm-nm;
  const chain = (lst,k) => lst.reduce((c,d)=>c*(1+(d[k]||0)),1)-1;
  const ytdG=chain(ytdD,'gross_return_pct'), ytdN=chain(ytdD,'net_return_pct');
  const qtdG=chain(qtdD,'gross_return_pct'), qtdN=chain(qtdD,'net_return_pct');
  const siG=chain(siD,'gross_return_pct'), siN=chain(siD,'net_return_pct');
  const n=siD.length;
  const annN = n>12 ? Math.pow(1+siN,12/n)-1 : siN;
  const fm1 = data.length ? data[0].month_end_date.slice(0,7) : month;
  return { md, begQ, begY, addQ, addY, wdQ, wdY, chgM, chgQ, chgY, gm, nm, fm, ytdG, ytdN, qtdG, qtdN, siG, siN, annN, firstMo:fm1, nMonths:n };
}

    </div>`;
  slideNum++;

  // 2-6. SECTOR DISCOUNTS (5 slides)
  for(const pair of CHART_PAIRS) {
    const slideId = `sector-${slideNum}`;
    let chartsHtml = '';
    for(const sec of pair) {
      const sd = secData[sec];
      if(!sd) continue;
      const canvasId = `chart-${sec.replace(/[\/ ]/g,'_')}-${slideNum}`;
      chartsHtml += `
        <div class="sector-block">
          <div class="sector-chart-wrap">
            <div style="text-align:center;font-size:13px;color:#444;margin-bottom:2px">${sec}</div>
            <canvas id="${canvasId}"></canvas>
          </div>
          <div class="sector-stats">
            <div class="stat-name">${sec}</div>
            <div class="stat-label">Historical Avg Discount</div>
            <div class="stat-value">${fmtPct(sd.hist_avg)}</div>
            <div class="stat-label">Current Avg Discount</div>
            <div class="stat-value pink">${sd.current!=null?fmtPct(sd.current):'—'}</div>
          </div>
        </div>`;
    }
    container.innerHTML += `
      <div class="slide-label">Slide ${slideNum} — Sector Discounts</div>
      <div class="slide slide-body">
        <div class="slide-header">
          <h2><span>SECTOR</span> DISCOUNTS</h2>
          <div class="date">${fmtMo(month)}</div>
        </div>
        <div class="header-line"></div>
        <div class="slide-content"><div class="sector-pair">${chartsHtml}</div></div>
      </div>`;
    slideNum++;
  }

  // 7. PERFORMANCE STATEMENT
  const pc = perfCalcs(MONTHLY, month);
  if(pc) {
    const feeM = pc.fm>0 ? pc.fm*(pc.md.beginning_balance||0)/100 : 0;
    const feeQ = (pc.qtdG-pc.qtdN)*(pc.begQ||0);
    const feeY = (pc.ytdG-pc.ytdN)*(pc.begY||0);
    container.innerHTML += `
      <div class="slide-label">Slide ${slideNum} — Performance Statement</div>
      <div class="slide slide-body">
        <div class="slide-header">
          <h2><span>PERFORMANCE</span> STATEMENT</h2>
          <div class="date">${fmtMo(month)}</div>
        </div>
        <div class="header-line"></div>
        <div class="slide-content">
          <div class="perf-header">
            <h3>${fullName(client.client_name)}</h3>
            <div class="gold-sub">Gridiron Partners</div>
            <div class="strat-sub">${sname}</div>
            <div class="date-sub">${fmtDate(month)}</div>
          </div>
          <table class="perf">
            <thead><tr><th>ACCOUNT SUMMARY</th><th>Month-to-Date</th><th>Quarter-to-Date</th><th>Year-to-Date</th></tr></thead>
            <tbody>
              <tr><td>Beginning Balance</td><td>${fmtDollar(pc.md.beginning_balance)}</td><td>${fmtDollar(pc.begQ)}</td><td>${fmtDollar(pc.begY)}</td></tr>
              <tr><td>Additions</td><td>${fmtDollar(pc.md.contributions||0)}</td><td>${fmtDollar(pc.addQ)}</td><td>${fmtDollar(pc.addY)}</td></tr>
              <tr><td>Withdrawals</td><td>${fmtDollar(pc.md.withdrawals||0)}</td><td>${fmtDollar(pc.wdQ)}</td><td>${fmtDollar(pc.wdY)}</td></tr>
              <tr><td>Change in Value</td><td>${fmtDollar(pc.chgM)}</td><td>${fmtDollar(pc.chgQ)}</td><td>${fmtDollar(pc.chgY)}</td></tr>
              <tr class="bold"><td>Ending Value</td><td>${fmtDollar(pc.md.ending_balance)}</td><td>${fmtDollar(pc.md.ending_balance)}</td><td>${fmtDollar(pc.md.ending_balance)}</td></tr>
            </tbody>
          </table>
          <table class="perf">
            <thead><tr><th>PERFORMANCE SUMMARY</th><th>Month-to-Date</th><th>Quarter-to-Date</th><th>Year-to-Date</th></tr></thead>
            <tbody>
              <tr><td>Gross Performance</td><td class="${pcClass(pc.gm)}">${fmtPct(pc.gm)}</td><td class="${pcClass(pc.qtdG)}">${fmtPct(pc.qtdG*100)}</td><td class="${pcClass(pc.ytdG)}">${fmtPct(pc.ytdG*100)}</td></tr>
              <tr><td>Management Fee</td><td>${fmtDollar(feeM)}</td><td>${fmtDollar(feeQ)}</td><td>${fmtDollar(feeY)}</td></tr>
              <tr class="bold"><td>Net Performance</td><td class="${pcClass(pc.nm)}">${fmtPct(pc.nm)}</td><td class="${pcClass(pc.qtdN)}">${fmtPct(pc.qtdN*100)}</td><td class="${pcClass(pc.ytdN)}">${fmtPct(pc.ytdN*100)}</td></tr>
            </tbody>
          </table>
          <table class="perf">
            <thead><tr><th>SINCE INCEPTION</th><th>Cumulative Gross</th><th>Cumulative Net</th><th>Annualized Net</th></tr></thead>
            <tbody>
              <tr><td>Since ${fmtMo(pc.firstMo)}</td><td class="${pcClass(pc.siG)}">${fmtPct(pc.siG*100)}</td><td class="${pcClass(pc.siN)}">${fmtPct(pc.siN*100)}</td><td class="${pcClass(pc.annN)}">${fmtPct(pc.annN*100)}</td></tr>
            </tbody>
          </table>
          <div class="disclaimer">The financial information and performance data contained in this report represents unaudited financial information and may be subject to future adjustment and revision. Past performance is not a guarantee of future performance.</div>
        </div>
      </div>`;
    slideNum++;
  }

  // 8. FACT SHEET
  if(siD.length) {
    const n = siD.length;
    const rets = siD.map(d => d.net_return_pct||0);
    const avgR = rets.reduce((s,x)=>s+x,0)/n;
    const variance = rets.reduce((s,x)=>s+(x-avgR)**2,0)/(n-1||1);
    const annStd = Math.sqrt(variance)*Math.sqrt(12);
    const posMo = rets.filter(r => r>0).length;

    // Benchmark
    const bRets = siD.map(d => (ALL_DATA.index_returns[1]||{})[d.month_end_date.slice(0,7)]||0);
    const avgB = bRets.reduce((s,x)=>s+x,0)/n;
    let beta=0, corr=0, alpha=0;
    if(n>2) {
      const cov=rets.reduce((s,x,i)=>s+(x-avgR)*(bRets[i]-avgB),0);
      const vb=bRets.reduce((s,x)=>s+(x-avgB)**2,0);
      const va=rets.reduce((s,x)=>s+(x-avgR)**2,0);
      beta = vb?cov/vb:0;
      corr = va&&vb?cov/Math.sqrt(va*vb):0;
    }
    alpha = (avgR-beta*avgB)*12;

    const chainN = lst => lst.reduce((c,d)=>c*(1+(d.net_return_pct||0)),1)-1;
    const year = month.slice(0,4);
    const ytdN = chainN(siD.filter(d=>d.month_end_date.slice(0,4)===year && d.month_end_date.slice(0,7)<=month));
    const mtdN = (siD.find(d=>d.month_end_date.slice(0,7)===month)||{}).net_return_pct||0;
    const a1y = chainN(siD.slice(-12));
    let a3y = null;
    if(siD.length>=36) { const l36=siD.slice(-36); const c36=chainN(l36); a3y=Math.pow(1+c36,12/l36.length)-1; }
    else if(siD.length>=12) { const l=siD.slice(-36); const c=chainN(l); a3y=Math.pow(1+c,12/l.length)-1; }
    const siN = chainN(siD);
    const siAnn = n>12 ? Math.pow(1+siN,12/n)-1 : siN;
    const fm1 = MONTHLY.length ? MONTHLY[0].month_end_date.slice(0,7) : month;

    // VAMI
    const vami = [100];
    for(const d of siD) vami.push(vami[vami.length-1]*(1+(d.net_return_pct||0)));
    const vamiLabels = [fm1, ...siD.map(d=>d.month_end_date.slice(0,7))];

    // Monthly grid
    const years = [...new Set(siD.map(d=>d.month_end_date.slice(0,4)))].sort();
    let gridHtml = '<table class="monthly-grid"><thead><tr><th>Year</th>';
    ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','YTD'].forEach(m => gridHtml += `<th>${m}</th>`);
    gridHtml += '</tr></thead><tbody>';
    for(const yr of years) {
      gridHtml += `<tr><td class="year-cell">${yr}</td>`;
      let yc=1;
      for(let mi=1;mi<=12;mi++) {
        const ym = `${yr}-${String(mi).padStart(2,'0')}`;
        const rec = siD.find(d=>d.month_end_date.slice(0,7)===ym);
        if(rec && rec.net_return_pct!=null) {
          const v=rec.net_return_pct*100; yc*=(1+rec.net_return_pct);
          gridHtml += `<td class="${pcClass(v)}">${v.toFixed(1)}%</td>`;
        } else gridHtml += '<td style="color:#ccc">-</td>';
      }
      const ytdv=(yc-1)*100;
      gridHtml += `<td class="ytd-cell ${pcClass(ytdv)}">${ytdv.toFixed(1)}%</td></tr>`;
    }
    gridHtml += '</tbody></table>';

    const vamiCanvasId = `vami-${slideNum}`;
    container.innerHTML += `
      <div class="slide-label">Slide ${slideNum} — Fact Sheet</div>
      <div class="slide slide-body">
        <div class="slide-header">
          <h2><span>FACT</span> SHEET</h2>
          <div class="date">${fmtMo(month)}</div>
        </div>
        <div class="header-line"></div>
        <div class="slide-content">
          <div class="perf-header" style="margin-bottom:4px">
            <h3>${fullName(client.client_name)}</h3>
            <div class="gold-sub">${sname} <span style="color:#999;font-weight:400;margin-left:16px">Inception: ${fmtMo(fm1)}</span></div>
          </div>
          <div class="fact-top">
            <div class="fact-chart"><canvas id="${vamiCanvasId}"></canvas></div>
            <div class="fact-tables">
              <table class="fact-tbl">
                <thead><tr><th>RISK METRICS</th><th>Gridiron</th><th>US Agg</th></tr></thead>
                <tbody>
                  <tr><td>Std Deviation</td><td>${fmtPct(annStd*100)}</td><td>—</td></tr>
                  <tr><td>Alpha</td><td></td><td>${fmtPct(alpha*100)}</td></tr>
                  <tr><td>Beta</td><td></td><td>${beta.toFixed(2)}</td></tr>
                  <tr><td>Correlation</td><td></td><td>${corr.toFixed(2)}</td></tr>
                  <tr><td>% Positive Mo.</td><td>${n?(posMo/n*100).toFixed(0)+'%':'—'}</td><td>—</td></tr>
                </tbody>
              </table>
              <table class="fact-tbl">
                <thead><tr><th>PERFORMANCE</th><th>Gridiron</th><th>US Agg</th></tr></thead>
                <tbody>
                  <tr><td>MTD</td><td class="${pcClass(mtdN)}">${fmtPct(mtdN*100)}</td><td>—</td></tr>
                  <tr><td>YTD</td><td class="${pcClass(ytdN)}">${fmtPct(ytdN*100)}</td><td>—</td></tr>
                  <tr><td>1Y Ann.</td><td class="${pcClass(a1y)}">${fmtPct(a1y*100)}</td><td>—</td></tr>
                  <tr><td>3Y Ann.</td><td class="${a3y!=null?pcClass(a3y):''}">${a3y!=null?fmtPct(a3y*100):'—'}</td><td>—</td></tr>
                  <tr><td>SI Cum.</td><td class="${pcClass(siN)}">${fmtPct(siN*100)}</td><td>—</td></tr>
                  <tr><td>SI Ann.</td><td class="${pcClass(siAnn)}">${fmtPct(siAnn*100)}</td><td>—</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          ${gridHtml}
          <div class="disclaimer">The financial information and performance data contained in this report represents unaudited financial information and may be subject to future adjustment and revision. Past performance is not a guarantee of future performance.</div>
        </div>
      </div>`;
    slideNum++;

    // Render VAMI chart after DOM is ready
    setTimeout(() => {
      const ctx = document.getElementById(vamiCanvasId);
      if(ctx) {
        const step = Math.max(1, Math.floor(vami.length/8));
        activeCharts.push(new Chart(ctx, {
          type:'line',
          data: {
            labels: vamiLabels,
            datasets: [{ label:'VAMI', data:vami, borderColor:'#CAA879', backgroundColor:'rgba(202,168,121,0.1)', fill:true, tension:0.3, pointRadius:0, borderWidth:2 }]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{display:false}, title:{display:true, text:'VAMI (Growth of $100)', align:'start', font:{size:11} } },
            scales: {
              x: { ticks:{ maxTicksLimit:8, font:{size:8}, maxRotation:45 } },
              y: { ticks:{ font:{size:8} }, grid:{color:'rgba(0,0,0,0.05)'} }
            }
          }
        }));
      }
    }, 100);
  }

  // 9. CONTACT
  container.innerHTML += `
    <div class="slide-label">Slide ${slideNum} — Contact</div>
    <div class="slide slide-body slide-contact">
      <div class="slide-header">
        <h2><span>CONTACT</span> INFORMATION</h2>
      </div>
      <div class="header-line"></div>
      <div class="contact-content">
        <div class="contact-name">MIKE SCHNECK</div>
        <div class="contact-title">Managing Partner</div>
        <div class="contact-details">
          101 Bradford Road, Suite 200<br>
          Wexford, PA 15090<br>
          724-759-7848<br>
          Mike@gridironpartners.com
        </div>
      </div>
    </div>`;

  // Render sector charts after DOM
  setTimeout(() => renderSectorCharts(secData, month), 150);
}

function renderSectorCharts(secData, month) {
  for(const pair of CHART_PAIRS) {
    for(const sec of pair) {
      const sd = secData[sec];
      if(!sd) continue;
      const canvasId = document.querySelector(`[id^="chart-${sec.replace(/[\/ ]/g,'_')}"]`);
      if(!canvasId) continue;
      const cats = sd.series.map(([ym])=>fmtCat(ym));
      const vals = sd.series.map(([,v])=>v);
      const ha = Array(cats.length).fill(sd.hist_avg);

      activeCharts.push(new Chart(canvasId, {
        type:'line',
        data: {
          labels: cats,
          datasets: [
            { label:`${sec} Historical Avg`, data:ha, borderColor:'#CAA879', backgroundColor:'rgba(202,168,121,0.3)', fill:true, pointRadius:0, borderWidth:1.5 },
            { label:`${sec} Current`, data:vals, borderColor:'#555', backgroundColor:'rgba(50,50,50,0.6)', fill:true, pointRadius:0, borderWidth:1 }
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins: { legend:{ display:true, position:'bottom', labels:{font:{size:8},boxWidth:12} } },
          scales: {
            x: { ticks:{ maxTicksLimit:12, font:{size:7}, maxRotation:45 } },
            y: { ticks:{ font:{size:8}, callback: v=>v.toFixed(0)+'%' }, grid:{color:'rgba(0,0,0,0.05)'} }
          }
        }
      }));
    }
  }
}
