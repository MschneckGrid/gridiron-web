      // Load calculated data from dashboard source of truth for new year rows
      useEffect(function() {
        var loadData = async function() {
          setLoading(true);
          try {
            // Fetch composite stats view
            var stats = await supabaseFetch('v_composite_full_stats', '?order=month_end_date.desc');
            // Fetch index returns
            var indexReturns = await supabaseFetch('index_returns', '?order=month_end_date.desc&limit=10000');
            // Fetch schwab custody for firm AUM
            var schwab = await supabaseFetch('schwab_custody', '?order=month_end_date.desc');
            // Fetch monthly data for account counts and dispersion
            var monthlyData = await supabaseFetch('monthly_data', '?order=month_end_date.desc&limit=10000');
            // Fetch clients for strategy mapping
            var clients = await supabaseFetch('clients', '?order=client_name');

            setPreviewData({ stats: stats, indexReturns: indexReturns, schwab: schwab, monthlyData: monthlyData, clients: clients });
          } catch(e) {
            console.error('GIPS data load error:', e);
          }
          setLoading(false);
        };
        loadData();
      }, []);

      // Calculate annual GIPS row from dashboard data
      var calcYearRow = function(year, strategyId) {
        if (!previewData) return null;
        var stats = previewData.stats.filter(function(s) { return s.strategy_id === strategyId && s.month_end_date.startsWith(String(year)); });
        if (stats.length === 0) return null;

        // Annual gross/net/bench from monthly compounding
        var annGross = stats.reduce(function(acc, s) { return acc * (1 + (s.monthly_gross || 0)); }, 1) - 1;
        var annNet = stats.reduce(function(acc, s) { return acc * (1 + (s.monthly_net || 0)); }, 1) - 1;
        var annBench = stats.reduce(function(acc, s) { return acc * (1 + (s.monthly_bench || 0)); }, 1) - 1;

        // 3yr std dev from trailing 36 months
        var decDate = year + '-12-31';
        var allStats = previewData.stats.filter(function(s) { return s.strategy_id === strategyId && s.month_end_date <= decDate; }).sort(function(a,b) { return b.month_end_date.localeCompare(a.month_end_date); });
        var last36 = allStats.slice(0, 36);
        var comp3yr = null, bench3yr = null;
        if (last36.length >= 36) {
          var grossReturns = last36.map(function(s) { return s.monthly_gross || 0; });
          var benchReturns = last36.map(function(s) { return s.monthly_bench || 0; });
          var stdDev = function(arr) {
            var mean = arr.reduce(function(a,b){return a+b;},0) / arr.length;
            var variance = arr.reduce(function(s,v){return s + Math.pow(v - mean, 2);}, 0) / (arr.length - 1);
            return Math.sqrt(variance) * Math.sqrt(12);
          };
          comp3yr = stdDev(grossReturns) * 100;
          bench3yr = stdDev(benchReturns) * 100;
        }

        // Number of accounts at year end (December)
        var decMonthEnd = year + '-12-31';
        var yearEndMd = previewData.monthlyData.filter(function(md) {
          var client = previewData.clients.find(function(c) { return c.client_id === md.client_id; });
          return client && client.strategy_id === strategyId && md.month_end_date === decMonthEnd;
        });
        var includedAccounts = yearEndMd.filter(function(md) {
          return !isExcludedFromComposite(md, previewData.monthlyData).excluded;
        });
        var numAccounts = includedAccounts.length;

        // Dispersion: asset-weighted std dev of annual gross returns
        var dispersion = null;
        if (numAccounts >= 6) {
          // Get full year monthly data for each account
          var yearMd = previewData.monthlyData.filter(function(md) {
            var client = previewData.clients.find(function(c) { return c.client_id === md.client_id; });
            return client && client.strategy_id === strategyId && md.month_end_date.startsWith(String(year));
          });
          // Group by client
          var clientGroups = {};
          yearMd.forEach(function(md) { 
            if (!clientGroups[md.client_id]) clientGroups[md.client_id] = [];
            clientGroups[md.client_id].push(md);
          });
          // Calculate annual return for each client that was in composite all 12 months
          var clientAnnuals = [];
          var totalWeight = 0;
          Object.keys(clientGroups).forEach(function(cid) {
            var months = clientGroups[cid];
            if (months.length === 12) {
              var annualReturn = months.reduce(function(acc, m) { return acc * (1 + (m.gross_return_pct || 0)); }, 1) - 1;
              var avgBalance = months.reduce(function(s, m) { return s + (m.beginning_balance || 0); }, 0) / 12;
              clientAnnuals.push({ ret: annualReturn, weight: avgBalance });
              totalWeight += avgBalance;
            }
          });
          if (clientAnnuals.length >= 6 && totalWeight > 0) {
            var weightedMean = clientAnnuals.reduce(function(s, c) { return s + (c.weight / totalWeight) * c.ret; }, 0);
            var weightedVar = clientAnnuals.reduce(function(s, c) { return s + (c.weight / totalWeight) * Math.pow(c.ret - weightedMean, 2); }, 0);
            dispersion = Math.sqrt(weightedVar) * 100;
          }
        }

        // Composite assets at year end
        var compAssets = yearEndMd.reduce(function(s, md) { return s + (md.ending_balance || 0); }, 0) / 1000000;

        // Firm assets at year end (GTFI + GMA + Schwab net)
        var allYearEndMd = previewData.monthlyData.filter(function(md) { return md.month_end_date === decMonthEnd; });
        var gtfiAssets = 0, gmaAssets = 0;
        allYearEndMd.forEach(function(md) {
          var client = previewData.clients.find(function(c) { return c.client_id === md.client_id; });
          if (client) {
            if (client.strategy_id === 1) gtfiAssets += (md.ending_balance || 0);
            else if (client.strategy_id === 2) gmaAssets += (md.ending_balance || 0);
          }
        });
        var schwabDec = previewData.schwab.find(function(s) { return s.month_end_date === decMonthEnd; });
        var schwabVal = schwabDec ? (schwabDec.asset_value || 0) : 0;
        var mechContractors = previewData.clients.find(function(c) { return c.client_name && c.client_name.toLowerCase().includes('mechanical contractors'); });
        var mcBal = 0;
        if (mechContractors) {
          var mcMd = allYearEndMd.find(function(md) { return md.client_id === mechContractors.client_id; });
          mcBal = mcMd ? (mcMd.ending_balance || 0) : 0;
        }
        var firmAssets = Math.round((gtfiAssets + gmaAssets + schwabVal - mcBal) / 1000000);

        return {
          year: year,
          gross: Math.round(annGross * 10000) / 100,
          net: Math.round(annNet * 10000) / 100,
          bench: Math.round(annBench * 10000) / 100,
          accounts: numAccounts,
          dispersion: dispersion != null ? Math.round(dispersion * 100) / 100 : null,
          dispersionNote: numAccounts < 6 ? 1 : null,
          comp3yr: comp3yr != null ? Math.round(comp3yr * 100) / 100 : null,
          comp3yrNote: comp3yr == null ? 2 : null,
          bench3yr: bench3yr != null ? Math.round(bench3yr * 100) / 100 : null,
          bench3yrNote: bench3yr == null ? 2 : null,
          compAssets: Math.round(compAssets * 100) / 100,
          firmAssets: firmAssets > 0 ? firmAssets : null,
          calculated: true
        };
      };

      // Build full table: audited rows + calculated new rows on top
      var getTableData = function() {
        var audited = selectedComposite === 'GTFI' ? GTFI_AUDITED : GMA_AUDITED;
        var stratId = selectedComposite === 'GTFI' ? 1 : 2;
        var lastAuditedYear = audited[0].year;
        var newRows = [];
        for (var y = gipsYear; y > lastAuditedYear; y--) {
          var row = calcYearRow(y, stratId);
          if (row) newRows.push(row);
        }
        return newRows.concat(audited);
      };

      var tableData = previewData ? getTableData() : [];
      var disclosureText = selectedComposite === 'GTFI' ? GTFI_DISCLOSURES : GMA_DISCLOSURES;
      // Replace VFYEAR with the latest audited year (always the top audited year)
      var auditedData = selectedComposite === 'GTFI' ? GTFI_AUDITED : GMA_AUDITED;
      var latestVerifiedYear = auditedData[0].year;
      disclosureText = disclosureText.replace(/VFYEAR/g, String(latestVerifiedYear));

      var fmtVal = function(v, note, suffix) {
        if (v == null && note) return 'N/A' + String.fromCharCode(8304 + note);
        if (v == null) return '-';
        return (v >= 0 ? '' : '') + v.toFixed(2) + (suffix || '%');
      };

          var tableStartY = titleY + 18;

          var headers = [['Year\nEnd', 'Annual\nPerformance\nGross', 'Annual\nPerformance\nNet', 'Benchmark\nReturns', 'Number\nof\nAccounts', 'Composite\nDispersion', 'Composite\n3 Yr Std\nDev', 'Benchmark\n3 Yr Std\nDev', 'Composite\nAssets (USD)\n(Millions)', 'Firm\nAssets (USD)\n(Millions)']];
          var rows = tableData.map(function(r) {

              r.compAssets != null ? r.compAssets.toFixed(2) : '-',
              r.firmAssets != null ? String(r.firmAssets) : '-'
            ];
          });

          doc.autoTable({
            head: headers,

            margin: { left: margin, right: margin },
            tableWidth: contentWidth,
            styles: { fontSize: 6.5, cellPadding: 2.5, lineWidth: 0.4, lineColor: [180, 180, 180], halign: 'center', valign: 'middle' },
            headStyles: { fillColor: [50, 50, 50], textColor: 255, fontStyle: 'bold', fontSize: 6, halign: 'center', valign: 'middle', cellPadding: 3 },
            alternateRowStyles: { fillColor: [248, 248, 248] },
            didParseCell: function(data) {
              if (data.section === 'body' && tableData[data.row.index] && tableData[data.row.index].calculated) {
                data.cell.styles.fillColor = [235, 242, 255];
              }
            }
          });

          // ── Full-Width Disclosures ──
          var finalY = doc.lastAutoTable.finalY + 12;
          var disclosureMargin = margin;
          var disclosureWidth = pageWidth - disclosureMargin * 2;
          var discFontSize = 5.8;
          var discLineHeight = 7.5;
          doc.setFontSize(discFontSize);
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(50, 50, 50);

          // Split disclosure text into paragraphs, then wrap each paragraph
          var paragraphs = disclosureText.split('\n\n');
          for (var pi = 0; pi < paragraphs.length; pi++) {
            var para = paragraphs[pi].replace(/\n/g, ' ').trim();
            if (para === '') continue;
            var paraLines = doc.splitTextToSize(para, disclosureWidth);
            for (var pli = 0; pli < paraLines.length; pli++) {
              if (finalY + discLineHeight > pageHeight - 20) {
                doc.addPage();
                finalY = margin;
              }
              doc.text(paraLines[pli], disclosureMargin, finalY);
              finalY += discLineHeight;
            }
            // Small gap between paragraphs
            finalY += 3;
          }

          var fileName = selectedComposite + '_GIPS_Presentation_12_31_' + (tableData.length > 0 ? String(tableData[0].year).slice(-2) : 'XX') + '.pdf';
          doc.save(fileName);
        } catch(err) {
          console.error('GIPS PDF export error:', err);
          alert('Error generating PDF: ' + err.message);
        }
        setGenerating(false);
      };

      if (loading) return React.createElement('div', { className: 'p-8 text-gray-500' }, 'Loading GIPS data...');

      return (
        <div>

                  return React.createElement('option', { key: y, value: y }, 'Through ' + y);

              </select>
              <button onClick={exportGIPSPDF} disabled={generating} className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 disabled:bg-gray-400 font-bold">

          {/* Preview Table */}
          <div className="bg-white border rounded-lg overflow-hidden shadow-sm">

                  <tr className="bg-gray-800 text-white">
                    <th className="py-2 px-3 text-center text-xs font-bold">Year End</th>
                    <th className="py-2 px-3 text-center text-xs font-bold">Annual Performance Gross</th>

                    <th className="py-2 px-3 text-center text-xs font-bold">Firm Assets (Millions)</th>
                  </tr>
                </thead>
                <tbody>
                  {tableData.map(function(r, i) {
                    var bgClass = r.calculated ? 'bg-blue-50' : (i % 2 === 0 ? 'bg-white' : 'bg-gray-50');
                    return (
                      <tr key={r.year} className={'border-b border-gray-200 ' + bgClass}>

    function ReturnOverridesInline() {
      const [selectedStrategy, setSelectedStrategy] = useState(1);
      const [saving, setSaving] = useState(false);
      const [message, setMessage] = useState('');

      // Form state
      const [formDate, setFormDate] = useState('');
      const [formGrossOverride, setFormGrossOverride] = useState('');
      const [formNetOverride, setFormNetOverride] = useState('');

      const handleSaveOverride = async (e) => {
        e.preventDefault();
        if (!formDate) {
          setMessage('Please select a month');
          return;
        }

        setSaving(true);
        setMessage('');

        try {
          const updateData = {
            return_source: (formGrossOverride || formNetOverride) ? 'legacy' : 'calculated'
          };
          
          if (formGrossOverride !== '') {
            updateData.gross_return_override = parseFloat(formGrossOverride) / 100;
          }
          if (formNetOverride !== '') {
            updateData.net_return_override = parseFloat(formNetOverride) / 100;
          }

          // Check if record exists
          const checkResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/composite_returns?strategy_id=eq.${selectedStrategy}&month_end_date=eq.${formDate}`,
            {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`
              }
            }
          );
          const existing = await checkResponse.json();

          let response;
          if (existing.length > 0) {
            // Update existing record
            response = await fetch(
              `${SUPABASE_URL}/rest/v1/composite_returns?strategy_id=eq.${selectedStrategy}&month_end_date=eq.${formDate}`,
              {
                method: 'PATCH',
                headers: {
                  'apikey': SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(updateData)
              }
            );
          } else {
            // Insert new record (for legacy months with no calculated data)
            response = await fetch(
              `${SUPABASE_URL}/rest/v1/composite_returns`,
              {
                method: 'POST',
                headers: {
                  'apikey': SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  strategy_id: selectedStrategy,
                  month_end_date: formDate,
                  gross_return: updateData.gross_return_override || 0,
                  net_return: updateData.net_return_override || 0,
                  ...updateData
                })
              }
            );
          }

          if (response.ok) {
            setMessage('Saved!');
            setFormGrossOverride('');
            setFormNetOverride('');
            setTimeout(() => setMessage(''), 3000);
          } else {
            setMessage('Error saving');
          }
        } catch (err) {
          console.error('Error:', err);
          setMessage('Error saving');
        }
        setSaving(false);
      };

      return (
        <div>
          <div className="mb-1">
            <label className="block text-xs font-medium mb-1">Composite</label>
            <select 
              value={selectedStrategy} 
              onChange={(e) => setSelectedStrategy(parseInt(e.target.value))}
              className="w-full px-2 py-1.5 border rounded text-xs"
            >
              <option value={1}>GTFI</option>
              <option value={2}>GMA</option>
            </select>
          </div>

          <form onSubmit={handleSaveOverride}>
            <div className="space-y-2">
              <div>
                <label className="block text-xs font-medium mb-1">Month End Date</label>
                <input 
                  type="date" 
                  value={formDate}
                  onChange={(e) => setFormDate(e.target.value)}
                  className="w-full px-2 py-1.5 border rounded text-xs" 
                  required 
                />
              </div>
              
              <div>
                <label className="block text-xs font-medium mb-1">Gross Override (%)</label>
                <input 
                  type="number" 
                  step="0.0001"
                  placeholder="e.g., 1.25"
                  value={formGrossOverride}
                  onChange={(e) => setFormGrossOverride(e.target.value)}
                  className="w-full px-2 py-1.5 border rounded text-xs" 
                />
              </div>
              
              <div>
                <label className="block text-xs font-medium mb-1">Net Override (%)</label>
                <input 
                  type="number" 
                  step="0.0001"
                  placeholder="e.g., 1.15"
                  value={formNetOverride}
                  onChange={(e) => setFormNetOverride(e.target.value)}
                  className="w-full px-2 py-1.5 border rounded text-xs" 
                />
              </div>
            </div>
            
            <button 
              type="submit" 
              disabled={saving}
              className="mt-2 px-3 py-1.5 bg-purple-600 text-white rounded hover:bg-purple-700 disabled:bg-gray-400 text-xs"
            >
              {saving ? 'Saving...' : 'Save Override'}
            </button>
            
            {message && (
              <span className={`ml-2 text-xs ${message.includes('Error') ? 'text-red-600' : 'text-green-600'}`}>
                {message}
              </span>
            )}
          </form>
          
          <p className="mt-3 text-xs text-gray-500">
            Enter as % (e.g., 1.25 for 1.25%). Overrides replace calculated returns.
          </p>
        </div>
      );
    }

      const [fundCharsSaving, setFundCharsSaving] = useState(false);
      const [fundCharsAsOf, setFundCharsAsOf] = useState('');
      const [ftDetailsLoading, setFtDetailsLoading] = useState(false);
      const [ftDetailsStatus, setFtDetailsStatus] = useState('');
      const [ftDetailsRaw, setFtDetailsRaw] = useState(null);
      const [hmFontSize, setHmFontSize] = useState(() => {
        try { return parseInt(localStorage.getItem('hm_font_size')) || 12; } catch(e) { return 12; }
      });
      const updateFontSize = (size) => {
        setHmFontSize(size);
        try { localStorage.setItem('hm_font_size', String(size)); } catch(e) {}
      };

      // Comparison date state for share change tracking
      const [availableDates, setAvailableDates] = useState([]);
      const [compareDate, setCompareDate] = useState('');
      const [priorData, setPriorData] = useState(null);
      const [loadingPrior, setLoadingPrior] = useState(false);

      // Fetch latest holdings from Supabase on mount
      React.useEffect(() => {
        (async () => {
          try {
            // Get the latest recon_date
            const dateRes = await fetch(
              `${SUPABASE_URL}/rest/v1/holdings_matrix?select=recon_date&order=recon_date.desc&limit=1`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const dateRows = await dateRes.json();
            if (!dateRows || !dateRows.length) { setLoadingFromDb(false); return; }
            const latestDate = dateRows[0].recon_date;

            // Fetch all rows for that date (excluding the __SECURITY_NAMES__ row)
            const dataRes = await fetch(
              `${SUPABASE_URL}/rest/v1/holdings_matrix?recon_date=eq.${latestDate}&client=neq.__SECURITY_NAMES__&order=client`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const rows = await dataRes.json();

            // Fetch security names row
            const secRes = await fetch(
              `${SUPABASE_URL}/rest/v1/holdings_matrix?recon_date=eq.${latestDate}&client=eq.__SECURITY_NAMES__`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const secRows = await secRes.json();

            if (rows && rows.length > 0) {
              // Filter out accounts for clients marked Closed in the DB
              const closedClientRows = rows.filter(r => r.client === 'Sheet Metal Workers Local 12' && r.custodian === 'Pershing');
              if (closedClientRows.length > 0) console.log('HM: Filtered out', closedClientRows.length, 'closed Pershing SMW12 rows');
              const activeRows = rows.filter(r => !(r.client === 'Sheet Metal Workers Local 12' && r.custodian === 'Pershing'));
              const clients = activeRows.map(r => ({
                client: r.client,
                composite: r.composite || 'GTFI',
                account: r.account || '',
                custodian: r.custodian || '',
                cash: parseFloat(r.cash) || 0,
                holdings: (typeof r.holdings === 'string' ? JSON.parse(r.holdings) : r.holdings) || [],
                totalShares: parseFloat(r.total_shares) || 0
              }));

              let securityNames = RECON_DATA.securityNames || {};
              if (secRows && secRows.length > 0) {
                const secData = typeof secRows[0].holdings === 'string' ? JSON.parse(secRows[0].holdings) : secRows[0].holdings;
                if (secData && typeof secData === 'object') securityNames = { ...securityNames, ...secData };
              }

              setReconData({ clients, securityNames });
              const d = new Date(latestDate + 'T12:00:00');
              const dateStr = d.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
              const updatedAt = activeRows[0]?.updated_at ? new Date(activeRows[0].updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : dateStr;
              setUploadInfo({ filename: 'Supabase', date: dateStr, clients: clients.length, securities: Object.keys(securityNames).length, lastUpdated: updatedAt, fromDb: true });
            }
          } catch (err) {
            console.error('Failed to load holdings from Supabase:', err);
          } finally {
            setLoadingFromDb(false);
          }
        })();
      }, []);

      // Fetch all available recon dates for comparison dropdown
      React.useEffect(() => {
        (async () => {
          try {
            const res = await fetch(
              `${SUPABASE_URL}/rest/v1/holdings_matrix?select=recon_date&client=neq.__SECURITY_NAMES__&order=recon_date.desc`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const rows = await res.json();
            if (rows && rows.length) {
              const unique = [...new Set(rows.map(r => r.recon_date))];
              setAvailableDates(unique);
            }
          } catch (err) {
            console.error('Failed to load available dates:', err);
          }
        })();
      }, [reconData]);

      // Fetch prior date holdings when compareDate changes
      React.useEffect(() => {
        if (!compareDate) { setPriorData(null); return; }
        setLoadingPrior(true);
        (async () => {
          try {
            const res = await fetch(
              `${SUPABASE_URL}/rest/v1/holdings_matrix?recon_date=eq.${compareDate}&client=neq.__SECURITY_NAMES__&order=client`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const rows = await res.json();
            if (rows && rows.length) {
              const clients = rows.map(r => ({
                client: r.client,
                composite: r.composite || 'GTFI',
                holdings: (typeof r.holdings === 'string' ? JSON.parse(r.holdings) : r.holdings) || []
              }));
              setPriorData(clients);
            } else {
              setPriorData(null);
            }
          } catch (err) {
            console.error('Failed to load prior holdings:', err);
            setPriorData(null);
          } finally {
            setLoadingPrior(false);
          }
        })();
      }, [compareDate]);

      // Load fund characteristics from Supabase
      React.useEffect(() => {
        (async () => {
          try {
            const res = await fetch(
              `${SUPABASE_URL}/rest/v1/fund_characteristics?select=*`,
              { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
            );
            const rows = await res.json();
            if (rows && rows.length) {
              const chars = {};
              rows.forEach(r => { chars[r.ticker] = r; });
              setFundChars(chars);
              if (rows[0].as_of_date) setFundCharsAsOf(rows[0].as_of_date);
            }
          } catch (err) { console.error('Failed to load fund characteristics:', err); }
        })();
      }, []);

      // Save a single fund characteristic row to Supabase
      const saveFundChar = async (ticker, data) => {
        setFundCharsSaving(true);
        try {
          const payload = {
            ticker,
            effective_duration: data.effective_duration || null,
            avg_maturity: data.avg_maturity || null,
            distribution_yield: data.distribution_yield || null,
            coupon: data.coupon || null,
            sec_yield: data.sec_yield || null,
            usd_exposure_pct: data.usd_exposure_pct ?? 100,
            leverage_pct: data.leverage_pct || null,
            as_of_date: data.as_of_date || null,
            updated_at: new Date().toISOString()
          };
          const resp = await fetch(
            `${SUPABASE_URL}/rest/v1/fund_characteristics?ticker=eq.${encodeURIComponent(ticker)}`,
            { method: 'GET', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}` } }
          );
          const existing = await resp.json();
          const method = existing && existing.length > 0 ? 'PATCH' : 'POST';
          const url = method === 'PATCH'
            ? `${SUPABASE_URL}/rest/v1/fund_characteristics?ticker=eq.${encodeURIComponent(ticker)}`
            : `${SUPABASE_URL}/rest/v1/fund_characteristics`;
          await fetch(url, {
            method,
            headers: {
              'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json', 'Prefer': 'return=minimal'
            },
            body: JSON.stringify(method === 'POST' ? payload : (() => { const {ticker: _, ...rest} = payload; return rest; })())
          });
          setFundChars(prev => ({ ...prev, [ticker]: { ...payload, ticker } }));
          setFundCharsEditing(null);
        } catch (err) { alert('Save failed: ' + err.message); }
        setFundCharsSaving(false);
      };

      // Calculate composite-level weighted average characteristics

      const COMPOSITE_MAP = {
        'Allegheny CNTY Gridiron Fix Income': 'GTFI', 'Apprentice & Journeymens': 'GMA',
        'Asbestos Workers Local 2': 'GMA', 'Asbestos Workers Pen- Gridiron': 'GTFI',
        'BLDG TRADES OF WPA PENS GRID': 'GMA', 'Beaver County': 'GTFI',
        'Brick & Allied Craft Gridiron': 'GTFI', 'Bricklayers Pension Gridiron': 'GTFI',
        'Bricklayers of WPA Wel Gridiron': 'GTFI', 'Carpenters Med Gridiron': 'GTFI',
        'City of Wash Gridiron': 'GTFI', 'HARRY S TACK/MFU FND-GRIDIRON PT': 'GTFI',
        'INTL ASSOC SHEET METAL LOC 12': 'GMA',
        'INTL ASSOC of Sheetmetal Air/Rail/Transportation Workers Local Union No 33': 'GMA',
        'IRON WORKERS W PA WEL PL GRIDIRO': 'GTFI', 'Pitttsburgh Pension Gridiron': 'GTFI',
        'Plumbers LCL Union 27 BLDG FD': 'GMA', 'Plumbers LCL Union 27 GEN FUND': 'GMA',
        'Plumbers/Pipe Fitters Loc. Union 354 Health Welfare Gridiron Funds': 'GMA',
        'Port Authority of Allegheny County Retirement and Disability Allowance Plan': 'GMA',
        'SHEET METAL WKRS LCL 12 GRIDIRON': 'GTFI', 'Sheet Metal Workers Local 12': 'GTFI',
        'Steamfitters 449 Pen Gridiron': 'GMA', 'Steamfitters Local Union Build': 'GMA',
        'Steamfitters Local Union Gen': 'GMA', 'WPA Teamsters Gridiron Partners LLC': 'GTFI',
        'Washington CTY - Gridiron': 'GTFI', 'Western Pennsylvania School for the Deaf': 'GTFI',
        'Westmoreland County - Gridiron': 'GMA'
      };

      const CUSTODIAN_MAP = {
        'PNC': 'PNC', 'US Bank': 'US Bank', 'Somerset': 'Somerset',
        'BNY': 'BNY', 'Velocity GS': 'Velocity GS', 'Pershing': 'Pershing'
      };

      const parseReconExcel = (file) => {
        setUploadError('');
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const sheets = wb.SheetNames;

            const custodianSheetPairs = [];
            const custodianKeys = ['PNC', 'US Bank', 'Somerset', 'BNY', 'Velocity GS', 'Pershing'];
            custodianKeys.forEach(cust => {
              const posSheet = sheets.find(s => s.toLowerCase().includes(cust.toLowerCase().replace(' ', ' ')) && s.toLowerCase().includes('pos'));
              const cashSheet = sheets.find(s => s.toLowerCase().includes(cust.toLowerCase().replace(' ', ' ')) && s.toLowerCase().includes('cash') && !s.toLowerCase().includes('pos'));
              if (posSheet || cashSheet) custodianSheetPairs.push({ custodian: cust, posSheet, cashSheet });
            });

            const clientsMap = {};
            const secNames = {};

            custodianSheetPairs.forEach(({ custodian, posSheet, cashSheet }) => {
              if (posSheet) {
                const ws = wb.Sheets[posSheet];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                let headerRow = -1;
                for (let i = 0; i < Math.min(5, rows.length); i++) {
                  const row = rows[i];
                  if (row && row.some(v => v && String(v).toLowerCase() === 'symbol')) { headerRow = i; break; }
                }
                if (headerRow === -1) return;

                const hdr = rows[headerRow];
                const colIdx = {};
                hdr.forEach((v, i) => { if (v) colIdx[String(v).trim()] = i; });
                const symCol = colIdx['Symbol'] !== undefined ? colIdx['Symbol'] : 0;
                const portCol = colIdx['Portfolio'] !== undefined ? colIdx['Portfolio'] : 1;
                const acctCol = colIdx['Account'] !== undefined ? colIdx['Account'] : 2;
                const qtyCol = colIdx['QtyInternal'] !== undefined ? colIdx['QtyInternal'] : 4;

                for (let i = headerRow + 1; i < rows.length; i++) {
                  const row = rows[i];
                  if (!row || !row[symCol]) continue;
                  const ticker = String(row[symCol]).trim();
                  const portfolio = String(row[portCol] || '').trim();
                  const account = String(row[acctCol] || '').trim();
                  const qty = parseFloat(row[qtyCol]) || 0;
                  if (!ticker || !portfolio || qty === 0) continue;

                  const key = portfolio;
                  if (!clientsMap[key]) {
                    clientsMap[key] = {
                      client: portfolio, composite: COMPOSITE_MAP[portfolio] || 'GTFI',
                      account: account, custodian: custodian, cash: 0, holdings: [], totalShares: 0
                    };
                  }

                  const existing = clientsMap[key].holdings.find(h => h.ticker === ticker);
                  if (existing) {
                    existing.shares += qty;
                  } else {
                    clientsMap[key].holdings.push({ ticker, name: ticker, shares: qty });
                  }
                  clientsMap[key].totalShares += qty;

                  if (!secNames[ticker]) secNames[ticker] = ticker;
                }
              }

              if (cashSheet) {
                const ws = wb.Sheets[cashSheet];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                let headerRow = -1;
                for (let i = 0; i < Math.min(5, rows.length); i++) {
                  const row = rows[i];
                  if (row && row.some(v => v && String(v).toLowerCase().includes('closingbalance'))) { headerRow = i; break; }
                }
                if (headerRow === -1) return;

                const hdr = rows[headerRow];
                const colIdx = {};
                hdr.forEach((v, i) => { if (v) colIdx[String(v).trim()] = i; });
                const portCol = colIdx['Portfolio'] !== undefined ? colIdx['Portfolio'] : 1;
                const acctCol = colIdx['Account'] !== undefined ? colIdx['Account'] : 2;
                const balCol = colIdx['ClosingBalanceInternal'] !== undefined ? colIdx['ClosingBalanceInternal'] : 3;

                for (let i = headerRow + 1; i < rows.length; i++) {
                  const row = rows[i];
                  if (!row || !row[portCol]) continue;
                  const portfolio = String(row[portCol]).trim();
                  const account = String(row[acctCol] || '').trim();
                  const balance = parseFloat(row[balCol]) || 0;
                  if (!portfolio) continue;

                  const key = portfolio;
                  if (!clientsMap[key]) {
                    clientsMap[key] = {
                      client: portfolio, composite: COMPOSITE_MAP[portfolio] || 'GTFI',
                      account: account, custodian: custodian, cash: 0, holdings: [], totalShares: 0
                    };
                  }
                  clientsMap[key].cash += balance;
                  if (!clientsMap[key].account && account) clientsMap[key].account = account;
                }
              }
            });

            const oldSecNames = reconData.securityNames || {};
            Object.keys(secNames).forEach(t => {
              if (oldSecNames[t] && oldSecNames[t] !== t) secNames[t] = oldSecNames[t];
            });

            const clients = Object.values(clientsMap).sort((a, b) => a.client.localeCompare(b.client));
            const newRecon = { clients, securityNames: { ...oldSecNames, ...secNames } };

            setReconData(newRecon);
            const dateMatch = file.name.match(/(\d{2})[_\-](\d{2})[_\-](\d{4})/);
            const dateStr = dateMatch ? `${dateMatch[1]}/${dateMatch[2]}/${dateMatch[3]}` : new Date().toLocaleDateString();
            const now = new Date();
            const updatedStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            setUploadInfo({ filename: file.name, date: dateStr, clients: clients.length, securities: Object.keys(secNames).length, lastUpdated: updatedStr });
            setUploadError('');

            // Push to Supabase
            const reconDate = dateMatch ? `${dateMatch[3]}-${dateMatch[1]}-${dateMatch[2]}` : new Date().toISOString().slice(0, 10);
            const upsertRows = clients.map(c => ({
              recon_date: reconDate,
              client: c.client,
              composite: c.composite,
              account: c.account,
              custodian: c.custodian,
              cash: Math.round(c.cash * 100) / 100,
              holdings: JSON.stringify(c.holdings),
              total_shares: Math.round(c.totalShares * 10000) / 10000,
              updated_at: new Date().toISOString()
            }));
            // Also store security names
            upsertRows.push({
              recon_date: reconDate,
              client: '__SECURITY_NAMES__',
              composite: null, account: null, custodian: null, cash: 0,
              holdings: JSON.stringify({ ...oldSecNames, ...secNames }),
              total_shares: 0,
              updated_at: new Date().toISOString()
            });

            // Upsert in batches
            (async () => {
              try {
                for (let i = 0; i < upsertRows.length; i += 50) {
                  const batch = upsertRows.slice(i, i + 50);
                  await fetch(`${SUPABASE_URL}/rest/v1/holdings_matrix`, {
                    method: 'POST',
                    headers: {
                      'apikey': SUPABASE_ANON_KEY,
                      'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,
                      'Content-Type': 'application/json',
                      'Prefer': 'resolution=merge-duplicates'
                    },
                    body: JSON.stringify(batch)
                  });
                }
                console.log('Holdings synced to Supabase');
              } catch (err) {
                console.error('Failed to sync holdings to Supabase:', err);
              }
            })();
          } catch (err) {
            setUploadError('Error parsing file: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleFileDrop = (e) => {
        e.preventDefault(); e.stopPropagation();
        e.currentTarget.classList.remove('border-teal-500', 'bg-teal-50');
        const file = e.dataTransfer.files[0];
        if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) parseReconExcel(file);
        else setUploadError('Please upload an .xlsx or .xls file');
      };

      const handleDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('border-teal-500', 'bg-teal-50'); };
      const handleDragLeave = (e) => { e.currentTarget.classList.remove('border-teal-500', 'bg-teal-50'); };

      const hmClients = reconData.clients;
      const hmSecNames = reconData.securityNames;

      const compositeClients = useMemo(() => {
        if (!hmComposite) return [];
        return hmClients.filter(c => c.composite === hmComposite);
      }, [hmComposite, hmClients]);

      const shortName = (name) => {
        return name.replace(/ Gridiron.*$/i, '').replace(/ GRID.*$/i, '').replace(/Plumbers.*Union /i, 'Plbrs ').replace(/Steamfitters /i, 'Stmft ').replace(/Local /i, 'Lcl ').replace(/Workers/i, 'Wkrs').replace(/Western Pennsylvania/i, 'WPA').replace(/ of Allegheny County.*$/i, '').replace(/Port Authority.*$/i, 'Port Auth').replace(/INTL ASSOC.*LOCAL/i, 'SMWIA').replace(/ Health Welfare.*$/i, ' H&W').replace(/Apprentice & Journeymens/i, 'JATC').substring(0, 20);
      };

      const allTickers = useMemo(() => {
        if (!compositeClients.length) return [];
        const tSet = new Set();
        compositeClients.forEach(c => c.holdings.forEach(h => tSet.add(h.ticker)));
        customTickers.forEach(t => tSet.add(t));
        let tickers = Array.from(tSet);
        if (hmSearch) {
          const q = hmSearch.toLowerCase();
          tickers = tickers.filter(t => t.toLowerCase().includes(q) || (hmSecNames[t] || '').toLowerCase().includes(q));
        }
        tickers.sort();
        return tickers;
      }, [compositeClients, hmSearch, customTickers]);

      const clientMVs = useMemo(() => {
        const mvs = {};
        compositeClients.forEach(c => {
          const secMV = c.holdings.reduce((s, h) => s + (h.shares * (hmPrices[h.ticker] || 0)), 0);
          mvs[c.client] = secMV + c.cash;
        });
        return mvs;
      }, [compositeClients, hmPrices]);

      const holdingsMap = useMemo(() => {
        const m = {};
        compositeClients.forEach(c => {
          c.holdings.forEach(h => {
            if (!m[h.ticker]) m[h.ticker] = {};
            const price = hmPrices[h.ticker] || 0;
            const mv = h.shares * price;
            const totalMV = clientMVs[c.client] || 1;
            m[h.ticker][c.client] = {
              shares: h.shares,
              mv: mv,
              pct: (mv / totalMV) * 100
            };
          });
        });
        return m;
      }, [compositeClients, hmPrices, clientMVs]);

      const modelTargets = useMemo(() => hmTargets[hmComposite] || {}, [hmTargets, hmComposite]);

      const setModelTarget = (ticker, val) => {
        setHmTargets(prev => ({
          ...prev,
          [hmComposite]: { ...(prev[hmComposite] || {}), [ticker]: val }
        }));
      };

      const hmSetPrice = (ticker, val) => {
        setHmPrices(prev => ({ ...prev, [ticker]: val }));
      };

      const fC = (v) => v == null ? '\u2014' : '$' + v.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
      const fP = (v, d) => v == null ? '\u2014' : v.toFixed(d === undefined ? 2 : d) + '%';
      const fS = (v) => v == null ? '\u2014' : Math.round(v).toLocaleString('en-US');

      const getDrift = (ticker, clientName) => {
        const tgt = parseFloat(modelTargets[ticker]);
        if (isNaN(tgt)) return null;
        const data = (holdingsMap[ticker] || {})[clientName];
        const actual = data ? data.pct : 0;
        return actual - tgt;
      };

      const getSharesDiff = (ticker, clientName) => {
        const tgt = parseFloat(modelTargets[ticker]);
        if (isNaN(tgt)) return null;
        const totalMV = clientMVs[clientName] || 0;
        const price = hmPrices[ticker] || 0;
        if (price === 0 || totalMV === 0) return null;
        const targetMV = (tgt / 100) * totalMV;
        const data = (holdingsMap[ticker] || {})[clientName];
        const actualMV = data ? data.mv : 0;
        return Math.round((targetMV - actualMV) / price);
      };

      const getCellBg = (drift) => {
        if (drift === null) return '';
        const abs = Math.abs(drift);
        if (abs < 0.25) return '';
        if (drift > 0) return abs > 2 ? 'bg-green-200' : abs > 1 ? 'bg-green-100' : 'bg-green-50';
        return abs > 2 ? 'bg-red-200' : abs > 1 ? 'bg-red-100' : 'bg-red-50';
      };

      const getCellColor = (drift) => {
        if (drift === null) return 'text-gray-300';
        const abs = Math.abs(drift);
        if (abs < 0.25) return 'text-gray-400';
        if (drift > 0) return abs > 2 ? 'text-green-800 font-bold' : abs > 1 ? 'text-green-700 font-semibold' : 'text-green-600';
        return abs > 2 ? 'text-red-800 font-bold' : abs > 1 ? 'text-red-700 font-semibold' : 'text-red-600';
      };

      const exportCSV = () => {
        if (!compositeClients.length) return;
        let csv = 'Ticker,Security,Model Target %';
        compositeClients.forEach(c => { csv += ',' + shortName(c.client) + ' %,' + shortName(c.client) + ' Drift,' + shortName(c.client) + ' Shares Off'; });
        csv += ',Total Shares';
        if (compareDate && priorData) csv += ',Δ Shares vs ' + compareDate;
        csv += ',Target Shares';
        csv += '\n';
        allTickers.forEach(t => {
          const tgt = modelTargets[t] || '';
          csv += '"' + t + '","' + (hmSecNames[t]||'') + '",' + tgt;
          compositeClients.forEach(c => {
            const data = (holdingsMap[t] || {})[c.client];
            const pct = data ? data.pct.toFixed(2) : '0.00';
            const drift = getDrift(t, c.client);
            const sharesDiff = getSharesDiff(t, c.client);
            csv += ',' + pct + ',' + (drift !== null ? drift.toFixed(2) : '') + ',' + (sharesDiff !== null ? sharesDiff : '');
          });
          csv += ',' + Math.round(totalSharesByTicker[t] || 0);
          if (compareDate && priorData) {
            const delta = (totalSharesByTicker[t] || 0) - (priorTotalSharesByTicker[t] || 0);
            csv += ',' + Math.round(delta);
          }
          csv += ',' + (targetSharesByTicker[t] !== null ? Math.round(targetSharesByTicker[t]) : '');
          csv += '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = hmComposite + '_model_matrix.csv'; a.click();
        URL.revokeObjectURL(url);
      };

      const targetSum = useMemo(() => {
        return Object.values(modelTargets).reduce((s, v) => s + (parseFloat(v) || 0), 0);
      }, [modelTargets]);

      const maxDriftByClient = useMemo(() => {
        const result = {};
        compositeClients.forEach(c => {
          let max = 0;
          allTickers.forEach(t => {
            const d = getDrift(t, c.client);
            if (d !== null) max = Math.max(max, Math.abs(d));
          });
          result[c.client] = max;
        });
        return result;
      }, [compositeClients, allTickers, modelTargets, holdingsMap]);

      // Total shares across all composite clients for each ticker
      const totalSharesByTicker = useMemo(() => {
        const totals = {};
        allTickers.forEach(t => {
          let sum = 0;
          compositeClients.forEach(c => {
            const h = c.holdings.find(h => h.ticker === t);
            if (h) sum += h.shares;
          });
          totals[t] = sum;
        });
        return totals;
      }, [compositeClients, allTickers]);

      // Prior total shares by ticker (from comparison date)
      const priorTotalSharesByTicker = useMemo(() => {
        if (!priorData || !hmComposite) return {};
        const totals = {};
        const priorCompositeClients = priorData.filter(c => c.composite === hmComposite);
        allTickers.forEach(t => {
          let sum = 0;
          priorCompositeClients.forEach(c => {
            const h = c.holdings.find(h => h.ticker === t);
            if (h) sum += h.shares;
          });
          totals[t] = sum;
        });
        return totals;
      }, [priorData, hmComposite, allTickers]);

      // Grand total shares across all tickers for current and prior
      const grandTotalShares = useMemo(() => {
        return Object.values(totalSharesByTicker).reduce((s, v) => s + v, 0);
      }, [totalSharesByTicker]);

      const priorGrandTotalShares = useMemo(() => {
        return Object.values(priorTotalSharesByTicker).reduce((s, v) => s + v, 0);
      }, [priorTotalSharesByTicker]);

      // Composite total market value (all accounts combined)
      const compositeTotalMV = useMemo(() => {
        return Object.values(clientMVs).reduce((s, v) => s + v, 0);
      }, [clientMVs]);

      // Calculate composite-level weighted average characteristics
      const compositeChars = useMemo(() => {
        if (!allTickers.length || !compositeTotalMV) return null;
        let wtdDuration = 0, wtdMaturity = 0, wtdYield = 0, wtdUsd = 0, wtdLeverage = 0, wtdCoupon = 0;
        let coverageMV = 0, totalSecMV = 0;
        allTickers.forEach(t => {
          const totalShares = totalSharesByTicker[t] || 0;
          const price = hmPrices[t] || 0;
          const tickerMV = totalShares * price;
          totalSecMV += tickerMV;
          const fc = fundChars[t];
          if (fc && tickerMV > 0) {
            const w = tickerMV;
            if (fc.effective_duration != null) { wtdDuration += w * fc.effective_duration; }
            if (fc.avg_maturity != null) { wtdMaturity += w * fc.avg_maturity; }
            if (fc.distribution_yield != null) { wtdYield += w * fc.distribution_yield; }
            if (fc.usd_exposure_pct != null) { wtdUsd += w * fc.usd_exposure_pct; }
            if (fc.leverage_pct != null) { wtdLeverage += w * fc.leverage_pct; }
            if (fc.coupon != null) { wtdCoupon += w * fc.coupon; }
            coverageMV += tickerMV;
          }
        });
        if (coverageMV === 0) return null;
        return {
          duration: wtdDuration / coverageMV,
          maturity: wtdMaturity / coverageMV,
          distYield: wtdYield / coverageMV,
          usdPct: wtdUsd / coverageMV,
          leverage: wtdLeverage / coverageMV,
          coupon: wtdCoupon / coverageMV,
          coveragePct: (coverageMV / totalSecMV) * 100
        };
      }, [allTickers, totalSharesByTicker, hmPrices, compositeTotalMV, fundChars]);

      // Credit quality scoring: convert letter grades to numeric scores
      const creditScore = (name) => {
        if (!name) return null;
        const n = name.toUpperCase().replace(/[^A-Z]/g, '');
        if (n.includes('AAA')) return 1;
        if (n.includes('AA') && !n.includes('AAA')) return 2;
        if (n === 'A' || (n.startsWith('A') && !n.startsWith('AA') && !n.startsWith('AB'))) return 3;
        if (n.includes('BBB')) return 4;
        if (n.includes('BB') && !n.includes('BBB')) return 5;
        if (n === 'B' || (n.startsWith('B') && !n.startsWith('BB') && !n.startsWith('BC'))) return 6;
        if (n.includes('CCC')) return 7;
        if (n.includes('CC') && !n.includes('CCC')) return 8;
        if (n === 'C') return 9;
        if (n.includes('D') && !n.includes('DD')) return 10;
        return null; // NR, Not Rated, Other
      };
      const scoreToLabel = (s) => {
        if (s <= 1.5) return 'AAA';
        if (s <= 2.5) return 'AA';
        if (s <= 3.5) return 'A';
        if (s <= 4.5) return 'BBB';
        if (s <= 5.5) return 'BB';
        if (s <= 6.5) return 'B';
        if (s <= 7.5) return 'CCC';
        if (s <= 8.5) return 'CC';
        if (s <= 9.5) return 'C';
        return 'D';
      };

      // Composite credit quality from FastTrack bond quality data
      const compositeCreditQuality = useMemo(() => {
        if (!ftDetailsRaw || !allTickers.length || !compositeTotalMV) return null;
        const buckets = {}; // aggregated quality buckets
        let wtdScore = 0, creditCoverageMV = 0, totalSecMV = 0;
        allTickers.forEach(t => {
          const totalShares = totalSharesByTicker[t] || 0;
          const price = hmPrices[t] || 0;
          const tickerMV = totalShares * price;
          totalSecMV += tickerMV;
          const ftd = ftDetailsRaw[t];
          if (ftd && ftd.bondquality && ftd.bondquality.length > 0 && tickerMV > 0) {
            let fundScore = 0, fundWt = 0;
            ftd.bondquality.forEach(q => {
              const s = creditScore(q.name);
              const w = q.weight;
              // Aggregate into composite buckets
              const label = q.name || 'Other';
              buckets[label] = (buckets[label] || 0) + (w / 100) * tickerMV;
              if (s != null && w > 0) { fundScore += s * w; fundWt += w; }
            });
            if (fundWt > 0) {
              const avgScore = fundScore / fundWt;
              wtdScore += avgScore * tickerMV;
              creditCoverageMV += tickerMV;
            }
          }
        });
        if (creditCoverageMV === 0) return null;
        // Normalize buckets to percentages
        const bucketPcts = Object.entries(buckets).map(([name, mv]) => ({
          name, weight: (mv / creditCoverageMV) * 100
        })).sort((a, b) => (creditScore(a.name) || 99) - (creditScore(b.name) || 99));
        const avgScore = wtdScore / creditCoverageMV;
        return {
          avgScore,
          avgLabel: scoreToLabel(avgScore),
          buckets: bucketPcts,
          coveragePct: (creditCoverageMV / totalSecMV) * 100
        };
      }, [ftDetailsRaw, allTickers, totalSharesByTicker, hmPrices, compositeTotalMV]);

      // Target shares per ticker based on model % and composite total MV
      const targetSharesByTicker = useMemo(() => {
        const targets = {};
        allTickers.forEach(t => {
          const tgt = parseFloat(modelTargets[t]);
          const price = hmPrices[t] || 0;
          if (!isNaN(tgt) && price > 0 && compositeTotalMV > 0) {
            targets[t] = Math.round((tgt / 100) * compositeTotalMV / price);
          } else {
            targets[t] = null;
          }
        });
        return targets;
      }, [allTickers, modelTargets, hmPrices, compositeTotalMV]);

      // Grand total target shares
      const grandTargetShares = useMemo(() => {
        return Object.values(targetSharesByTicker).reduce((s, v) => s + (v || 0), 0);
      }, [targetSharesByTicker]);

      const inputSt = {
        fontFamily: 'Tahoma, monospace', fontSize: `${hmFontSize - 1}px`, width: '48px', padding: '2px 3px',
        border: '1px solid #d1d5db', borderRadius: '2px', textAlign: 'right', outline: 'none'
      };

      return (
        <div className="p-4">
          <div className="flex items-center gap-3 mb-3 flex-wrap mobile-stack">
            <h1 className="text-xl font-bold">Client Matrix — Model Portfolio</h1>
            <span className="text-xs text-gray-400">
              {uploadInfo ? (uploadInfo.fromDb ? `Source: Supabase (${uploadInfo.date})` : `Source: ${uploadInfo.filename} (${uploadInfo.date})`) : 'Source: Embedded data'} · {hmClients.length} accounts · {Object.keys(hmSecNames).length} securities · Last updated: {uploadInfo ? uploadInfo.lastUpdated : 'N/A'}
            </span>
            <div className="flex-1"></div>
            <input type="file" ref={fileInputRef} accept=".xlsx,.xls" className="hidden"
              onChange={e => { const f = e.target.files[0]; if (f) parseReconExcel(f); e.target.value = ''; }} />
            <div className="flex items-center gap-2"
              onDrop={handleFileDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave}
              style={{border:'2px dashed #cbd5e1', borderRadius:'8px', padding:'4px 12px', transition:'all 0.2s'}}>
              <button onClick={() => fileInputRef.current.click()}
                className="px-3 py-1.5 text-sm font-semibold bg-teal-600 text-white rounded hover:bg-teal-700 flex items-center gap-1">
                <span>📂</span> Upload Recon
              </button>
              <span className="text-xs text-gray-400">or drag & drop .xlsx</span>
            </div>
          </div>
          {uploadError && <div className="mb-2 px-3 py-1 bg-red-100 text-red-700 text-sm rounded">{uploadError}</div>}
          {uploadInfo && <div className="mb-2 px-3 py-1 bg-teal-50 text-teal-700 text-sm rounded flex items-center gap-2">
            <span>✅</span> Loaded <strong>{uploadInfo.filename}</strong> — {uploadInfo.clients} accounts, {uploadInfo.securities} securities
            <button onClick={() => { setReconData(RECON_DATA); setUploadInfo(null); }} className="ml-auto text-xs text-gray-400 hover:text-red-500 underline">Reset to embedded</button>
          </div>}

          {/* Sub-page navigation */}
          <div className="flex gap-1 mb-3 border-b pb-2">
            <button onClick={() => setHmSubPage('holdings')}
              className={`px-4 py-1.5 text-sm font-semibold rounded-t ${hmSubPage === 'holdings' ? 'bg-teal-600 text-white' : 'bg-gray-200 hover:bg-gray-300'}`}
            >Holdings Matrix</button>
            <button onClick={() => setHmSubPage('fundchars')}
              className={`px-4 py-1.5 text-sm font-semibold rounded-t ${hmSubPage === 'fundchars' ? 'bg-teal-600 text-white' : 'bg-gray-200 hover:bg-gray-300'}`}
            >Fund Characteristics</button>
          </div>

          {hmSubPage === 'holdings' && (<>
          <div className="flex items-center gap-3 mb-3 flex-wrap mobile-stack">
            <span className="text-sm font-semibold text-gray-600">Strategy:</span>
            {['GTFI', 'GMA'].map(c => (
              <button key={c} onClick={() => setHmComposite(c)}
                className={`px-4 py-2 text-sm font-semibold rounded ${hmComposite === c ? (c === 'GMA' ? 'bg-green-600 text-white' : 'bg-blue-600 text-white') : 'bg-gray-200 hover:bg-gray-300'}`}
              >{c} ({hmClients.filter(x => x.composite === c).length} accounts)</button>
            ))}
            {hmComposite && (
              <>
                <input type="text" placeholder="Filter ticker/name\u2026" value={hmSearch} onChange={e => setHmSearch(e.target.value)}
                  className="border rounded px-2 py-1 text-sm ml-2" style={{width:'150px'}} />
                <div className="flex gap-1 ml-2 border rounded overflow-hidden">
                  {[['pct','% Alloc'],['mv','$ Value'],['drift','% Drift'],['shares','Shares Off'],['curShares','Shares']].map(([v,l]) => (
                    <button key={v} onClick={() => setHmView(v)}
                      className={`px-3 py-1 text-xs font-semibold ${hmView === v ? 'bg-gray-700 text-white' : 'bg-gray-100 hover:bg-gray-200'}`}
                    >{l}</button>
                  ))}
                </div>
                <div className="flex-1"></div>
                {targetSum > 0 && (
                  <span className={`text-xs font-mono font-semibold px-2 py-1 rounded ${Math.abs(targetSum-100)<0.5 ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                    Model: {fP(targetSum,1)}
                  </span>
                )}
                <button onClick={exportCSV} className="px-3 py-1 text-sm bg-green-600 text-white rounded hover:bg-green-700">Export CSV</button>
                <button 
                  disabled={ftLoading}
                  onClick={async () => {
                    if (!getFtApiKey()) { setFtConfigOpen(true); return; }
                    setFtLoading(true); setFtStatus('Authenticating...');
                    try {
                      await ftAuth();
                      // Collect all unique tickers (exclude escrow/illiquid with no FT data)
                      const skipTickers = new Set(['723ESC026', '723ESC034', 'MUNEX']); // MUNEX is mutual fund, try anyway
                      const allTickerSet = new Set();
                      compositeClients.forEach(c => c.holdings.forEach(h => { if (!skipTickers.has(h.ticker)) allTickerSet.add(h.ticker); }));
                      // Also try MUNEX
                      allTickerSet.add('MUNEX');
                      const tickerList = [...allTickerSet];
                      setFtStatus(`Fetching prices for ${tickerList.length} securities...`);
                      const prices = await ftFetchPrices(tickerList);
                      const count = Object.keys(prices).length;
                      if (count > 0) {
                        setHmPrices(prev => {
                          const updated = { ...prev };
                          for (const [ticker, price] of Object.entries(prices)) {
                            if (price > 0) updated[ticker] = Math.round(price * 100) / 100;
                          }
                          return updated;
                        });
                        setFtStatus(`✓ Updated ${count} prices`);
                      } else {
                        setFtStatus('⚠ No prices returned — check API key or tickers');
                      }
                    } catch (err) {
                      setFtStatus(`✗ ${err.message}`);
                      if (err.message.includes('auth')) setFtConfigOpen(true);
                    }
                    setFtLoading(false);
                    setTimeout(() => setFtStatus(''), 8000);
                  }}
                  className={`px-3 py-1 text-sm rounded ${ftLoading ? 'bg-gray-400 text-white cursor-wait' : 'bg-purple-600 text-white hover:bg-purple-700'}`}
                >
                  {ftLoading ? '⏳ Fetching...' : '⚡ Fetch Prices'}
                </button>
                <button onClick={() => setFtConfigOpen(!ftConfigOpen)} className="px-2 py-1 text-xs rounded bg-gray-200 hover:bg-gray-300" title="FastTrack API Settings">⚙️</button>
                <select value={hmFontSize} onChange={e => updateFontSize(parseInt(e.target.value))}
                  className="border rounded px-2 py-1 text-xs bg-white" style={{minWidth:'70px'}}>
                  {[8,9,10,11,12,13,14,16,18,20].map(s => (
                    <option key={s} value={s}>{s}px</option>
                  ))}
                </select>
                <div className="flex items-center gap-1 ml-1">
                  <label className="text-xs font-semibold text-gray-500 whitespace-nowrap">Δ vs:</label>
                  <select value={compareDate} onChange={e => setCompareDate(e.target.value)}
                    className="border rounded px-2 py-1 text-xs bg-white" style={{minWidth:'120px'}}>
                    <option value="">— none —</option>
                    {availableDates.map(d => {
                      const dt = new Date(d + 'T12:00:00');
                      const label = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                      return <option key={d} value={d}>{label}</option>;
                    })}
                  </select>
                  {loadingPrior && <span className="text-xs text-gray-400 animate-pulse">loading…</span>}
                </div>
              </>
            )}
          </div>

          {/* FastTrack Config Panel */}
          {ftConfigOpen && (
            <div className="mb-3 p-3 bg-purple-50 border border-purple-200 rounded-lg">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="text-sm font-semibold text-purple-700">FastTrack API Key:</span>
                <input type="password" placeholder="Paste your FastTrack API key" value={ftKeyInput || getFtApiKey()}
                  onChange={e => setFtKeyInput(e.target.value)}
                  className="border rounded px-2 py-1 text-sm flex-1" style={{minWidth:'250px'}} />
                <button onClick={() => { const key = ftKeyInput.trim(); if (key) { setFtApiKey(key); _ftToken = null; _ftTokenExpiry = 0; setFtStatus('✓ API key saved'); setFtConfigOpen(false); setTimeout(() => setFtStatus(''), 3000); } }}
                  className="px-3 py-1 text-sm bg-purple-600 text-white rounded hover:bg-purple-700">Save Key</button>
                <button onClick={() => setFtConfigOpen(false)} className="px-3 py-1 text-sm bg-gray-200 rounded hover:bg-gray-300">Close</button>
              </div>
              <p className="text-xs text-purple-500 mt-1">Key is stored in your browser's localStorage. Only you can see it.</p>
              <div className="mt-2 text-xs text-gray-500">
                <strong>Index Ticker Mapping:</strong> US Agg = AGG-X, Corp HY = HYG-X, Global Agg = BNDX-X, MSCI ACWI = ACWI-X
                <br/>Update these in the FT_INDEX_TICKERS config at the top of the HTML if FastTrack support gives different symbols.
              </div>
            </div>
          )}
          {ftStatus && (
            <div className={`mb-2 px-3 py-1 text-sm rounded ${ftStatus.startsWith('✓') ? 'bg-green-100 text-green-700' : ftStatus.startsWith('✗') ? 'bg-red-100 text-red-700' : ftStatus.startsWith('⚠') ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}`}>
              {ftStatus}
            </div>
          )}

          {hmComposite && (
            <div className="flex items-center gap-2 mb-3 mobile-stack">
              <span className="text-xs font-semibold text-gray-500 uppercase">Add Security:</span>
              <input type="text" placeholder="Ticker" value={newTicker}
                onChange={e => setNewTicker(e.target.value.toUpperCase())}
                onKeyDown={e => { if (e.key === 'Enter') { const t = newTicker.trim(); if (t) { if (!customTickers.includes(t) && !allTickers.includes(t)) setCustomTickers(prev => [...prev, t]); if (newTarget) setHmTargets(prev => ({...prev, [hmComposite]: {...(prev[hmComposite]||{}), [t]: newTarget}})); setNewTicker(''); setNewTarget(''); } } }}
                className="border rounded px-2 py-1 text-sm font-mono" style={{width:'90px'}} />
              <input type="text" placeholder="Target %" value={newTarget}
                onChange={e => { const v = e.target.value; if (v === '' || /^\d*\.?\d*$/.test(v)) setNewTarget(v); }}
                onKeyDown={e => { if (e.key === 'Enter') { const t = newTicker.trim(); if (t) { if (!customTickers.includes(t) && !allTickers.includes(t)) setCustomTickers(prev => [...prev, t]); if (newTarget) setHmTargets(prev => ({...prev, [hmComposite]: {...(prev[hmComposite]||{}), [t]: newTarget}})); setNewTicker(''); setNewTarget(''); } } }}
                className="border rounded px-2 py-1 text-sm font-mono" style={{width:'70px'}} />
              <button onClick={() => { const t = newTicker.trim(); if (t) { if (!customTickers.includes(t) && !allTickers.includes(t)) setCustomTickers(prev => [...prev, t]); if (newTarget) setHmTargets(prev => ({...prev, [hmComposite]: {...(prev[hmComposite]||{}), [t]: newTarget}})); setNewTicker(''); setNewTarget(''); } }}
                className="px-3 py-1 text-sm bg-teal-600 text-white rounded hover:bg-teal-700">+ Add</button>
              {customTickers.length > 0 && (
                <span className="text-xs text-gray-400 ml-2">
                  Added: {customTickers.join(', ')}
                  <button onClick={() => setCustomTickers([])} className="ml-2 text-red-400 hover:text-red-600 underline">clear</button>
                </span>
              )}
            </div>
          )}

          {!hmComposite ? (
            <div className="text-center py-20 text-gray-400">
              <p className="text-lg font-semibold text-gray-500 mb-1">Select a Strategy</p>
              <p>Click GTFI or GMA above to see all accounts in that composite with securities down the left side.</p>
            </div>
          ) : (
            <div className="hm-outer overflow-x-auto border rounded" style={{maxHeight:'calc(100vh - 220px)', overflowX:'auto', overflowY:'auto'}}>
              <table className="text-xs border-collapse" style={{minWidth: (300 + compositeClients.length * 90 + 170 + (compareDate ? 85 : 0)) + 'px'}}>
                <thead>
                  <tr className="bg-gray-100">
                    <th style={{position:'sticky', top:0, left:0, zIndex:20, minWidth:'70px', backgroundColor:'#f3f4f6', borderBottom:'2px solid #93C5FD', borderRight:'1px solid #93C5FD', textAlign:'left', padding:'4px 8px', fontWeight:600}}>Ticker</th>
                    <th style={{position:'sticky', top:0, left:70, zIndex:19, minWidth:'55px', backgroundColor:'#f3f4f6', borderBottom:'2px solid #93C5FD', borderRight:'1px solid #93C5FD', textAlign:'left', padding:'4px 4px', fontWeight:600}}>Model %</th>
                    <th style={{position:'sticky', top:0, left:125, zIndex:19, minWidth:'58px', backgroundColor:'#f3f4f6', borderBottom:'2px solid #93C5FD', borderRight:'1px solid #93C5FD', textAlign:'right', padding:'4px 4px', fontWeight:600}}>Price</th>
                    {compositeClients.map(c => (
                      <th key={c.client} className="border-b-2 border-blue-500 text-center px-1 py-1" style={{minWidth:'80px', position:'sticky', top:0, backgroundColor:'#f3f4f6'}}>
                        <div className="font-semibold text-gray-700 truncate" style={{maxWidth:'80px',fontSize:`${hmFontSize - 2}px`}} title={c.client}>{shortName(c.client)}</div>
                        <div className="text-gray-400 font-normal" style={{fontSize:`${hmFontSize - 3}px`}}>{fC(clientMVs[c.client])}</div>
                        {maxDriftByClient[c.client] > 0 && (
                          <div className={`font-normal ${maxDriftByClient[c.client] > 3 ? 'text-red-500' : maxDriftByClient[c.client] > 1 ? 'text-amber-500' : 'text-green-500'}`} style={{fontSize:`${hmFontSize - 3}px`}}>
                            max {fP(maxDriftByClient[c.client],1)}
                          </div>
                        )}
                      </th>
                    ))}
                    <th className="border-b-2 border-l-2 border-purple-500 bg-purple-50 text-center px-2 py-1 font-semibold" style={{minWidth:'85px', position:'sticky', top:0}}>
                      <div style={{fontSize:`${hmFontSize - 1}px`}}>Total Shares</div>
                      <div className="text-purple-400 font-normal" style={{fontSize:`${hmFontSize - 3}px`}}>All Accounts</div>
                    </th>
                    {compareDate && (
                      <th className="border-b-2 border-l border-purple-500 bg-purple-50 text-center px-2 py-1 font-semibold" style={{minWidth:'85px', position:'sticky', top:0}}>
                        <div style={{fontSize:`${hmFontSize - 1}px`}}>Δ Shares</div>
                        <div className="text-purple-400 font-normal" style={{fontSize:`${hmFontSize - 3}px`}}>
                          vs {(() => { const dt = new Date(compareDate + 'T12:00:00'); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); })()}
                        </div>
                      </th>
                    )}

                          <th className="text-right px-2 py-1.5 font-semibold">Dist Yield</th>
                          <th className="text-right px-2 py-1.5 font-semibold">Coupon</th>
                          <th className="text-right px-2 py-1.5 font-semibold">USD %</th>
                          <th className="text-right px-2 py-1.5 font-semibold">Leverage %</th>
                          <th className="text-right px-2 py-1.5 font-semibold">As Of</th>
                          <th className="text-center px-2 py-1.5 font-semibold">Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        {allTickers.filter(t => (totalSharesByTicker[t] || 0) > 0).map(t => {
                          const totalShares = totalSharesByTicker[t] || 0;
                          const price = hmPrices[t] || 0;
                          const tickerMV = totalShares * price;
                          const totalSecMV = allTickers.reduce((s, tk) => s + (totalSharesByTicker[tk] || 0) * (hmPrices[tk] || 0), 0);
                          const wt = totalSecMV > 0 ? (tickerMV / totalSecMV) * 100 : 0;
                          const fc = fundChars[t] || {};
                          const isEditing = fundCharsEditing === t;

                          if (isEditing) {
                            return (
                              <tr key={t} className="bg-yellow-50 border-b">
                                <td className="px-2 py-1 font-mono font-semibold">{t}</td>
                                <td className="px-2 py-1 text-gray-600">{hmSecNames[t] || '—'}</td>
                                <td className="text-right px-2 py-1 font-mono">{wt.toFixed(1)}</td>
                                {['effective_duration','avg_maturity','distribution_yield','coupon','usd_exposure_pct','leverage_pct'].map(field => (
                                  <td key={field} className="px-1 py-1">
                                    <input type="number" step="0.01" className="w-full px-1 py-0.5 border rounded text-xs text-right font-mono"
                                      value={fundCharsForm[field] ?? ''} onChange={e => setFundCharsForm(prev => ({...prev, [field]: e.target.value === '' ? null : Number(e.target.value)}))} />
                                  </td>
                                ))}
                                <td className="px-1 py-1">
                                  <input type="date" className="w-full px-1 py-0.5 border rounded text-xs"
                                    value={fundCharsForm.as_of_date || ''} onChange={e => setFundCharsForm(prev => ({...prev, as_of_date: e.target.value}))} />
                                </td>
                                <td className="text-center px-1 py-1 whitespace-nowrap">
                                  <button onClick={() => saveFundChar(t, fundCharsForm)} disabled={fundCharsSaving}
                                    className="px-1.5 py-0.5 bg-green-600 text-white rounded text-xs mr-1 hover:bg-green-700">
                                    {fundCharsSaving ? '...' : '✓'}
                                  </button>
                                  <button onClick={() => setFundCharsEditing(null)} className="px-1.5 py-0.5 bg-gray-400 text-white rounded text-xs hover:bg-gray-500">✗</button>
                                </td>
                              </tr>
                            );
                          }

                          return (
                            <tr key={t} className={`border-b hover:bg-gray-50 ${!fc.effective_duration && !fc.distribution_yield ? 'bg-red-50/30' : ''}`}>
                              <td className="px-2 py-1 font-mono font-semibold">{t}</td>
                              <td className="px-2 py-1 text-gray-600 truncate max-w-[140px]">{hmSecNames[t] || '—'}</td>
                              <td className="text-right px-2 py-1 font-mono">{wt.toFixed(1)}</td>
                              <td className="text-right px-2 py-1 font-mono">{fc.effective_duration != null ? Number(fc.effective_duration).toFixed(2) : '—'}</td>
                              <td className="text-right px-2 py-1 font-mono">{fc.avg_maturity != null ? Number(fc.avg_maturity).toFixed(1) : '—'}</td>
                              <td className="text-right px-2 py-1 font-mono">{fc.distribution_yield != null ? Number(fc.distribution_yield).toFixed(2) + '%' : '—'}</td>
                              <td className="text-right px-2 py-1 font-mono">{fc.coupon != null ? Number(fc.coupon).toFixed(2) + '%' : '—'}</td>
                              <td className="text-right px-2 py-1 font-mono">{fc.usd_exposure_pct != null ? Number(fc.usd_exposure_pct).toFixed(0) + '%' : '—'}</td>
                              <td className="text-right px-2 py-1 font-mono">{fc.leverage_pct != null ? Number(fc.leverage_pct).toFixed(0) + '%' : '—'}</td>
                              <td className="text-right px-2 py-1 text-gray-500">{fc.as_of_date || '—'}</td>
                              <td className="text-center px-1 py-1 whitespace-nowrap">
                                <button onClick={() => { setFundCharsEditing(t); setFundCharsForm({...fc}); }}
                                  className="px-1.5 py-0.5 bg-blue-500 text-white rounded text-xs hover:bg-blue-600">Edit</button>
                                <a href={`https://www.cefconnect.com/fund/${t}`} target="_blank" rel="noopener noreferrer"
                                  className="ml-1 px-1.5 py-0.5 bg-purple-500 text-white rounded text-xs hover:bg-purple-600 inline-block">CEF</a>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <p className="text-xs text-gray-400 mt-1">Click Edit to enter fund data from CEFConnect or fund fact sheets. Composite stats auto-calculate from allocation weights.</p>
                </div>
            </div>
          )}
          </>)}
        </div>
      );
    }

    // Init: Render React, then check for existing session
    ReactDOM.createRoot(document.getElementById('root')).render(<ClientPerformanceDashboard />);
    checkExistingSession();
  </script>
</body>
</html>
