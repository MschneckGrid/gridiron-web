<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gridiron Performance Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.16/umd/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: Tahoma, sans-serif; }
    .print-only { display: none !important; }
    @media print {
      .no-print, .no-print.mobile-tab-bar { display: none !important; }
      .print-only { display: block !important; }
      .page-break-before-always { page-break-before: always; }
      @page {
        margin: 0.35in 0.4in;
        size: letter;
      }
      /* Ensure background colors print */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      /* Composite reporting specific print styles */
      #composite-stats-printable {
        font-size: 10px !important;
      }
      #composite-stats-printable .grid-cols-2 {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 0.5rem !important;
      }
      #composite-stats-printable table {
        font-size: 8.5px !important;
        line-height: 1.1 !important;
      }
      #composite-stats-printable table th,
      #composite-stats-printable table td {
        padding: 0px 3px !important;
        line-height: 1.2 !important;
      }
      #composite-stats-printable .text-sm {
        font-size: 9px !important;
      }
      #composite-stats-printable .text-xs {
        font-size: 8px !important;
      }
      /* Chart container for print - let flex handle height */
      .print-chart-container {
        flex: 1 1 0% !important;
        min-height: 200px !important;
      }
      .print-chart-container img {
        width: 100% !important;
        height: 100% !important;
        object-fit: fill !important;
      }
      /* Ensure tables don't break across pages */
      table { page-break-inside: avoid; }
    }
    /* Mobile-only styles - desktop and print are completely unaffected */
    @media screen and (max-width: 767px) {
      /* Tab bar: wrap buttons, smaller text */
      .mobile-tab-bar {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 4px !important;
        padding: 8px !important;
      }
      .mobile-tab-bar button {
        font-size: 11px !important;
        padding: 6px 10px !important;
        margin: 0 !important;
      }
      /* All tables scroll horizontally */
      table {
        min-width: 600px;
      }
      .overflow-x-auto {
        -webkit-overflow-scrolling: touch;
      }
      /* Ensure any parent of a table scrolls */
      div:not(.hm-outer):has(> table),
      div:not(.hm-outer):has(> div > table) {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
      /* Holdings Matrix header row freeze - all th in thead get vertical sticky */
      .hm-outer thead th {
        position: sticky !important;
        top: 0 !important;
        background-color: #f3f4f6;
        z-index: 8;
      }
      /* Left-frozen corner th cells */
      .hm-th-col1 { left: 0 !important;     z-index: 12 !important; }
      .hm-th-col2 { left: 70px !important;  z-index: 11 !important; }
      .hm-th-col3 { left: 125px !important; z-index: 11 !important; }
      /* Stack flex layouts that have justify-between */
      .mobile-stack {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 8px !important;
      }
      /* Grid cards: single column */
      .grid-cols-2, .grid-cols-3, .grid-cols-4, .grid-cols-5, .grid-cols-6 {
        grid-template-columns: 1fr !important;
      }
      /* Reduce padding on content areas */
      .p-4, .p-6, .p-8 {
        padding: 8px !important;
      }
      .px-6 {
        padding-left: 8px !important;
        padding-right: 8px !important;
      }
      /* Smaller headings */
      .text-2xl { font-size: 1.15rem !important; }
      .text-xl { font-size: 1rem !important; }
      .text-lg { font-size: 0.9rem !important; }
      /* Table cells: tighter */
      td, th {
        padding: 4px 6px !important;
        font-size: 11px !important;
      }
      /* Select dropdowns fit better */
      select {
        font-size: 12px !important;
        padding: 4px 6px !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Auth Login Overlay -->
  <div id="auth-overlay" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.97); z-index:99999; align-items:center; justify-content:center; flex-direction:column; font-family:Tahoma,sans-serif;">
    <div style="background:#fff; border-radius:12px; padding:40px; width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center;">
      <div style="font-size:24px; font-weight:bold; color:#1e293b; margin-bottom:4px;">GRIDIRON</div>
      <div style="font-size:12px; color:#64748b; letter-spacing:2px; margin-bottom:24px;">PERFORMANCE DASHBOARD</div>
      <div id="auth-error" style="display:none; background:#fee2e2; color:#991b1b; padding:8px 12px; border-radius:6px; margin-bottom:16px; font-size:13px;"></div>
      <input id="auth-email" type="email" placeholder="Email address" style="width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:6px; margin-bottom:12px; font-size:14px; box-sizing:border-box;" />
      <input id="auth-password" type="password" placeholder="Password" style="width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:6px; margin-bottom:16px; font-size:14px; box-sizing:border-box;" onkeydown="if(event.key==='Enter')window.handleAuth()" />
      <button onclick="window.handleAuth()" style="width:100%; padding:10px; background:#1e40af; color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer;" id="auth-submit-btn">Sign In</button>
    </div>
  </div>
  
  
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

    // ============================================
    // SUPABASE CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://nzinvxticgyjobkqxxhl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56aW52eHRpY2d5am9ia3F4eGhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5NTUwOTIsImV4cCI6MjA4NDUzMTA5Mn0.YhaW1zesBaEC6lRMWx6_gyZN5Uhh8FX2wgahunHQfok';

    // ============================================
    // AUTHENTICATION
    // ============================================
    let authToken = null;
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Handle sign in
    window.handleAuth = async () => {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errEl = document.getElementById('auth-error');
      errEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = 'Email and password are required.'; errEl.style.display = 'block'; return; }
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        onAuthSuccess(data.session);
      } catch (err) {
        errEl.textContent = err.message || 'Authentication failed.';
        errEl.style.display = 'block';
      }
    };

    // Sign out
    window.handleSignOut = async () => {
      await supabaseClient.auth.signOut();
      authToken = null;
      document.getElementById('auth-overlay').style.display = 'flex';
      const emailEl = document.getElementById('user-email-display');
      if (emailEl) emailEl.textContent = '';
    };

    // Auth success handler
    function onAuthSuccess(session) {
      authToken = session.access_token;
      document.getElementById('auth-overlay').style.display = 'none';
      // Show user email in auth status bar
      const emailEl = document.getElementById('user-email-display');
      if (emailEl) { emailEl.textContent = session.user.email; }
      // Signal React to start loading data
      window.dispatchEvent(new Event('auth-ready'));
    }

    // Auto-refresh token
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT' || !session) {
        authToken = null;
        document.getElementById('auth-overlay').style.display = 'flex';
        return;
      }
      if (session) { authToken = session.access_token; }
    });

    // Check for existing session on load — validates token with a real API call
    async function checkExistingSession() {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return false;
        // Validate token works by hitting Supabase
        const testResp = await fetch(`${SUPABASE_URL}/rest/v1/cef_daily?select=ticker&limit=1`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${session.access_token}`,
            'Content-Type': 'application/json'
          }
        });
        if (testResp.ok) {
          onAuthSuccess(session);
          return true;
        }
        // Token expired or invalid — clear it
        console.warn('Session token invalid, signing out');
        await supabaseClient.auth.signOut();
        authToken = null;
        return false;
      } catch (e) {
        console.warn('Session check failed:', e);
        return false;
      }
    }

    // ============================================
    // FASTTRACK API CONFIGURATION
    // ============================================
    const FT_API_BASE = 'https://api.fasttrack.net/v2';
    // Index ticker mapping — update these once FastTrack support confirms symbols
    const FT_INDEX_TICKERS = {
      1: 'BBG-',       // US Agg (BBG US Agg Idx TR USD)
      2: 'BBG-Z',      // Corp HY (BBG US Corp HY Idx TR USD)
      4: 'BBG-D',      // Global Agg (BBG Gbl Agg Idx TR USD)
      5: 'A-CWI',      // MSCI ACWI (MSCI ACWI DivAdj Idx)
      7: 'SP-DA'       // S&P 500 Total Return Index
      // 3 = HFRI — always manual, not in FastTrack
      // 6 = 75/25 Global Agg/MSCI ACWI blend — auto-calculated
      // 8 = 60/40 S&P 500/US Agg blend — auto-calculated
    };

    // FastTrack auth state (module-level cache)
    let _ftToken = null;
    let _ftTokenExpiry = 0;

    function getFtApiKey() {
      try { return localStorage.getItem('ft_api_key') || ''; } catch(e) { return ''; }
    }
    function setFtApiKey(key) {
      try { localStorage.setItem('ft_api_key', key); } catch(e) {}
    }

    async function ftAuth(forceRefresh = false) {
      if (!forceRefresh && _ftToken && Date.now() < _ftTokenExpiry) return _ftToken;
      const apiKey = getFtApiKey();
      if (!apiKey) throw new Error('No FastTrack API key configured. Go to Holdings Matrix tab to set it.');
      const resp = await fetch(`${FT_API_BASE}/auth`, {
        method: 'POST',
        headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' }
      });
      if (!resp.ok) throw new Error(`FastTrack auth failed (${resp.status})`);
      const data = await resp.json();
      _ftToken = data.id_token || data.token || data.access_token;
      if (!_ftToken) throw new Error('No token in FastTrack auth response');
      _ftTokenExpiry = Date.now() + 55 * 60 * 1000; // refresh after 55 min
      return _ftToken;
    }

    // Fetch latest closing prices for an array of tickers
    async function ftFetchPrices(tickers) {
      const token = await ftAuth();
      const end = new Date().toISOString().split('T')[0];
      // Go back 7 days to ensure we get at least one trading day
      const start = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];
      const prices = {};
      // Chunk into batches of 75 to avoid API limits
      for (let i = 0; i < tickers.length; i += 75) {
        const batch = tickers.slice(i, i + 75);
        const resp = await fetch(`${FT_API_BASE}/data`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ assets: batch, include: ['prices'], start_date: start, end_date: end })
        });
        if (!resp.ok) { console.warn(`FastTrack /data failed for batch ${i}: ${resp.status}`); continue; }
        const data = await resp.json();
        // Parse response — FT returns { results: [ { ticker, prices: [...] } ] }
        const resultsArr = data.results || data.data || [];
        if (Array.isArray(resultsArr)) {
          for (const item of resultsArr) {
            if (item.ticker && item.prices && item.prices.length > 0 && !item.error) {
              const lastPrice = item.prices[item.prices.length - 1];
              prices[item.ticker] = typeof lastPrice === 'object' ? (lastPrice.close || lastPrice.price || lastPrice.value || 0) : lastPrice;
            }
          }
        } else if (resultsArr && typeof resultsArr === 'object') {
          for (const [ticker, info] of Object.entries(resultsArr)) {
            if (info.prices && info.prices.length > 0) {
              const lastPrice = info.prices[info.prices.length - 1];
              prices[ticker] = typeof lastPrice === 'object' ? (lastPrice.close || lastPrice.price || lastPrice.value || 0) : lastPrice;
            }
          }
        }
      }
      return prices;
    }

    // Fetch fund details from FastTrack /v2/reference endpoint
    async function ftFetchFundDetails(tickers) {
      const token = await ftAuth();
      const results = {};
      // Chunk into batches of 50
      for (let i = 0; i < tickers.length; i += 50) {
        const batch = tickers.slice(i, i + 50);
        try {
          const resp = await fetch(`${FT_API_BASE}/reference`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ assets: batch, include: ['details', 'portfolio'], topcount: '10' })
          });
          if (!resp.ok) { console.warn(`FT reference failed batch ${i}: ${resp.status}`); continue; }
          const data = await resp.json();
          console.log('FT reference raw response (first 3000 chars):', JSON.stringify(data).substring(0, 3000));
          const resultsArr = data.results || [];
          for (const item of resultsArr) {
            if (!item.ticker || item.err || item.error) continue;
            const detail = item.details || {};
            const portfolio = item.portfolio || {};
            const chars = {};

            // Expense ratio
            if (detail.expenseratio) chars.expense_ratio = parseFloat(detail.expenseratio);

            // USD exposure from countries data
            if (portfolio.countries && portfolio.countries.datalist && portfolio.countries.datalist.length) {
              const us = portfolio.countries.datalist.find(c => c.name === 'unitedStates' || c.name === 'United States');
              if (us && us.netweight != null) chars.usd_exposure_pct = parseFloat(us.netweight);
            }

            // Leverage from asset class — sum of all long weights
            if (portfolio.assetclass && portfolio.assetclass.datalist) {
              let totalLong = 0;
              portfolio.assetclass.datalist.forEach(a => {
                if (a.longweight != null) totalLong += parseFloat(a.longweight);
              });
              // Leverage = total long exposure - 100 (if > 100, fund is leveraged)
              if (totalLong > 105) chars.leverage_pct = Math.round(totalLong - 100);
            }

            // Bond sector breakdown
            if (portfolio.sectorBond && portfolio.sectorBond.datalist) {
              chars.bond_sectors = {};
              portfolio.sectorBond.datalist.forEach(s => {
                chars.bond_sectors[s.sector || s.name] = parseFloat(s.netweight);
              });
            }

            // Bond quality breakdown (for credit quality calculation)
            if (portfolio.bondquality && portfolio.bondquality.datalist) {
              chars.bondquality = [];
              portfolio.bondquality.datalist.forEach(q => {
                const w = parseFloat(q.netweight || 0);
                if (w > 0) chars.bondquality.push({ name: q.name, weight: w });
              });
            }

            // Bond maturity breakdown
            if (portfolio.bondmaturity && portfolio.bondmaturity.datalist) {
              chars.bondmaturity = [];
              portfolio.bondmaturity.datalist.forEach(m => {
                const w = parseFloat(m.netweight || 0);
                if (w > 0) chars.bondmaturity.push({ name: m.name, weight: w });
              });
            }

            // Top holdings
            if (portfolio.topten && portfolio.topten.datalist) {
              chars.topholdings = portfolio.topten.datalist.map(h => ({
                ticker: h.ticker, name: h.name, weight: parseFloat(h.netweight || 0)
              })).filter(h => h.weight > 0);
            }

            // Fund metadata
            chars.family = detail.family || null;
            chars.category = detail.category || null;
            chars.objective = detail.objective || null;
            chars.security_type = detail.security_type || null;

            // Store raw for debugging
            chars._rawDetailKeys = Object.keys(detail);
            chars._rawPortfolioKeys = Object.keys(portfolio);
            chars._rawDetails = detail;
            chars._rawPortfolio = portfolio;

            results[item.ticker] = chars;
          }
        } catch (err) {
          console.error('FT reference error:', err);
        }
      }
      return results;
    }

    // Fetch monthly index returns for a given month
    async function ftFetchIndexReturns(monthEndDate) {
      const token = await ftAuth();
      const dt = new Date(monthEndDate + 'T00:00:00');
      const year = dt.getFullYear();
      const month = dt.getMonth(); // 0-indexed
      // Start of month
      const startDate = new Date(year, month, 1).toISOString().split('T')[0];
      // End of month
      const endDate = monthEndDate;
      
      const ftTickers = Object.values(FT_INDEX_TICKERS);
      const results = {};
      
      // First try /stats/calendar for monthly returns
      try {
        const resp = await fetch(`${FT_API_BASE}/stats/calendar`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ assets: ftTickers, rollups: ['monthly'], years: [String(year)] })
        });
        if (resp.ok) {
          const data = await resp.json();
          console.log('FT calendar raw response:', JSON.stringify(data).substring(0, 2000));
          // FastTrack returns { results: [ { ticker, monthly: { "2026-01": { returns: { total } } } } ] }
          const resultsArr = data.results || data.data || [];
          const resultsMap = {};
          if (Array.isArray(resultsArr)) {
            resultsArr.forEach(r => { if (r.ticker) resultsMap[r.ticker] = r; });
          } else if (typeof resultsArr === 'object') {
            Object.assign(resultsMap, resultsArr);
          }
          for (const [indexId, ftTicker] of Object.entries(FT_INDEX_TICKERS)) {
            const tickerData = resultsMap[ftTicker];
            if (tickerData && tickerData.monthly) {
              const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
              console.log(`FT calendar looking for ${ftTicker} key=${monthKey}, available keys:`, Object.keys(tickerData.monthly));
              const monthEntry = tickerData.monthly[monthKey];
              if (monthEntry) {
                // Try nested returns.total first, then direct value
                if (monthEntry.returns && monthEntry.returns.total !== undefined) {
                  results[indexId] = monthEntry.returns.total;
                } else if (typeof monthEntry === 'number') {
                  results[indexId] = monthEntry;
                }
              }
            }
          }
        } else {
          console.warn('FT calendar response not ok:', resp.status, await resp.text());
        }
      } catch(e) { console.warn('FastTrack /stats/calendar failed:', e); }

      // Fallback: calculate from price series if calendar didn't return data
      const missing = Object.entries(FT_INDEX_TICKERS).filter(([id]) => results[id] === undefined);
      console.log('FT calendar results so far:', results, 'missing:', missing.map(([id, t]) => `${id}=${t}`));
      if (missing.length > 0) {
        try {
          // Get price on last day of prior month and last day of this month
          const priorMonthEnd = new Date(year, month, 0).toISOString().split('T')[0]; // last day of prior month
          console.log('FT price fallback: fetching', priorMonthEnd, 'to', endDate, 'for', missing.map(([,t]) => t));
          const resp = await fetch(`${FT_API_BASE}/data`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              assets: missing.map(([, t]) => t),
              include: ['prices'],
              start_date: priorMonthEnd,
              end_date: endDate
            })
          });
          if (resp.ok) {
            const data = await resp.json();
            console.log('FT price fallback raw response:', JSON.stringify(data).substring(0, 2000));
            // FastTrack returns { results: [ { ticker, prices: [num, ...] } ] }
            const priceResultsArr = data.results || data.data || [];
            const priceMap = {};
            if (Array.isArray(priceResultsArr)) {
              priceResultsArr.forEach(r => { if (r.ticker) priceMap[r.ticker] = r; });
            } else if (typeof priceResultsArr === 'object') {
              Object.assign(priceMap, priceResultsArr);
            }
            for (const [indexId, ftTicker] of missing) {
              const tickerData = priceMap[ftTicker];
              if (tickerData && tickerData.prices && !tickerData.error) {
                const p = tickerData.prices;
                console.log(`FT price fallback ${ftTicker}: ${p.length} prices, first:`, p[0], 'last:', p[p.length - 1]);
                if (p.length >= 2) {
                  const startVal = typeof p[0] === 'object' ? (p[0].close || p[0].price) : p[0];
                  const endVal = typeof p[p.length - 1] === 'object' ? (p[p.length - 1].close || p[p.length - 1].price) : p[p.length - 1];
                  if (startVal > 0) results[indexId] = (endVal - startVal) / startVal;
                }
              }
            }
          } else {
            console.warn('FT price fallback response not ok:', resp.status, await resp.text());
          }
        } catch(e) { console.warn('FastTrack price fallback failed:', e); }
      }
      console.log('FT final index results:', results);
      return results;
    }

    // Supabase fetch helper
    const supabaseFetch = async (table, query = '') => {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
        },
      });
      if (!response.ok) throw new Error(`Supabase error: ${response.statusText}`);
      return response.json();
    };

    // Utility functions
    const calcModifiedDietz = (begin, end, contrib, withdr, dayOfFlow, monthEndDate, contributionDay = null, withdrawalDay = null) => {
      // Use absolute value for withdrawals since they may be stored as negative
      const contribAmt = contrib || 0;
      const absWithdr = Math.abs(withdr || 0);
      const netFlow = contribAmt - absWithdr;
      
      // Parse month end date to get days in month
      let daysInMonth = 30;
      if (monthEndDate) {
        const [year, month, day] = monthEndDate.split('-').map(Number);
        daysInMonth = day;
      }
      
      // Calculate weighted flows
      let weightedFlows = 0;
      
      if (contributionDay || withdrawalDay) {
        // Use separate days for each flow type
        if (contribAmt > 0 && contributionDay) {
          const contribWeight = (daysInMonth - contributionDay) / daysInMonth;
          weightedFlows += contribAmt * contribWeight;
        }
        if (absWithdr > 0 && withdrawalDay) {
          const withdrWeight = (daysInMonth - withdrawalDay) / daysInMonth;
          weightedFlows -= absWithdr * withdrWeight;
        }
      } else if (dayOfFlow && netFlow !== 0) {
        // Legacy: single day of flow for net flow
        const weight = (daysInMonth - dayOfFlow) / daysInMonth;
        weightedFlows = netFlow * weight;
      } else if (begin === 0 && contribAmt > 0 && !dayOfFlow) {
        // Inception month with contribution but no day_of_flow specified - assume start of month
        weightedFlows = netFlow * 1;
      }
      
      const avgCap = begin + weightedFlows;
      const result = avgCap === 0 ? 0 : (end - begin - netFlow) / avgCap;
      
      // Debug for inception months
      if (begin === 0 && contribAmt > 0) {
        console.log('Modified Dietz inception', {
          begin, end, contrib, withdr, dayOfFlow, contributionDay, withdrawalDay, monthEndDate,
          netFlow, weightedFlows, avgCap, result
        });
      }
      
      return result;
    };

    // GIPS exclusion helper: determines if an account should be excluded from composite for a given month
    // Checks: large_flow_flag, funding month (bb=0), first full month after funding
    // allMonthlyData: array of all monthly_data rows (must include prior months)
    const isExcludedFromComposite = (md, allMonthlyData) => {
      if (!md) return { excluded: false, reason: null };
      if (md.large_flow_flag === true) return { excluded: true, reason: 'Large Cash Flow (>40%)' };
      if (md.beginning_balance === 0 || md.beginning_balance === null) return { excluded: true, reason: 'New Account (Funding Month)' };
      // Check if prior month was the funding month (bb=0) → this is first full month, exclude
      const [y, m] = md.month_end_date.split('-').map(Number);
      const priorDate = new Date(y, m - 1, 0); // day 0 of current month = last day of prior month
      const priorKey = priorDate.getFullYear() + '-' + String(priorDate.getMonth()+1).padStart(2,'0') + '-' + String(priorDate.getDate()).padStart(2,'0');
      const priorMd = allMonthlyData.find(d => d.client_id === md.client_id && d.month_end_date === priorKey);
      if (priorMd && (priorMd.beginning_balance === 0 || priorMd.beginning_balance === null)) {
        return { excluded: true, reason: 'New Account (1st Full Month)' };
      }
      return { excluded: false, reason: null };
    };

    // Calculate time-weighted management fee for a month
    // Fee is based on average capital: beginning balance + time-weighted flows
    const calcTimeWeightedMgmtFee = (begin, contrib, withdr, dayOfFlow, monthEndDate, annualFeeRate, contributionDay = null, withdrawalDay = null) => {
      const monthlyRate = annualFeeRate / 12;
      const absWithdr = Math.abs(withdr || 0);
      const contribAmt = contrib || 0;
      
      // Parse month end date to get days in month
      let daysInMonth = 30; // default
      if (monthEndDate) {
        const [year, month, day] = monthEndDate.split('-').map(Number);
        daysInMonth = day; // The day component of month_end_date IS the last day of the month
      }
      
      // Calculate weighted capital
      // If we have separate days for contribution and withdrawal, use them
      // Otherwise fall back to single dayOfFlow
      let avgCapital = begin;
      
      if (contributionDay || withdrawalDay) {
        // Use separate days for each flow type
        if (contribAmt > 0 && contributionDay) {
          const contribWeight = (daysInMonth - contributionDay) / daysInMonth;
          avgCapital += contribAmt * contribWeight;
        } else if (contribAmt > 0) {
          // Contribution but no day specified - assume end of month (weight = 0)
          avgCapital += 0;
        }
        
        if (absWithdr > 0 && withdrawalDay) {
          const withdrWeight = (daysInMonth - withdrawalDay) / daysInMonth;
          avgCapital -= absWithdr * withdrWeight;
        } else if (absWithdr > 0) {
          // Withdrawal but no day specified - assume end of month (weight = 0)
          avgCapital -= 0;
        }
      } else if (dayOfFlow) {
        // Legacy: single day of flow for net flow
        const netFlow = contribAmt - absWithdr;
        const flowWeight = (daysInMonth - dayOfFlow) / daysInMonth;
        avgCapital += netFlow * flowWeight;
      } else if (begin === 0 && contribAmt > 0) {
        // Inception month with no day_of_flow - contribution at start
        avgCapital = contribAmt;
      }
      
      return avgCapital * monthlyRate;
    };

    // Calculate time-weighted fee rate impact for return calculations
    // Returns the Modified Dietz denominator (beginning + weighted flows)
    // Mirrors the same logic as calcTimeWeightedMgmtFee's avgCapital
    const calcModifiedDietzDenom = (begin, contrib, withdr, dayOfFlow, monthEndDate, contributionDay = null, withdrawalDay = null) => {
      const absWithdr = Math.abs(withdr || 0);
      const contribAmt = contrib || 0;
      let daysInMonth = 30;
      if (monthEndDate) {
        const [,, day] = monthEndDate.split('-').map(Number);
        daysInMonth = day;
      }
      let denom = begin;
      if (contributionDay || withdrawalDay) {
        if (contribAmt > 0 && contributionDay) denom += contribAmt * (daysInMonth - contributionDay) / daysInMonth;
        if (absWithdr > 0 && withdrawalDay) denom -= absWithdr * (daysInMonth - withdrawalDay) / daysInMonth;
      } else if (dayOfFlow) {
        const netFlow = contribAmt - absWithdr;
        denom += netFlow * (daysInMonth - dayOfFlow) / daysInMonth;
      } else if (begin === 0 && contribAmt > 0) {
        denom = contribAmt;
      }
      return denom > 0 ? denom : (contribAmt || 1);
    };

    const calcTimeWeightedFeeRate = (begin, contrib, withdr, dayOfFlow, monthEndDate, annualFeeRate, contributionDay = null, withdrawalDay = null) => {
      const monthlyRate = annualFeeRate / 12;
      const absWithdr = Math.abs(withdr || 0);
      const contribAmt = contrib || 0;
      
      // If no beginning balance and no contribution, return 0
      if (begin === 0 && contribAmt === 0) return 0;
      
      // Parse month end date to get days in month
      let daysInMonth = 30;
      if (monthEndDate) {
        const endDate = new Date(monthEndDate);
        daysInMonth = endDate.getDate();
      }
      
      // Calculate weighted capital (same logic as calcTimeWeightedMgmtFee)
      let avgCapital = begin;
      
      if (contributionDay || withdrawalDay) {
        if (contribAmt > 0 && contributionDay) {
          const contribWeight = (daysInMonth - contributionDay) / daysInMonth;
          avgCapital += contribAmt * contribWeight;
        }
        if (absWithdr > 0 && withdrawalDay) {
          const withdrWeight = (daysInMonth - withdrawalDay) / daysInMonth;
          avgCapital -= absWithdr * withdrWeight;
        }
      } else if (dayOfFlow) {
        const netFlow = contribAmt - absWithdr;
        const flowWeight = (daysInMonth - dayOfFlow) / daysInMonth;
        avgCapital += netFlow * flowWeight;
      } else if (begin === 0 && contribAmt > 0) {
        avgCapital = contribAmt;
      }
      
      // The fee dollar amount
      const feeDollars = avgCapital * monthlyRate;
      
      // Return the fee as a rate relative to average capital
      return avgCapital > 0 ? feeDollars / avgCapital : 0;
    };

    const calcCumulative = (returns) => returns.reduce((acc, r) => acc * (1 + (r || 0)), 1) - 1;

    const calcAnnualized = (cumRet, months) => months === 0 ? 0 : Math.pow(1 + cumRet, 12 / months) - 1;

    const calcStdDev = (returns) => {
      const valid = returns.filter(r => r !== null && !isNaN(r));
      if (valid.length < 2) return 0;
      const mean = valid.reduce((a, b) => a + b, 0) / valid.length;
      const variance = valid.reduce((sum, r) => sum + Math.pow(r - mean, 2), 0) / (valid.length - 1);
      return Math.sqrt(variance) * Math.sqrt(12);
    };

    const calcCorrelation = (returns1, returns2) => {
      const n = Math.min(returns1.length, returns2.length);
      if (n < 2) return 0;
      const mean1 = returns1.slice(0, n).reduce((a, b) => a + b, 0) / n;
      const mean2 = returns2.slice(0, n).reduce((a, b) => a + b, 0) / n;
      let num = 0, den1 = 0, den2 = 0;
      for (let i = 0; i < n; i++) {
        const d1 = returns1[i] - mean1;
        const d2 = returns2[i] - mean2;
        num += d1 * d2;
        den1 += d1 * d1;
        den2 += d2 * d2;
      }
      return den1 * den2 === 0 ? 0 : num / Math.sqrt(den1 * den2);
    };

    const calcBeta = (returns1, returns2) => {
      const corr = calcCorrelation(returns1, returns2);
      const std1 = calcStdDev(returns1) / Math.sqrt(12);
      const std2 = calcStdDev(returns2) / Math.sqrt(12);
      return std2 === 0 ? 0 : corr * std1 / std2;
    };

    const calcAlpha = (returns1, returns2, riskFreeRate = 0.032) => {
      const ann1 = calcAnnualized(calcCumulative(returns1), returns1.length);
      const ann2 = calcAnnualized(calcCumulative(returns2), returns2.length);
      const beta = calcBeta(returns1, returns2);
      return ann1 - riskFreeRate - beta * (ann2 - riskFreeRate);
    };

      const result = (val * 100).toFixed(decimals);

      const exportToPDF = async () => {
        setExporting(true);
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'letter'); // 'l' for landscape
        const pageWidth = 279.4;
        const pageHeight = 215.9;
        const margin = 15;
        const footerHeight = 8; // Height reserved for footer

        // Store current tab
        const currentTab = activeTab;

        // Helper: temporarily replace <select> elements with plain text for PDF capture
        const hideSelectsForCapture = (container) => {
          const selects = container.querySelectorAll('select');
          const restoreFns = [];
          selects.forEach(sel => {
            const selectedText = sel.options[sel.selectedIndex]?.text || '';
            const span = document.createElement('span');
            span.textContent = selectedText;
            span.style.cssText = sel.style.cssText;
            span.style.border = 'none';
            span.style.background = 'transparent';
            span.style.display = 'inline-block';
            span.className = sel.className;
            span.setAttribute('data-pdf-placeholder', 'true');
            sel.style.display = 'none';
            sel.parentNode.insertBefore(span, sel.nextSibling);
            restoreFns.push(() => {
              sel.style.display = '';
              span.remove();
            });
          });
          return () => restoreFns.forEach(fn => fn());
        };

        // Helper function to capture a tab
        const captureTab = async (tabName, ref) => {
          setActiveTab(tabName);
          await new Promise(resolve => setTimeout(resolve, 1000)); // Wait for full render
          
          const element = ref.current;
          if (!element) return null;

          // Hide dropdowns, replacing with plain text
          const restoreSelects = hideSelectsForCapture(element);
          
          const canvas = await html2canvas(element, {
            scale: 1.5,
            useCORS: true,
            logging: false,
            backgroundColor: '#ffffff'
          });

          // Restore dropdowns
          restoreSelects();
          
          return canvas;
        };

        const addImageToPage = (pdf, canvas) => {
          // Use JPEG with 0.8 quality instead of PNG for much smaller file size
          const imgData = canvas.toDataURL('image/jpeg', 0.8);
          const canvasAspect = canvas.width / canvas.height;
          const footerReserve = 15; // Space reserved for footer
          const pageAspect = (pageWidth - 2 * margin) / (pageHeight - 2 * margin - footerReserve);
          
          let imgWidth, imgHeight, xPos, yPos;
          
          if (canvasAspect > pageAspect) {
            // Canvas is wider - fit to width
            imgWidth = pageWidth - 2 * margin;
            imgHeight = imgWidth / canvasAspect;
          } else {
            // Canvas is taller - fit to height
            imgHeight = pageHeight - 2 * margin - footerReserve;
            imgWidth = imgHeight * canvasAspect;
          }
          
          // Position content at top
          xPos = (pageWidth - imgWidth) / 2;
          yPos = margin;
          
          pdf.addImage(imgData, 'JPEG', xPos, yPos, imgWidth, imgHeight, undefined, 'FAST');
          
          // Add footer at very bottom of page
          const footerWidth = pageWidth; // Full width
          const footerImgHeight = 10; // Height in mm
          const footerY = pageHeight - footerImgHeight - 5; // 5mm from bottom
          pdf.addImage(FOOTER_BASE64, 'JPEG', 0, footerY, footerWidth, footerImgHeight, undefined, 'FAST');
        };

        try {
          // Capture Statement
          const statementCanvas = await captureTab('statement', statementRef);
          if (statementCanvas) {
            addImageToPage(pdf, statementCanvas);
          }

          // Capture Fact Sheet
          pdf.addPage('letter', 'l');
          const factsheetCanvas = await captureTab('factsheet', factsheetRef);
          if (factsheetCanvas) {
            addImageToPage(pdf, factsheetCanvas);
          }

          // Capture Disclosures
          pdf.addPage('letter', 'l');
          const disclosuresCanvas = await captureTab('disclosures', disclosuresRef);
          if (disclosuresCanvas) {
            addImageToPage(pdf, disclosuresCanvas);
          }

          // Save PDF
          const clientName = client?.client_name?.replace(/[^a-zA-Z0-9]/g, '_') || 'report';
          const dateStr = new Date(metrics.latest.month_end_date).toLocaleDateString('en-US', { month: 'short', year: 'numeric' }).replace(' ', '_');
          pdf.save(`${clientName}_${dateStr}.pdf`);

          // Restore original tab
          setActiveTab(currentTab);
        } catch (err) {
          console.error('PDF export error:', err);

          setActiveTab(currentTab);
        } finally {
          setExporting(false);
        }

      // Load index returns on mount

      // Load Schwab custody data after auth

      const client = clients.find(c => c.client_id === selectedClientId);

      const metrics = useMemo(() => {
        if (!monthlyData || monthlyData.length === 0 || !selectedDate) return null;
        
        const allData = [...monthlyData].sort((a, b) => new Date(a.month_end_date) - new Date(b.month_end_date));
        
        // Filter data to start from client's account open date
        // account_open_date is the actual start date (e.g., 2019-02-28), so we include months >= that date
        const accountOpenDate = client?.account_open_date;
        const dataFromInception = accountOpenDate 
          ? allData.filter(d => d.month_end_date >= accountOpenDate)
          : allData;
        
        // Filter data up to selected date
        const data = dataFromInception.filter(d => d.month_end_date <= selectedDate);
        if (data.length === 0) return null;
        
        const latest = data[data.length - 1];
        const currentYear = new Date(latest.month_end_date).getFullYear();
        const currentMonth = new Date(latest.month_end_date).getMonth();
        const currentQuarter = Math.floor(currentMonth / 3);
        
        // Helper function to get fee rates for a given month
        const getFeeRatesForMonth = (monthEndDate) => {
          // If fee schedule exists for this client, use it
          if (feeSchedule && feeSchedule.length > 0) {
            // Find the most recent effective date <= this month
            const applicableSchedule = feeSchedule
              .filter(s => s.effective_date <= monthEndDate)
              .sort((a, b) => b.effective_date.localeCompare(a.effective_date))[0];
            
            if (applicableSchedule) {
              return {
                annualMgmtFeeRate: applicableSchedule.annual_mgmt_fee_rate || 0,
                perfFeeRate: applicableSchedule.performance_fee_rate || 0,
                hurdleIndexId: applicableSchedule.hurdle_index_id
              };
            }
          }
          // Fall back to client defaults
          return {
            annualMgmtFeeRate: client?.annual_mgmt_fee_rate || 0.0075,
            perfFeeRate: client?.performance_fee_rate || 0,
            hurdleIndexId: client?.hurdle_index_id
          };
        };
        
        // ===== USE STORED DB VALUES AS SOURCE OF TRUTH =====
        // YTD and QTD data slices
        const ytdData = data.filter(d => new Date(d.month_end_date).getFullYear() === currentYear);
        const qtdData = ytdData.filter(d => Math.floor(new Date(d.month_end_date).getMonth() / 3) === currentQuarter);
        
        // Gross returns from DB (gross_return_pct)
        const grossReturns = data.map(d => d.gross_return_pct ?? 0);
        
        // Net of mgmt only from DB
        const netReturns = data.map(d => d.net_return_pct ?? 0);
        
        // netAllFeesReturns: read from DB (saved by Statement bulk save as source of truth)
        let netAllFeesReturns = data.map(d => d.net_all_fees_return_pct ?? d.net_return_pct ?? 0);
        
        // YTD/QTD slices
        const ytdGrossReturns = ytdData.map(d => d.gross_return_pct ?? 0);
        const ytdNetReturns = ytdData.map(d => d.net_return_pct ?? 0);
        
        const qtdGrossReturns = qtdData.map(d => d.gross_return_pct ?? 0);
        const qtdNetReturns = qtdData.map(d => d.net_return_pct ?? 0);
        
        // MTD/QTD/YTD compound returns - gross and net of mgmt
        const grossMtd = grossReturns[grossReturns.length - 1] || 0;
        const grossQtd = calcCumulative(qtdGrossReturns);
        const grossYtd = calcCumulative(ytdGrossReturns);
        
        let netMgmtMtd = netReturns[netReturns.length - 1] || 0;
        let netMgmtQtd = calcCumulative(qtdNetReturns);
        let netMgmtYtd = calcCumulative(ytdNetReturns);
        
        // net-all-fees MTD/QTD/YTD from DB values
        const ytdNetAllFeesReturns = ytdData.map(d => d.net_all_fees_return_pct ?? d.net_return_pct ?? 0);
        const qtdNetAllFeesReturns = qtdData.map(d => d.net_all_fees_return_pct ?? d.net_return_pct ?? 0);
        let mtdNetAllFees = netAllFeesReturns[netAllFeesReturns.length - 1] || 0;
        let qtdNetAllFees = calcCumulative(qtdNetAllFeesReturns);
        let ytdNetAllFees = calcCumulative(ytdNetAllFeesReturns);
        
        // Management fee dollar amounts from DB
        const isMtdWaived = latest.fee_waived === true || latest.fee_waived === 'true';
        const latestRates = getFeeRatesForMonth(latest.month_end_date);
        const mgmtFeeMtd = latest.management_fee || 0;
        const mgmtFeeQtd = qtdData.reduce((sum, d) => sum + (d.management_fee || 0), 0);
        const mgmtFeeYtd = ytdData.reduce((sum, d) => sum + (d.management_fee || 0), 0);
        
        // Contributions and withdrawals for display
        const qtdContributions = qtdData.reduce((sum, d) => sum + (d.contributions || 0), 0);
        const qtdWithdrawals = qtdData.reduce((sum, d) => sum + Math.abs(d.withdrawals || 0), 0);
        const ytdContributions = ytdData.reduce((sum, d) => sum + (d.contributions || 0), 0);
        const ytdWithdrawals = ytdData.reduce((sum, d) => sum + Math.abs(d.withdrawals || 0), 0);
        
        // Management fees paid (for internal fee display)
        // Monthly accrual always happens, even in fee_payment months
        // Fee Withdrawal is a separate cash event (settling quarterly bill)
        const feeRate = client?.annual_mgmt_fee_rate || 0.0075;
        const mtdIsFeePaymentMonth = client?.fee_payment === 'Internal' && latest.withdrawal_type === 'fee_payment';
        const mtdMgmtFeePaid = isMtdWaived ? 0 : latest.ending_balance * (latestRates.annualMgmtFeeRate / 12);
        const qtdMgmtFeePaid = qtdData.reduce((sum, d) => {
          const isWaived = d.fee_waived === true || d.fee_waived === 'true';
          const rates = getFeeRatesForMonth(d.month_end_date);
          return sum + (isWaived ? 0 : d.ending_balance * (rates.annualMgmtFeeRate / 12));
        }, 0);
        const ytdMgmtFeePaid = ytdData.reduce((sum, d) => {
          const isWaived = d.fee_waived === true || d.fee_waived === 'true';
          const rates = getFeeRatesForMonth(d.month_end_date);
          return sum + (isWaived ? 0 : d.ending_balance * (rates.annualMgmtFeeRate / 12));
        }, 0);
        
        // Get benchmark returns aligned with portfolio dates
        // Default: GTFI (strategy 1): US Agg + Corp HY, GMA (strategy 2): US Agg + HFRI
        // User can override via stats page dropdowns
        const isGTFI = client?.strategy_id === 1;
        const bench1Id = statsBench1Id != null ? statsBench1Id : 1; // default US Agg
        const bench2Id = statsBench2Id != null ? statsBench2Id : (isGTFI ? 2 : 3); // default Corp HY or HFRI
        const benchmark1Returns = data.map(d => {
          const yearMonth = d.month_end_date.substring(0, 7);
          return indexReturns[bench1Id]?.[yearMonth] || 0;
        });
        const benchmark2Returns = data.map(d => {
          const yearMonth = d.month_end_date.substring(0, 7);
          return indexReturns[bench2Id]?.[yearMonth] || 0;
        });
        
        const benchmark1Name = INDEX_OPTIONS[bench1Id] || 'Benchmark 1';
        const benchmark2Name = INDEX_OPTIONS[bench2Id] || 'Benchmark 2';
        
        // ===== PERFORMANCE FEE CALCULATION (for display purposes only) =====
        // Calculate perf fee accrual for each month - used for display in Statement
        // Returns come from DB (net_all_fees_return_pct), NOT calculated on-the-fly
        const hasPerformanceFee = (feeSchedule && feeSchedule.length > 0 && feeSchedule.some(s => s.performance_fee_rate > 0)) || (client?.performance_fee_rate || 0) > 0;
        
        // Arrays to store calculated values for each month (will be saved to DB)
        const monthlyAccruedPerfFee = new Array(data.length).fill(0);
        const monthlyPerfFee = new Array(data.length).fill(0);
        const monthlyMgmtFee = new Array(data.length).fill(0);
        const monthlyAccountGainSinceHWM = new Array(data.length).fill(0);
        const monthlyCumulativeHurdle = new Array(data.length).fill(0);
        const monthlySpreadOverHurdle = new Array(data.length).fill(0);
        const monthlyHWMBalance = new Array(data.length).fill(0);
        const monthlyHWMStartDate = new Array(data.length).fill(null);
        
        // Calculate monthly management fees for all months (needed for saving to DB)
        data.forEach((d, i) => {
          const rates = getFeeRatesForMonth(d.month_end_date);
          const hasFlows = (d.contributions || 0) !== 0 || (d.withdrawals || 0) !== 0;
          monthlyMgmtFee[i] = hasFlows
            ? calcTimeWeightedMgmtFee(d.beginning_balance, d.contributions, d.withdrawals, d.day_of_flow, d.month_end_date, rates.annualMgmtFeeRate, d.contribution_day, d.withdrawal_day)
            : d.ending_balance * (rates.annualMgmtFeeRate / 12);
        });
        
        // Array to store dynamic HWM for each month (calculated, not from DB)
        const dynamicHWM = new Array(data.length).fill(0);
        
        // Track when perf fee structure started and when fees were actually paid
        let perfFeeStartIdx = -1;
        let resetPoints = [];
        
        if (hasPerformanceFee) {
          // Find when performance fee started
          for (let i = 0; i < data.length; i++) {
            const rates = getFeeRatesForMonth(data[i].month_end_date);
            if (rates.perfFeeRate > 0) {
              perfFeeStartIdx = i;
              break;
            }
          }
          
          // First pass: Calculate HWM for each month
          // HWM = initial value + cumulative management fees + contributions - withdrawals
          // HWM only resets when perf fee is actually PAID (crystallized at year-end)
          
          let lastPaidIdx = -1; // Track when perf fee was last paid (December index)
          let hwmStartIdx = perfFeeStartIdx; // Start of current HWM period
          
          for (let i = 0; i < data.length; i++) {
            const d = data[i];
            const rates = getFeeRatesForMonth(d.month_end_date);
            
            // If no perf fee for this month, HWM doesn't apply
            if (rates.perfFeeRate === 0) {
              dynamicHWM[i] = 0;
              continue;
            }
            
            // Check if we need to reset HWM (January after a paid year)
            const thisMonth = new Date(d.month_end_date).getMonth();
            if (thisMonth === 0 && lastPaidIdx >= 0 && lastPaidIdx === i - 1) {
              // This is January and last December had a paid perf fee
              // Reset HWM to December's ending balance
              hwmStartIdx = i;
              dynamicHWM[i] = data[lastPaidIdx].ending_balance;
              
              // Add January's mgmt fee to HWM (always simple ending_balance * rate/12, NOT time-weighted)
              const janMgmtFeeForHWM = d.ending_balance * (rates.annualMgmtFeeRate / 12);
              dynamicHWM[i] += janMgmtFeeForHWM;
              
              // Add contributions, subtract regular withdrawals (not fee_payment) for this month
              const thisContribs = d.contributions || 0;
              const isFeePaymentWithdrawal = d.withdrawal_type === 'fee_payment';
              const thisWithdraws = isFeePaymentWithdrawal ? 0 : Math.abs(d.withdrawals || 0);
              dynamicHWM[i] += thisContribs - thisWithdraws;
            } else if (i === hwmStartIdx) {
              // First month of HWM period (inception or after reset)
              if (d.beginning_balance === 0 && d.contributions > 0) {
                // Inception month - HWM starts at contribution
                dynamicHWM[i] = d.contributions;
              } else {
                // After reset - HWM starts at beginning balance
                dynamicHWM[i] = d.beginning_balance;
              }
              // Add this month's mgmt fee to HWM (always simple ending_balance * rate/12, NOT time-weighted)
              const thisMgmtFeeForHWM = d.ending_balance * (rates.annualMgmtFeeRate / 12);
              dynamicHWM[i] += thisMgmtFeeForHWM;
            } else if (i > hwmStartIdx) {
              // Subsequent months - HWM = previous HWM + this month's mgmt fee + this month's flows
              // Mgmt fee for HWM is always simple ending_balance * rate/12, NOT time-weighted
              const thisMgmtFeeForHWM = d.ending_balance * (rates.annualMgmtFeeRate / 12);
              
              // Add contributions, subtract withdrawals for THIS month
              // BUT exclude fee_payment withdrawals - they don't reduce HWM
              const thisContribs = d.contributions || 0;
              const isFeePaymentWithdrawal = d.withdrawal_type === 'fee_payment';
              const thisWithdraws = isFeePaymentWithdrawal ? 0 : Math.abs(d.withdrawals || 0);
              const thisIsInception = d.beginning_balance === 0 && thisContribs > 0;
              
              if (thisIsInception) {
                // This shouldn't happen in middle of period, but handle it
                dynamicHWM[i] = dynamicHWM[i-1] + thisMgmtFeeForHWM + thisContribs;
              } else {
                dynamicHWM[i] = dynamicHWM[i-1] + thisMgmtFeeForHWM + thisContribs - thisWithdraws;
              }
            }
            
            // Check if this is December (year end) - potential crystallization point
            if (thisMonth === 11) {
              // Calculate if perf fee would be paid this year
              // Must be ABOVE HWM AND total gain > 0
              
              // Calculate cumulative hurdle since HWM was set
              let cumulativeHurdle = 0;
              for (let j = hwmStartIdx; j <= i; j++) {
                const mData = data[j];
                const mRates = getFeeRatesForMonth(mData.month_end_date);
                if (mRates.hurdleIndexId) {
                  const yearMonth = mData.month_end_date.substring(0, 7);
                  const hurdleReturn = indexReturns[mRates.hurdleIndexId]?.[yearMonth] || 0;
                  // Hurdle is based on beginning balance (or contribution for inception)
                  const hurdleBase = mData.beginning_balance > 0 ? mData.beginning_balance : (mData.contributions || 0);
                  cumulativeHurdle += hurdleBase * hurdleReturn;
                }
              }
              
              // Calculate gain above HWM
              // Add back fee_payment withdrawals for gain calculation
              const firstPassFeePaymentWithdrawal = d.withdrawal_type === 'fee_payment' ? Math.abs(d.withdrawals || 0) : 0;
              const firstPassAdjustedEndingBalance = d.ending_balance + firstPassFeePaymentWithdrawal;
              const gainAboveHWM = firstPassAdjustedEndingBalance - dynamicHWM[i];
              
              // Total gain = gain above HWM + (-cumulative hurdle)
              const totalGain = gainAboveHWM + (-cumulativeHurdle);
              
              console.log('Dec crystallization check', d.month_end_date, {
                hwmStartIdx,
                dynamicHWM: dynamicHWM[i],
                endingBalance: d.ending_balance,
                adjustedEndingBalance: firstPassAdjustedEndingBalance,
                feePaymentWithdrawal: firstPassFeePaymentWithdrawal,
                gainAboveHWM,
                cumulativeHurdle,
                totalGain,
                wouldPay: gainAboveHWM > 0 && totalGain > 0
              });
              
              // Must be ABOVE HWM (gainAboveHWM > 0) AND total gain > 0 to crystallize
              if (gainAboveHWM > 0 && totalGain > 0) {
                // Performance fee would be paid - mark for HWM reset next year
                lastPaidIdx = i;
              }
            }
          }
          
          // Second pass: Calculate perf fee using the new HWM methodology
          // HWM = initial value + cumulative mgmt fees + flows
          // Gain above hurdle = (ending - HWM) + (-cumulative hurdle)
          // Track HWM reset periods using the same logic as first pass
          
          // Re-calculate lastPaidIdx to track reset points
          let lastPaidIdxForCalc = -1;
          let hwmStartIdxForCalc = perfFeeStartIdx;
          
          // First, determine all reset points
          resetPoints = [];
          let tempHwmStartIdx = perfFeeStartIdx;
          
          for (let i = 0; i < data.length; i++) {
            const d = data[i];
            const rates = getFeeRatesForMonth(d.month_end_date);
            if (rates.perfFeeRate === 0) continue;
            
            const thisMonth = new Date(d.month_end_date).getMonth();
            
            // Check if this is December
            if (thisMonth === 11) {
              // Calculate if perf fee would be paid
              let tempCumulativeHurdle = 0;
              for (let j = tempHwmStartIdx; j <= i; j++) {
                const mData = data[j];
                const mRates = getFeeRatesForMonth(mData.month_end_date);
                if (mRates.hurdleIndexId) {
                  const yearMonth = mData.month_end_date.substring(0, 7);
                  const hurdleReturn = indexReturns[mRates.hurdleIndexId]?.[yearMonth] || 0;
                  const hurdleBase = mData.beginning_balance > 0 ? mData.beginning_balance : (mData.contributions || 0);
                  tempCumulativeHurdle += hurdleBase * hurdleReturn;
                }
              }
              
              // Add back fee_payment withdrawals for gain calculation
              const decFeePaymentWithdrawal = d.withdrawal_type === 'fee_payment' ? Math.abs(d.withdrawals || 0) : 0;
              const decAdjustedEndingBalance = d.ending_balance + decFeePaymentWithdrawal;
              const gainAboveHWM = decAdjustedEndingBalance - dynamicHWM[i];
              const totalGain = gainAboveHWM + (-tempCumulativeHurdle);
              
              if (gainAboveHWM > 0 && totalGain > 0) {
                // This December would have a paid perf fee - next January resets
                resetPoints.push(i + 1); // January index
                tempHwmStartIdx = i + 1;
              }
            }
          }
          
          // Now calculate perf fee for each month using the reset points
          data.forEach((d, i) => {
            const currentMonthRates = getFeeRatesForMonth(d.month_end_date);
            const currentPerfFeeRate = currentMonthRates.perfFeeRate || 0;
            
            // Skip if no perf fee for this month
            if (currentPerfFeeRate === 0) {
              monthlyAccruedPerfFee[i] = 0;
              return;
            }
            
            // Check if this month is a reset point
            if (resetPoints.includes(i)) {
              hwmStartIdxForCalc = i;
            }
            
            const currentHWM = dynamicHWM[i];
            
            // Get the ORIGINAL HWM base (without mgmt fee adjustments) for hurdle calculation
            // This is the ending balance when HWM period started (or contribution at inception)
            const hwmStartData = data[hwmStartIdxForCalc];
            const originalHWMBase = hwmStartData.beginning_balance > 0 
              ? hwmStartData.beginning_balance 
              : (hwmStartData.contributions || 0);
            
            // Calculate total fee_payment withdrawals since HWM was set
            // These represent perf fees paid from the prior period
            let totalFeePaymentWithdrawals = 0;
            for (let j = hwmStartIdxForCalc; j <= i; j++) {
              const mData = data[j];
              if (mData.withdrawal_type === 'fee_payment') {
                totalFeePaymentWithdrawals += Math.abs(mData.withdrawals || 0);
              }
            }
            
            // Adjusted HWM = Original HWM - fee withdrawals (fee withdrawals reduce the starting capital)
            const adjustedHWM = currentHWM - totalFeePaymentWithdrawals;
            
            // Check if above the adjusted HWM
            const gainAboveHWM = d.ending_balance - adjustedHWM;
            
            // Calculate account gain (change in value) since HWM was set
            // This should be NET of management fees (matching Excel "Gain since HWM")
            // Net Gain = Gross Change - Management Fees
            let accountGainSinceHWM = 0;
            for (let j = hwmStartIdxForCalc; j <= i; j++) {
              const mData = data[j];
              const mRates = getFeeRatesForMonth(mData.month_end_date);
              
              // Gross change in value
              const monthChange = mData.ending_balance - mData.beginning_balance 
                - (mData.contributions || 0) 
                + Math.abs(mData.withdrawals || 0);
              
              // Calculate management fee for this month (simple ending_balance * rate/12 for perf fee spread calc)
              const monthMgmtFeeForSpread = mData.ending_balance * (mRates.annualMgmtFeeRate / 12);
              
              // Net change = Gross change - Mgmt fee
              accountGainSinceHWM += (monthChange - monthMgmtFeeForSpread);
            }
            
            // Calculate cumulative hurdle since HWM was set
            // Hurdle = Sum of (each month's beginning balance × that month's index return)
            let cumulativeHurdleGain = 0;
            const currentMonthRatesForHurdle = getFeeRatesForMonth(d.month_end_date);
            const hasHurdle = currentMonthRatesForHurdle.hurdleIndexId != null;
            if (hasHurdle) {
              for (let j = hwmStartIdxForCalc; j <= i; j++) {
                const mData = data[j];
                const yearMonth = mData.month_end_date.substring(0, 7);
                const hurdleReturn = indexReturns[currentMonthRatesForHurdle.hurdleIndexId]?.[yearMonth] || 0;
                // Use beginning balance (or contribution for inception month) as base for each month's hurdle
                const hurdleBase = mData.beginning_balance > 0 ? mData.beginning_balance : (mData.contributions || 0);
                cumulativeHurdleGain += hurdleBase * hurdleReturn;
              }
            }
            
            // Spread = Account Net Gain - Hurdle Return
            // If hurdle is negative (Agg lost money), subtracting it adds to the spread
            // Must be above adjusted HWM to earn any perf fee
            const spreadOverHurdle = gainAboveHWM > 0 
              ? (hasHurdle ? (accountGainSinceHWM - cumulativeHurdleGain) : accountGainSinceHWM)
              : 0;
            
            // Calculate the raw performance fee
            // Must be above HWM (gainAboveHWM > 0) AND spread > 0 to earn perf fee
            const rawPerfFee = (gainAboveHWM > 0 && spreadOverHurdle > 0) ? spreadOverHurdle * currentPerfFeeRate : 0;
            
            // Cap the perf fee so it doesn't make the YTD return negative
            // Calculate YTD net gain (from start of the CURRENT MONTH's year, not selected display year)
            const monthYear = new Date(d.month_end_date + 'T12:00:00').getFullYear();
            let ytdChangeInValue = 0;
            let ytdMgmtFees = 0;
            for (let j = 0; j <= i; j++) {
              const mData = data[j];
              const mYear = new Date(mData.month_end_date + 'T12:00:00').getFullYear();
              if (mYear !== monthYear) continue;
              
              const mRates = getFeeRatesForMonth(mData.month_end_date);
              const mChangeInValue = mData.ending_balance - mData.beginning_balance - (mData.contributions || 0) + Math.abs(mData.withdrawals || 0);
              ytdChangeInValue += mChangeInValue;
              
              const mHasFlows = (mData.contributions || 0) !== 0 || (mData.withdrawals || 0) !== 0;
              const mMgmtFee = mHasFlows
                ? calcTimeWeightedMgmtFee(mData.beginning_balance, mData.contributions, mData.withdrawals, mData.day_of_flow, mData.month_end_date, mRates.annualMgmtFeeRate, mData.contribution_day, mData.withdrawal_day)
                : mData.ending_balance * (mRates.annualMgmtFeeRate / 12);
              ytdMgmtFees += mMgmtFee;
            }
            const ytdNetGain = ytdChangeInValue - ytdMgmtFees;
            
            // Cap the perf fee at the YTD net gain (can't take YTD return negative)
            const accruedPerfFee = Math.min(rawPerfFee, Math.max(0, ytdNetGain));
            
            // Debug logging for current month
            if (i === data.length - 1) {
              console.log('HWM debug for', d.month_end_date, {
                hwmStartIdxForCalc,
                originalHWMBase,
                currentHWM,
                totalFeePaymentWithdrawals,
                adjustedHWM,
                dataSinceHWMLength: i - hwmStartIdxForCalc + 1
              });
              console.log('Perf fee calc for', d.month_end_date, {
                endingBalance: d.ending_balance,
                adjustedHWM,
                gainAboveHWM,
                accountGainSinceHWM,
                hasHurdle,
                cumulativeHurdleGain,
                spreadOverHurdle,
                rawPerfFee,
                ytdChangeInValue,
                ytdMgmtFees,
                ytdNetGain,
                accruedPerfFee,
                currentPerfFeeRate
              });
            }
            
            // Store all calculated values for this month
            monthlyAccruedPerfFee[i] = accruedPerfFee;
            monthlyAccountGainSinceHWM[i] = accountGainSinceHWM;
            monthlyCumulativeHurdle[i] = cumulativeHurdleGain;
            monthlySpreadOverHurdle[i] = spreadOverHurdle;
            monthlyHWMBalance[i] = adjustedHWM;
            monthlyHWMStartDate[i] = hwmStartData.month_end_date;
            
            // Calculate return impact
            // If this month is a reset point, prev accrued should be 0 (new HWM period)
            const isResetPoint = resetPoints.includes(i);
            const prevAccruedPerfFee = (i > 0 && !isResetPoint) ? monthlyAccruedPerfFee[i - 1] : 0;
            const monthPerfFee = accruedPerfFee - prevAccruedPerfFee;
            monthlyPerfFee[i] = monthPerfFee;
            
            // For inception month, use contribution as base instead of beginning_balance
            const returnBase = d.beginning_balance > 0 ? d.beginning_balance : (d.contributions || 1);
            // perfFeeImpact kept for display only, NOT modifying returns
          });
        }
        
        // Get perf fee values for display (from the unified calculation)
        let perfFeeYtd = monthlyAccruedPerfFee[data.length - 1] || 0;
        const latestMonth = data[data.length - 1];
        const prevMonthPerfFee = data.length >= 2 ? monthlyAccruedPerfFee[data.length - 2] || 0 : 0;
        
        console.log('Perf fee display setup', {
          hasPerformanceFee,
          dataLength: data.length,

        });
        
        // Save perf fee data for ALL months now that monthlyAccruedPerfFee is correctly populated
        if (data.length > 0 && hasPerformanceFee) {
          const latestIdx = data.length - 1;
          
          // Calculate YTD Net Net $ for each month (for net_all_fees_return_pct)
          const ytdNetNetDollar = new Array(data.length).fill(0);
          let calcYearForSave = null;
          let ytdNetGainForSave = 0;
          
          for (let i = 0; i < data.length; i++) {
            const d = data[i];
            const yr = new Date(d.month_end_date + 'T12:00:00').getFullYear();
            if (yr !== calcYearForSave) {
              ytdNetGainForSave = 0;

            }
            // For Internal fee clients, ending balance already has fee deducted - don't subtract again
            // EXCEPT for fee_payment months: we added back the fee_withdrawal for gross,
            // so we need to deduct the monthly mgmt fee to get net
            const isInternalForNetCalc = client?.fee_payment === 'Internal';
            const isFeePaymentRow = isInternalForNetCalc && d.withdrawal_type === 'fee_payment';
            const mgmtFeeDeduction = isFeePaymentRow ? (d.management_fee || monthlyMgmtFee[i] || 0)
              : (isInternalForNetCalc ? 0 : (d.management_fee || monthlyMgmtFee[i] || 0));
            const monthNetGain = d.ending_balance - d.beginning_balance 
              - (d.contributions || 0) + Math.abs(d.withdrawals || 0) 
              - mgmtFeeDeduction;
            ytdNetGainForSave += monthNetGain;
            ytdNetNetDollar[i] = ytdNetGainForSave - monthlyAccruedPerfFee[i];
          }
          
          // Update netAllFeesReturns live for display
          netAllFeesReturns = data.map((d, i) => {
            const yr = new Date(d.month_end_date + 'T12:00:00').getFullYear();
            const prevYr = i > 0 ? new Date(data[i-1].month_end_date + 'T12:00:00').getFullYear() : null;
            const priorYtdNN = (i > 0 && yr === prevYr) ? ytdNetNetDollar[i - 1] : 0;
            const mtdNN = ytdNetNetDollar[i] - priorYtdNN;
            // Use Modified Dietz denominator (same as gross) so net can never exceed gross
            const denom = calcModifiedDietzDenom(d.beginning_balance, d.contributions, d.withdrawals, d.day_of_flow, d.month_end_date, d.contribution_day, d.withdrawal_day);
            return mtdNN / denom;
          });
          
          // Update MTD/QTD/YTD from live values
          mtdNetAllFees = netAllFeesReturns[netAllFeesReturns.length - 1] || 0;
          const ytdStartIdx = data.findIndex(d => new Date(d.month_end_date + 'T12:00:00').getFullYear() === currentYear);
          const qtdStartIdx = data.findIndex(d => {

          });
          if (ytdStartIdx >= 0) ytdNetAllFees = calcCumulative(netAllFeesReturns.slice(ytdStartIdx));
          if (qtdStartIdx >= 0) qtdNetAllFees = calcCumulative(netAllFeesReturns.slice(qtdStartIdx));

          // Pre-compute accrual presence for snap logic (needs to run before snaps)
          const ytdSlice = ytdStartIdx >= 0 ? monthlyAccruedPerfFee.slice(ytdStartIdx) : [];
          const ytdHasAccrual = ytdSlice.some(f => (f || 0) !== 0);
          const qtdSlice = qtdStartIdx >= 0 ? monthlyAccruedPerfFee.slice(qtdStartIdx) : [];
          const qtdHasAccrual = qtdSlice.some(f => (f || 0) !== 0);
          const latestAccruedFee = monthlyAccruedPerfFee[data.length - 1] || 0;

          // Update net-of-mgmt display variables from live calculation

          const liveNetMgmtReturns = data.map((d, i) => {

            const changeInValue = d.ending_balance - d.beginning_balance

            return netGain / denom;
          });

          if (ytdStartIdx >= 0) netMgmtYtd = calcCumulative(liveNetMgmtReturns.slice(ytdStartIdx));
          if (qtdStartIdx >= 0) netMgmtQtd = calcCumulative(liveNetMgmtReturns.slice(qtdStartIdx));

          // Snap net-all-fees to net-of-mgmt for any period where accrued perf fee is $0.
          // Accrual-then-reversal within a period creates a compounding asymmetry that makes
          // net-all-fees appear different from net-of-mgmt even when no fee is outstanding.

          if (latestAccruedFee === 0) mtdNetAllFees = netMgmtMtd;
          if (!ytdHasAccrual && ytdStartIdx >= 0) ytdNetAllFees = netMgmtYtd;
          if (!qtdHasAccrual && qtdStartIdx >= 0) qtdNetAllFees = netMgmtQtd;
          
          // Bulk save all months
          const savePromises = data.map((d, i) => {
            const saveData = {
              accrued_perf_fee: monthlyAccruedPerfFee[i],
              performance_fee: monthlyPerfFee[i],
              net_all_fees_return_pct: netAllFeesReturns[i],
              net_return_pct: (() => {

                const dd = data[i];
                const isFeePaymentSave = isInternal && dd.withdrawal_type === 'fee_payment';
                const mgmtFee = isFeePaymentSave ? (dd.management_fee || monthlyMgmtFee[i] || 0)
                  : (isInternal ? 0 : (monthlyMgmtFee[i] || 0));
                const changeInValue = dd.ending_balance - dd.beginning_balance
                  - (dd.contributions || 0) + Math.abs(dd.withdrawals || 0);
                const netGain = changeInValue - mgmtFee;
                // Use Modified Dietz denominator (same as gross) so net can never exceed gross
                const denom = calcModifiedDietzDenom(dd.beginning_balance, dd.contributions, dd.withdrawals, dd.day_of_flow, dd.month_end_date, dd.contribution_day, dd.withdrawal_day);
                return netGain / denom;
              })()
            };
            
            // For latest month, also save HWM metadata
            if (i === latestIdx) {
              saveData.mgmt_fee = monthlyMgmtFee[i];
              saveData.account_gain_since_hwm = monthlyAccountGainSinceHWM[i];
              saveData.cumulative_hurdle = monthlyCumulativeHurdle[i];
              saveData.spread_over_hurdle = monthlySpreadOverHurdle[i];
              saveData.hwm_balance = monthlyHWMBalance[i];
              saveData.hwm_start_date = monthlyHWMStartDate[i];
            }
            
            return fetch(
              `${SUPABASE_URL}/rest/v1/monthly_data?client_id=eq.${selectedClientId}&month_end_date=eq.${d.month_end_date}`,
              {
                method: 'PATCH',
                headers: {
                  'apikey': SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${authToken || SUPABASE_ANON_KEY}`,

                },

              }
            );
          });
          
          Promise.all(savePromises)
            .then(() => console.log(`Saved perf fee data for all ${data.length} months`))
            .catch(err => console.error('Error saving fee calculations:', err));
        } else if (data.length > 0) {
          // Non-perf-fee client: just save mgmt_fee for latest month
          const latestIdx = data.length - 1;
          fetch(
            `${SUPABASE_URL}/rest/v1/monthly_data?client_id=eq.${selectedClientId}&month_end_date=eq.${data[latestIdx].month_end_date}`,

              method: 'PATCH',

        // Check if HWM reset this month (for MTD calculation)

          if (currMonth === 0 && prevMonth === 11) {

            // Calculate cumulative hurdle for December

              const prevJMonth = new Date(data[j-1].month_end_date).getMonth();

                const prevDecIdx = j - 1;
                const prevDecData = data[prevDecIdx];
                const prevDecHWM = dynamicHWM[prevDecIdx];
                const prevGainAboveHWM = prevDecData.ending_balance - prevDecHWM;
                if (prevGainAboveHWM > 0) {
                  decHwmStartIdx = j;
                  break;
                }
              }
            }
            
            let decCumulativeHurdle = 0;

                const hurdleBase = mData.beginning_balance > 0 ? mData.beginning_balance : (mData.contributions || 0);
                decCumulativeHurdle += hurdleBase * hurdleReturn;
              }
            }
            
            const decTotalGain = gainAboveHWM + (-decCumulativeHurdle);
            
            if (gainAboveHWM > 0 && decTotalGain > 0) {

            }
          }
          
          console.log('HWM reset check', {

            currMonth,

          });
        }

        console.log('Perf fee MTD calc', {

          prevMonthPerfFee,
          hwmResetThisMonth,
          perfFeeMtd,

        });
        
        // QTD perf fee

        // Check if HWM reset since start of quarter

          } else {

            }
          }
        }
        const perfFeeQtd = hwmResetSinceQtdStart ? perfFeeYtd : (perfFeeYtd - prevQtdPerfFee);
        
        // For display, calculate change in value
        // Use absolute value for withdrawals since they may be stored as negative
        // Separate fee_payment withdrawals from regular withdrawals for Internal clients
        const isInternalClient = client?.fee_payment === 'Internal';
        const mtdContributions = latest.contributions || 0;
        const mtdIsFeePayment = isInternalClient && latest.withdrawal_type === 'fee_payment';
        const mtdFeeWithdrawal = mtdIsFeePayment ? Math.abs(latest.internal_fee_withdrawal || 0) : 0;
        const mtdRegularWithdrawals = Math.max(0, Math.abs(latest.withdrawals || 0) - mtdFeeWithdrawal);
        const mtdWithdrawals = Math.abs(latest.withdrawals || 0);
        const changeInValueMtd = latest.ending_balance - latest.beginning_balance - mtdContributions + mtdRegularWithdrawals + mtdFeeWithdrawal;
        const qtdStartBal = qtdData[0]?.beginning_balance !== undefined ? qtdData[0].beginning_balance : latest.beginning_balance;
        const ytdStartBal = ytdData[0]?.beginning_balance !== undefined ? ytdData[0].beginning_balance : latest.beginning_balance;
        
        // QTD/YTD: separate fee_payment withdrawals
        const qtdFeeWithdrawals = isInternalClient ? qtdData.reduce((sum, d) => sum + (d.withdrawal_type === 'fee_payment' ? Math.abs(d.internal_fee_withdrawal || 0) : 0), 0) : 0;
        const qtdRegularWithdrawals = Math.max(0, Math.abs(qtdWithdrawals) - qtdFeeWithdrawals);
        const ytdFeeWithdrawals = isInternalClient ? ytdData.reduce((sum, d) => sum + (d.withdrawal_type === 'fee_payment' ? Math.abs(d.internal_fee_withdrawal || 0) : 0), 0) : 0;
        const ytdRegularWithdrawals = Math.max(0, Math.abs(ytdWithdrawals) - ytdFeeWithdrawals);
        
        const changeInValueQtd = latest.ending_balance - qtdStartBal - qtdContributions + Math.abs(qtdWithdrawals);
        const changeInValueYtd = latest.ending_balance - ytdStartBal - ytdContributions + Math.abs(ytdWithdrawals);
        
        // Use DB net_all_fees_return_pct as single source of truth for ALL clients
        // MTD/QTD/YTD net-of-all-fees come from compounding DB values
        const netAllMtd = mtdNetAllFees;
        const netAllQtd = qtdNetAllFees;
        const netAllYtd = ytdNetAllFees;
        
        // VAMI data for chart (starting at 100 for percentage display)
        // For perf fee clients, adjust returns to include accrued perf fee impact per month
        // (DB net_all_fees_return_pct only reflects crystallized fees, not accruals)
        // Use DB net_all_fees_return_pct as single source of truth for ALL clients
        // (perf fee clients already have perf fee deducted in net_all_fees_return_pct)
        const adjustedNetAllFees = netAllFeesReturns;
        
        let vami = [{ date: 'Start', Portfolio: 100, Benchmark1: 100, Benchmark2: 100 }];
        let portfolioVal = 100, bench1Val = 100, bench2Val = 100;
        
        data.forEach((d, i) => {
          portfolioVal *= (1 + adjustedNetAllFees[i]);
          bench1Val *= (1 + benchmark1Returns[i]);
          bench2Val *= (1 + benchmark2Returns[i]);
          
          vami.push({
            date: new Date(d.month_end_date).toLocaleDateString('en-US', { month: 'short', year: '2-digit' }),
            Portfolio: portfolioVal,
            Benchmark1: bench1Val,

        // Build historical returns grid by year

        const finalNetReturns = data.map((d, i) => {

          return (override !== null && override !== undefined) ? override : adjustedNetAllFees[i];
        });
        
        const historicalReturns = {};
        data.forEach((d, i) => {

          historicalReturns[year].months[month] = finalNetReturns[i];

        });
        
        // Risk metrics (use final returns which include overrides)

        const cumReturn = calcCumulative(finalNetReturns);
        const cumGross = calcCumulative(grossReturns);
        const cumNetMgmt = calcCumulative(netReturns);
        const annReturn = calcAnnualized(cumReturn, finalNetReturns.length);
        const riskFreeRate = 0; // Use 0% for Sharpe ratio (return/risk ratio)
